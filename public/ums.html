<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<script>(function(){var t=localStorage.getItem("fc-theme");if(t)document.documentElement.setAttribute("data-theme",t);})()</script>
<title>FORCAP -- UMS Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="/eom-api.js"></script>
<style>
:root{--bg:#070d1a;--sf:#0f172a;--sf2:#1e293b;--bd:rgba(255,255,255,.08);--t1:#f1f5f9;--t2:#94a3b8;--t3:#475569;--blue:#3b82f6;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;--r:12px}
[data-theme="light"]{--bg:#e8ecf2;--sf:#fff;--sf2:#f1f5f9;--bd:rgba(0,0,0,.08);--t1:#101828;--t2:#475467;--t3:#98a2b3;--blue:#1264d8}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--t1);min-height:100vh;display:flex;flex-direction:column}
.hdr{height:52px;background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 20px;gap:10px;flex-shrink:0;print-color-adjust:exact}
.logo{width:0;height:0;overflow:hidden;background:transparent;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
.hdr-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.hbtn{padding:5px 12px;border-radius:8px;border:1px solid var(--bd);background:transparent;color:var(--t2);font-size:11px;cursor:pointer;font-family:var(--font);text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:.15s}
.hbtn:hover{background:var(--sf2);color:var(--t1)}
.hbtn-blue{background:var(--blue);border-color:var(--blue);color:#fff}
.hbtn-blue:hover{opacity:.9}
.hbtn-green{background:var(--green);border-color:var(--green);color:#fff}
.hbtn-green:hover{opacity:.9}
/* Layout */
.layout{flex:1;display:flex;overflow:hidden;min-height:0}
/* History sidebar */
.sb{width:220px;background:var(--sf);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sb-title{padding:12px 16px 8px;font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--bd)}
.hist-list{flex:1;overflow-y:auto}
.hist-item{padding:8px 14px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.04);transition:.15s}
.hist-item:hover{background:rgba(255,255,255,.04)}
.hist-item.active{background:rgba(59,130,246,.1);border-left:3px solid var(--blue)}
.hist-date{font-size:12px;font-weight:600;color:var(--t1)}
.hist-ref{font-size:10px;color:var(--t3);font-family:var(--mono)}
.hist-status{font-size:9px;font-weight:700;padding:1px 6px;border-radius:8px;margin-top:3px;display:inline-block}
.s-open{background:rgba(245,158,11,.15);color:#fcd34d;border:1px solid rgba(245,158,11,.3)}
.s-de{background:rgba(59,130,246,.15);color:#93c5fd;border:1px solid rgba(59,130,246,.3)}
.s-locked{background:rgba(34,197,94,.15);color:#86efac;border:1px solid rgba(34,197,94,.3)}
/* Main content */
.main{flex:1;overflow-y:auto;padding:24px}
/* Date nav */
.date-nav{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.date-nav input{background:var(--sf2);border:1px solid var(--bd);color:var(--t1);font-family:var(--font);font-size:13px;padding:7px 12px;border-radius:8px;outline:none}
.date-nav input:focus{border-color:var(--blue)}
/* Checklist card */
.cl-card{background:var(--sf);border:1.5px solid var(--bd);border-radius:var(--r);overflow:hidden;max-width:900px}
.cl-hdr{padding:14px 20px;border-bottom:1px solid var(--bd);background:var(--sf2);display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.cl-title{font-size:16px;font-weight:700}
.cl-sub{font-size:11px;color:var(--t2);margin-top:3px}
.ref-badge{background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.3);color:#93c5fd;font-family:var(--mono);font-size:11px;font-weight:700;padding:3px 10px;border-radius:8px;flex-shrink:0}
.lock-badge{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);color:#86efac;font-size:11px;font-weight:700;padding:3px 10px;border-radius:8px;display:flex;align-items:center;gap:5px}
/* Items */
.item-list{padding:0}
.cl-item{display:flex;align-items:flex-start;gap:12px;padding:11px 20px;border-bottom:1px solid rgba(255,255,255,.04);transition:.15s;cursor:pointer}
.cl-item:last-child{border-bottom:none}
.cl-item:hover:not(.locked){background:rgba(255,255,255,.02)}
.cl-item.locked{cursor:default}
.item-num{font-size:10px;font-weight:700;color:var(--t3);font-family:var(--mono);min-width:22px;margin-top:2px;flex-shrink:0}
/* Custom checkbox */
.item-text{font-size:12.5px;color:var(--t1);line-height:1.5;flex:1;padding-right:8px}
.cl-item.locked .item-text{color:var(--t2)}
.status-sel{background:var(--sf2);border:1.5px solid var(--bd);color:var(--t1);font-family:var(--font);font-size:11px;font-weight:600;padding:5px 8px;border-radius:8px;outline:none;cursor:pointer;flex-shrink:0;min-width:130px;transition:.2s}
.status-sel:focus{border-color:var(--blue)}
.status-sel.ok{border-color:var(--green);background:rgba(34,197,94,.08);color:#86efac}
.status-sel.fault{border-color:var(--red);background:rgba(239,68,68,.08);color:#fca5a5}
.status-sel.nr{border-color:var(--amber);background:rgba(245,158,11,.08);color:#fcd34d}
.status-sel:disabled{opacity:.5;cursor:default}
.fault-row{display:none;flex-direction:column;gap:6px;padding:6px 20px 10px 54px;background:rgba(239,68,68,.04);border-left:3px solid var(--red)}
.fault-lbl{font-size:10px;font-weight:700;color:#fca5a5;text-transform:uppercase;letter-spacing:.5px}
.fault-input{background:var(--sf2);border:1.5px solid rgba(239,68,68,.4);color:var(--t1);font-family:var(--font);font-size:12px;padding:7px 10px;border-radius:8px;outline:none;resize:vertical;min-height:52px;width:100%}
.fault-input:focus{border-color:var(--red)}
.fault-input.missing{border-color:var(--red);box-shadow:0 0 0 2px rgba(239,68,68,.2)}
/* Remarks */
.remarks-area{padding:16px 20px;border-top:1px solid var(--bd);background:rgba(0,0,0,.1)}
.remarks-label{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.remarks-input{width:100%;background:var(--sf2);border:1px solid var(--bd);color:var(--t1);font-family:var(--font);font-size:12px;padding:8px 12px;border-radius:8px;outline:none;resize:vertical;min-height:60px}
.remarks-input:focus{border-color:var(--blue)}
/* Sign section */
.sign-area{padding:16px 20px;border-top:1px solid var(--bd);display:grid;grid-template-columns:1fr 1fr;gap:16px}
.sign-block{background:var(--sf2);border:1.5px solid var(--bd);border-radius:10px;padding:14px}
.sign-label{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.sign-input{width:100%;background:transparent;border:none;border-bottom:1.5px solid var(--bd);color:var(--t1);font-family:var(--font);font-size:12px;padding:4px 0 6px;outline:none;margin-bottom:8px}
.sign-input:focus{border-bottom-color:var(--blue)}
.sign-meta{font-size:10px;color:var(--t3);line-height:1.6}
.sign-meta strong{color:var(--green)}
.sign-btn{width:100%;margin-top:10px;padding:8px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);transition:.2s}
.btn-de{background:var(--blue);color:#fff}
.btn-ce{background:var(--green);color:#fff}
.btn-de:hover,.btn-ce:hover{opacity:.9}
.btn-de:disabled,.btn-ce:disabled{opacity:.4;cursor:not-allowed}
/* Progress bar */
.progress-row{padding:10px 20px;border-top:1px solid var(--bd);display:flex;align-items:center;gap:10px;background:rgba(0,0,0,.06)}
.prog-track{flex:1;height:5px;background:var(--bd);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:var(--green);border-radius:3px;transition:width .3s}
.prog-lbl{font-size:11px;font-family:var(--mono);color:var(--t2);min-width:60px;text-align:right}
/* Actions */
.action-bar{display:flex;gap:10px;align-items:center;padding:12px 20px;border-top:1px solid var(--bd);background:var(--sf2);flex-wrap:wrap}
/* Empty state */
.empty{text-align:center;padding:60px 20px;color:var(--t3)}
.empty-icon{font-size:48px;margin-bottom:12px}
/* Print */
@media print{
  .hdr,.sb,.date-nav,.action-bar,.hbtn,button{display:none!important}
  .layout{display:block}
  .main{padding:0;overflow:visible}
  .cl-card{max-width:100%;border:none}
  .cl-item:hover{background:transparent!important}
  .print-hdr{display:flex!important;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:2px solid #003366;margin-bottom:0}
  .nsml-logo{width:55px;height:55px;object-fit:contain}
  .sign-input{border-bottom-color:#999}
  body{background:#fff;color:#000}
  .cl-card{background:#fff}
  .cl-hdr{background:#f5f7fa}
}
.print-hdr{display:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
</style>
</head>
<body>
<div class="hdr">
  <img src="/forcap-logo.png" alt="FORCAP" style="height:30px;width:auto;vertical-align:middle"/>
  <span style="font-size:14px;font-weight:700">UMS Checklist</span>
  <span id="vessel-lbl" style="font-size:12px;color:var(--t2)"></span>
  <div class="hdr-right">
    <button class="hbtn" onclick="saveDraft()" id="btn-save">Save Draft</button>
    <button class="hbtn" onclick="window.print()">Print / PDF</button>
    <a class="hbtn" href="/logbook.html">Logbook</a>
  </div>
</div>

<div class="layout">
  <!-- History sidebar -->
  <div class="sb">
    <div class="sb-title">History</div>
    <div class="hist-list" id="hist-list">
      <div style="padding:20px;text-align:center;font-size:12px;color:var(--t3)">Loading...</div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="date-nav">
      <label style="font-size:11px;font-weight:700;color:var(--t3)">DATE</label>
      <input type="date" id="cl-date" onchange="loadChecklist()"/>
      <button class="hbtn" onclick="setToday()">Today</button>
      <div id="status-pill"></div>
    </div>
    <div id="cl-content">
      <div class="empty"><div class="empty-icon">&#128203;</div><div>Select a date to load the checklist</div></div>
    </div>
  </div>
</div>

window.addEventListener("DOMContentLoaded", async function(){
  if(typeof EOM==="undefined") return;
  if(!EOM.requireAuth()) return;
  var u=EOM.user();
  userRole=u.role||"vessel"; userName=u.display_name||u.username; userId=u.id;
  try{
    var v=await EOM.get("/vessels");
    if(!v.length) return;
    var _cv=EOM.pickVessel(v); vesselId=_cv.id; vesselName=_cv.name;
    document.getElementById("vessel-lbl").textContent="-- "+vesselName;
  // Show active D/E if signed in
  var _de=getSelectedDE();
  var _deEl=document.getElementById("de-active-lbl");
  if(_deEl&&_de) _deEl.textContent="D/E: "+_de.label;
  else if(_deEl) _deEl.textContent="";
  }catch(e){}
  setToday();
  loadHistory();
  // Patch EOM if needed
  if(!EOM.post) EOM.post=async function(p,b){var t=localStorage.getItem("eom_token");var r=await fetch("/api"+p,{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+t},body:JSON.stringify(b)});var d=await r.json();if(!r.ok)throw new Error(d.error||"Failed");return d;};
});


// Read D/E selection from localStorage (set by logbook.html when D/E signs in)
function getSelectedDE(){
  try{ return JSON.parse(localStorage.getItem('eom_selected_de')||'null'); }
  catch(e){ return null; }
}

function setToday(){
  document.getElementById("cl-date").value=new Date().toISOString().slice(0,10);
  loadChecklist();
}

async function loadHistory(){
  try{
    var rows=await EOM.get("/ums?vessel_id="+vesselId+"&limit=30");
    var el=document.getElementById("hist-list");
    if(!rows.length){el.innerHTML='<div style="padding:20px;text-align:center;font-size:12px;color:var(--t3)">No records yet</div>';return;}
    el.innerHTML=rows.map(function(r){
      var statusCls=r.is_locked?"s-locked":r.de_signed?"s-de":"s-open";
      var statusLbl=r.is_locked?"Signed & Locked":r.de_signed?"D/E Signed":"In Progress";
      var isActive=currentRec&&currentRec.id===r.id?"active":"";
      return '<div class="hist-item '+isActive+'" onclick="loadByRef('+ r.id +')">'
        +'<div class="hist-date">'+r.checklist_date.slice(0,10)+'</div>'
        +'<div class="hist-ref">'+( r.ref_number||"Unsaved")+'</div>'
        +'<span class="hist-status '+statusCls+'">'+statusLbl+'</span>'
        +'</div>';
    }).join("");
  }catch(e){}
}

async function loadByRef(id){
  try{
    var rec=await EOM.get("/ums/"+id);
    currentRec=rec;
    document.getElementById("cl-date").value=rec.checklist_date.slice(0,10);
    render();
    loadHistory();
  }catch(e){alert("Error: "+e.message);}
}

async function loadChecklist(){
  var date=document.getElementById("cl-date").value;
  if(!date||!vesselId) return;
  try{
    var rec=await EOM.get("/ums/date/"+vesselId+"/"+date);
    currentRec=rec;
    render();
    loadHistory();
  }catch(e){ currentRec=null; render(); }
}

function getCheckedItems(){
  var result={};
  document.querySelectorAll(".ck-box").forEach(function(cb,i){
    result[i]=cb.classList.contains("checked");
  });
  return result;
}

function render(){
  var date=document.getElementById("cl-date").value;
  var rec=currentRec;
  var items=rec&&rec.items?rec.items:{};
  var isLocked=rec&&rec.is_locked;
  var canEdit=!isLocked||(userRole==="admin");
  var canCESign=['admin','superintendent','manager','smt'].includes(userRole);
  var deSigned=rec&&rec.de_signed;
  var ceSigned=rec&&rec.ce_signed;

  // Status pill
  var pill=document.getElementById("status-pill");
  if(isLocked) pill.innerHTML='<span style="background:rgba(34,197,94,.15);color:#86efac;border:1px solid rgba(34,197,94,.3);padding:3px 10px;border-radius:8px;font-size:11px;font-weight:700">Locked & Signed</span>';
  else if(deSigned) pill.innerHTML='<span style="background:rgba(59,130,246,.15);color:#93c5fd;border:1px solid rgba(59,130,246,.3);padding:3px 10px;border-radius:8px;font-size:11px;font-weight:700">D/E Signed</span>';
  else pill.innerHTML='<span style="background:rgba(245,158,11,.15);color:#fcd34d;border:1px solid rgba(245,158,11,.3);padding:3px 10px;border-radius:8px;font-size:11px;font-weight:700">In Progress</span>';

  var answeredCount=Object.values(items).filter(function(v){return v&&(typeof v==="boolean"?v:v.status!=="");}).length;
  var pct=ITEMS.length>0?Math.round(answeredCount/ITEMS.length*100):0;

  var refHtml=rec&&rec.ref_number?'<span class="ref-badge">'+rec.ref_number+'</span>':'<span style="font-size:11px;color:var(--t3)">Not saved yet</span>';
  if(isLocked) refHtml+=' <span class="lock-badge">&#128274; Locked</span>';

  // Item rows
  function getItemData(i){var v=items[i];if(!v)return{status:"",comment:"",informed:false};if(typeof v==="boolean")return{status:v?"ok":"",comment:"",informed:false};return{status:v.status||"",comment:v.comment||"",informed:!!v.informed};}
var faultCount=0;
var itemRows=ITEMS.map(function(text,i){
  var d=getItemData(i);
  if(d.status==="fault")faultCount++;
  var isFault=d.status==="fault";
  var lockedCls=(!canEdit)?" locked":"";
  var selDis=(!canEdit)?" disabled":"";
  var selCls=d.status==="ok"?" ok":d.status==="fault"?" fault":d.status==="nr"?" nr":"";
  var row='<div class="cl-item'+lockedCls+'" id="item-'+i+'">';
  row+='<span class="item-num">'+(i+1)+'.</span>';
  row+='<span class="item-text">'+esc(text)+'</span>';
  row+='<select class="status-sel'+selCls+'" id="sel-'+i+'"'+selDis+' onchange="onStatusChange('+i+')">';
  row+='<option value=""'+( d.status===""?" selected":"")+'>-- Select --</option>';
  row+='<option value="ok"'+( d.status==="ok"?" selected":"")+'>Yes, All Okay</option>';
  row+='<option value="fault"'+( d.status==="fault"?" selected":"")+'>No - Fault</option>';
  row+='<option value="nr"'+( d.status==="nr"?" selected":"")+'>Not Running</option>';
  row+='</select></div>';
  if(isFault){
    row+='<div class="fault-row" id="fault-row-'+i+'" style="display:flex;flex-direction:column">';
    row+='<label class="fault-lbl">Fault description required</label>';
    row+='<textarea class="fault-input'+(!d.comment?" missing":"")+'" id="fault-'+i+'"'+(!canEdit?" readonly":"")+' oninput="onFaultInput('+i+')">'+ esc(d.comment)+'</textarea>';
    if(d.informed)row+='<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;background:rgba(34,197,94,.12);color:#86efac;border:1px solid rgba(34,197,94,.3)">Informed</span>';
    row+='</div>';
  } else {
    row+='<div class="fault-row" id="fault-row-'+i+'"></div>';
  }
  return row;
}).join("");

  // Remarks
  var remarksHtml='<div class="remarks-area">'+
    '<div class="remarks-label">Remarks / Observations</div>'+
    '<textarea class="remarks-input" id="remarks" placeholder="Enter any remarks or observations..."'+
    (!canEdit?' readonly style="opacity:.6"':'' )+'>'+esc(rec&&rec.remarks?rec.remarks:"")+'</textarea>'+
    '</div>';

  // Sign blocks
  var deSignedMeta=deSigned?'<div class="sign-meta">Signed by <strong>'+esc(rec.de_signer_name||rec.duty_engineer||"D/E")+'</strong><br>'+new Date(rec.de_signed_at).toLocaleString()+'</div>':'';
  var ceSignedMeta=ceSigned?'<div class="sign-meta">Signed by <strong>'+esc(rec.ce_signer_name||rec.chief_engineer||"C/E")+'</strong><br>'+new Date(rec.ce_signed_at).toLocaleString()+'</div>':'';

  var signHtml='<div class="sign-area">'+
    '<div class="sign-block">'+
    '<div class="sign-label">Duty Engineer</div>'+
    '<input class="sign-input" id="de-name" placeholder="Name" value="'+(()=>{ var v=rec&&rec.duty_engineer; if(v) return esc(v); var de=getSelectedDE(); return de?esc(de.label):''; })()+'"'+(deSigned?' readonly':'' )+'/>'+
    deSignedMeta+
    (!deSigned&&canEdit?'<button class="sign-btn btn-de" onclick="signDE()" id="btn-sign-de">Sign as Duty Engineer</button>':'' )+
    '</div>'+
    '<div class="sign-block">'+
    '<div class="sign-label">Chief Engineer</div>'+
    '<input class="sign-input" id="ce-name" placeholder="Name" value="'+esc(rec&&rec.chief_engineer?rec.chief_engineer:(userRole==="smt"?userName:""))+'"'+(ceSigned?' readonly':'' )+'/>'+
    ceSignedMeta+
    (deSigned&&!ceSigned&&canCESign?'<button class="sign-btn btn-ce" onclick="signCE()" id="btn-sign-ce">Sign & Lock Checklist</button>':'' )+
    (isLocked&&userRole==="admin"?'<button class="sign-btn" style="background:var(--red);color:#fff;margin-top:8px" onclick="adminUnlock()">Admin Unlock</button>':'' )+
    '</div>'+
    '</div>';

  // Print header (hidden on screen, shown in print)
  var printHdr='<div class="print-hdr">'+
    '<div><h2 style="color:#003366;font-size:14pt;margin:0 0 4px">UMS CHECKLIST</h2>'+
    '<p style="margin:0;font-size:9pt;color:#444">Vessel: <b>'+esc(vesselName)+'</b> &nbsp;|&nbsp; Date: <b>'+date+'</b> &nbsp;|&nbsp; Ref: <b>'+(rec&&rec.ref_number?rec.ref_number:"Pending")+'</b></p></div>'+
    '<img class="nsml-logo" src="'+LOGO_URI+'" style="width:55px;height:55px;object-fit:contain"/>'+
    '</div>';

  // Action bar
  var saveBtn=canEdit?'<button class="hbtn hbtn-blue" onclick="saveDraft()" id="btn-save">Save Draft</button>':'';
  var unlockBtn=isLocked&&userRole==="admin"?'<button class="hbtn" onclick="adminUnlock()" style="background:var(--red);border-color:var(--red);color:#fff">Admin Unlock</button>':'';
  var pctLbl=answeredCount+"/"+ITEMS.length+" items completed";
  var actionBar='<div class="action-bar">'+
    '<div class="progress-row" style="flex:1;padding:0;background:transparent;border:none">'+
    '<div class="prog-track"><div class="prog-fill" style="width:'+pct+'%"></div></div>'+
    '<span class="prog-lbl">'+pctLbl+'</span></div>'+
    saveBtn+unlockBtn+
    '<button class="hbtn" onclick="window.print()">Print / PDF</button>'+
    '</div>';

  document.getElementById("cl-content").innerHTML=
    '<div class="cl-card">'+
    printHdr+
    '<div class="cl-hdr"><div><div class="cl-title">UMS Checklist -- '+date+'</div><div class="cl-sub">Prior to UMS operation, the following checklist is to be completed.</div></div>'+
    '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">'+refHtml+'</div></div>'+
    '<div class="item-list" id="item-list">'+itemRows+'</div>'+
    remarksHtml+signHtml+actionBar+
    '</div>';
}


// Status dropdown handler
function onStatusChange(idx){
  var sel=document.getElementById('sel-'+idx);
  if(!sel) return;
  var val=sel.value;
  sel.className='status-sel'+(val==='ok'?' ok':val==='fault'?' fault':val==='nr'?' nr':'');
  var faultRow=document.getElementById('fault-row-'+idx);
  if(faultRow){
    if(val==='fault'){
      faultRow.style.display='flex';
      faultRow.style.flexDirection='column';
      faultRow.innerHTML='<label class="fault-lbl">Fault description required</label>'
        +'<textarea class="fault-input missing" id="fault-'+idx+'" placeholder="Describe the fault or corrective action taken..." oninput="onFaultInput('+idx+')"></textarea>';
    } else {
      faultRow.style.display='none';
      faultRow.innerHTML='';
    }
  }
  updateProgress();
  updateSignBtn();
}

function onFaultInput(idx){
  var ta=document.getElementById('fault-'+idx);
  if(ta) ta.classList.toggle('missing',!ta.value.trim());
  updateSignBtn();
}

function updateProgress(){
  var sels=document.querySelectorAll('.status-sel');
  var answered=[...sels].filter(function(s){return s.value!=='';}).length;
  var total=ITEMS.length;
  var pct=total>0?Math.round(answered/total*100):0;
  var pf=document.querySelector('.prog-fill');
  var pl=document.querySelector('.prog-lbl');
  if(pf) pf.style.width=pct+'%';
  if(pl) pl.textContent=answered+'/'+total+' items completed';
}

function updateSignBtn(){
  var btn=document.getElementById('btn-sign-de');
  if(!btn) return;
  var missing=getFaultsMissingComment();
  btn.disabled=missing.length>0;
}

function getFaultsMissingComment(){
  var missing=[];
  document.querySelectorAll('.status-sel').forEach(function(sel,i){
    if(sel.value==='fault'){
      var ta=document.getElementById('fault-'+i);
      if(!ta||!ta.value.trim()) missing.push(i);
    }
  });
  return missing;
}

function getFaultItems(){
  var faults=[];
  document.querySelectorAll('.status-sel').forEach(function(sel,i){
    if(sel.value==='fault'){
      var ta=document.getElementById('fault-'+i);
      faults.push({idx:i,text:ITEMS[i],comment:ta?ta.value.trim():''});
    }
  });
  return faults;
}

function showInformedPrompt(countLabel,itemText){
  return new Promise(function(resolve){
    var overlay=document.createElement('div');
    overlay.style='position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
    var box=document.createElement('div');
    box.style='background:var(--sf);border:1.5px solid var(--bd);border-radius:14px;max-width:480px;width:100%;padding:24px';
    box.innerHTML='<div style="font-size:11px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Fault Recorded ('+countLabel+')</div>'
      +'<div style="font-size:15px;font-weight:700;margin-bottom:10px">Has the 2E or C/E been informed?</div>'
      +'<div style="font-size:13px;color:var(--t2);background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:10px 14px;margin-bottom:18px;line-height:1.5">'
      +'"'+esc(itemText)+'"</div>'
      +'<div style="display:flex;gap:10px" id="informed-btns"></div>';
    var btnNo=document.createElement('button');
    btnNo.textContent='No -- go back';
    btnNo.style='flex:1;padding:10px;border-radius:8px;border:1.5px solid var(--bd);background:transparent;color:var(--t2);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer';
    var btnYes=document.createElement('button');
    btnYes.textContent='Yes, informed';
    btnYes.style='flex:1;padding:10px;border-radius:8px;border:none;background:var(--green);color:#fff;font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer';
    btnNo.onclick=function(){overlay.remove();resolve(false);};
    btnYes.onclick=function(){overlay.remove();resolve(true);};
    box.querySelector('#informed-btns').appendChild(btnNo);
    box.querySelector('#informed-btns').appendChild(btnYes);
    overlay.appendChild(box);
    document.body.appendChild(overlay);
  });
}

function showModal(msg){
  var overlay=document.createElement('div');
  overlay.style='position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
  var box=document.createElement('div');
  box.style='background:var(--sf);border:1.5px solid rgba(239,68,68,.4);border-radius:14px;max-width:420px;width:100%;padding:24px';
  var h2=document.createElement('div');
  h2.style='font-size:15px;font-weight:700;margin-bottom:12px';
  h2.textContent='Action Required';
  var p=document.createElement('div');
  p.style='font-size:13px;color:var(--t2);line-height:1.6;margin-bottom:18px';
  p.textContent=msg;
  var btn=document.createElement('button');
  btn.textContent='OK';
  btn.style='width:100%;padding:10px;border-radius:8px;border:none;background:var(--blue);color:#fff;font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer';
  btn.onclick=function(){overlay.remove();};
  box.appendChild(h2); box.appendChild(p); box.appendChild(btn);
  overlay.appendChild(box);
  document.body.appendChild(overlay);
}



async function saveDraft(){
  var date=document.getElementById("cl-date").value;
  if(!date){alert("Select a date first");return;}
  var items={};
  document.querySelectorAll(".status-sel").forEach(function(sel,i){var c="";if(sel.value==="fault"){var ta=document.getElementById("fault-"+i);c=ta?ta.value.trim():"";}items[i]={status:sel.value,comment:c,informed:!!(sel.dataset&&sel.dataset.informed==="true")};});
  var remarks=document.getElementById("remarks")?.value||"";
  var deN=document.getElementById("de-name")?.value||"";
  try{
    document.getElementById("btn-save")&&(document.getElementById("btn-save").textContent="Saving...");
    var rec=await EOM.post("/ums",{vessel_id:vesselId,checklist_date:date,items:items,remarks:remarks,duty_engineer:deN});
    currentRec=rec;
    render();
    loadHistory();
    showToast("Draft saved -- Ref: "+rec.ref_number);
  }catch(e){alert("Save error: "+e.message);}
}

async function signDE(){
  var deN=document.getElementById("de-name")?.value||"";
  if(!deN){showToast("Enter your name before signing.");return;}
  var unanswered=[...document.querySelectorAll(".status-sel")].filter(function(s){return s.value==="";}).length;
  if(unanswered>0){showToast("All items must be answered before signing. ("+unanswered+" unanswered)");return;}
  var missing=getFaultsMissingComment();
  if(missing.length>0){
    showToast("Fault description required for items: "+missing.map(function(i){return i+1;}).join(", "));
    missing.forEach(function(i){var ta=document.getElementById("fault-"+i);if(ta)ta.classList.add("missing");});
    return;
  }
  var faults=getFaultItems();
  for(var fi=0;fi<faults.length;fi++){
    var f=faults[fi];
    var shortText=f.text.length>60?f.text.slice(0,60)+"...":f.text;
    var informed=await showInformedPrompt((fi+1)+" of "+faults.length,shortText);
    if(!informed){
      var msg="Please inform the 2E or C/E about the fault on item "+(f.idx+1)+" before signing: "+shortText;
      showModal(msg);
      return;
    }
    var sel=document.getElementById("sel-"+f.idx);
    if(sel)sel.dataset.informed="true";
  }
  var items={};
  document.querySelectorAll(".status-sel").forEach(function(sel,i){
    var c="";if(sel.value==="fault"){var ta=document.getElementById("fault-"+i);c=ta?ta.value.trim():"";}
    items[i]={status:sel.value,comment:c,informed:!!(sel.dataset&&sel.dataset.informed==="true")};
  });
  try{
    var remarks=document.getElementById("remarks")?.value||"";
    if(!currentRec)await saveDraft();
    if(!currentRec)return;
    await EOM.post("/ums",{vessel_id:vesselId,checklist_date:document.getElementById("cl-date").value,items:items,remarks:remarks,duty_engineer:deN});
    var rec=await EOM.post("/ums/"+currentRec.id+"/sign-de",{duty_engineer:deN});
    currentRec=rec;render();loadHistory();
    showToast("Duty Engineer signed. Ref: "+rec.ref_number);
  }catch(e){showModal("Sign error: "+e.message);}
}

async function signCE(){
  if(!canCESign){showToast('C/E signature requires SMT or above','error');return;}
  if(!currentRec){alert("Save the checklist first");return;}
  var ceN=document.getElementById("ce-name")?.value||"";
  if(!ceN){alert("Enter Chief Engineer name");return;}
  // Lock is confirmed by the CE signing action itself
  try{
    var rec=await EOM.post("/ums/"+currentRec.id+"/sign-ce",{chief_engineer:ceN});
    currentRec=rec;
    render();
    loadHistory();
    showToast("Checklist locked and signed. Ref: "+rec.ref_number);
  }catch(e){alert("Sign error: "+e.message);}
}

async function adminUnlock(){
  if(!currentRec){return;}
  // Admin unlock proceeds directly
  try{
    var rec=await EOM.post("/ums/"+currentRec.id+"/unlock",{});
    currentRec=rec;
    render();
    loadHistory();
    showToast("Checklist unlocked by admin.");
  }catch(e){alert("Unlock error: "+e.message);}
}

function showToast(msg){
  var t=document.createElement("div");
  t.style="position:fixed;bottom:24px;right:24px;background:#22c55e;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.3);animation:fadeIn .2s";
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(function(){t.remove();},3000);
}

function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
</script>
