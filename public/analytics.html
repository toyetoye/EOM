<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<script>(function(){var t=localStorage.getItem("fc-theme");if(t)document.documentElement.setAttribute("data-theme",t);})()</script>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>FORCAP — ER Log Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="/eom-api.js"></script>
<style>
:root{--bg:#070d1a;--sf:#0f172a;--sf2:#1e293b;--bd:rgba(255,255,255,.08);--t1:#f1f5f9;--t2:#94a3b8;--t3:#475569;--blue:#3b82f6;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--purple:#a855f7;--font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;--r:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--t1);min-height:100vh;display:flex;flex-direction:column}
.hdr{height:56px;background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 20px;gap:10px;flex-shrink:0}
.logo{width:32px;height:32px;background:linear-gradient(135deg,#1d4ed8,#7c3aed);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
.hdr-title{font-size:14px;font-weight:700}
.hdr-vessel{font-size:12px;color:var(--t2)}
.hdr-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.hbtn{padding:5px 12px;border-radius:8px;border:1px solid var(--bd);background:transparent;color:var(--t2);font-size:11px;cursor:pointer;font-family:var(--font);text-decoration:none;display:inline-flex;align-items:center;gap:5px}
.hbtn:hover{background:var(--sf2);color:var(--t1)}
.layout{flex:1;display:flex;overflow:hidden;min-height:0}
/* Sidebar — parameter browser */
.sb{width:280px;background:var(--sf);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0}
.sb-top{padding:12px;border-bottom:1px solid var(--bd);flex-shrink:0}
.sb-search{width:100%;background:var(--sf2);border:1px solid var(--bd);color:var(--t1);font-family:var(--font);font-size:12px;padding:7px 10px;border-radius:8px;outline:none}
.sb-search:focus{border-color:var(--blue)}
.sb-info{font-size:10px;color:var(--t3);margin-top:6px}
.sb-list{flex:1;overflow-y:auto;padding:6px}
.sb-sect-hdr{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;padding:8px 8px 4px}
.param-btn{display:flex;align-items:center;gap:8px;width:100%;padding:6px 10px;border:none;background:transparent;color:var(--t2);font-size:12px;cursor:pointer;font-family:var(--font);border-radius:8px;text-align:left;transition:.15s}
.param-btn:hover{background:rgba(255,255,255,.04);color:var(--t1)}
.param-btn.selected{background:rgba(59,130,246,.15);color:var(--blue)}
.param-name{flex:1;font-size:11px}
.param-count{font-size:9px;color:var(--t3);font-family:var(--mono)}
.param-unit{font-size:9px;color:var(--t3);font-family:var(--mono);margin-left:auto}
/* Main area */
.main{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;min-width:0}
/* Controls */
.ctrl-bar{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.ctrl-label{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px}
.ctrl-sel{background:var(--sf2);border:1px solid var(--bd);color:var(--t1);font-family:var(--font);font-size:12px;padding:6px 10px;border-radius:8px;outline:none;cursor:pointer}
.ctrl-sel:focus{border-color:var(--blue)}
.chip-wrap{display:flex;gap:6px;flex-wrap:wrap;flex:1}
.chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.3);color:#93c5fd;font-size:11px;font-weight:600}
.chip-x{cursor:pointer;opacity:.7;font-size:12px;line-height:1}
.chip-x:hover{opacity:1}
.btn-plot{padding:7px 18px;border-radius:8px;background:var(--blue);border:none;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font)}
.btn-plot:hover{opacity:.9}
.btn-clear{padding:7px 14px;border-radius:8px;background:transparent;border:1px solid var(--bd);color:var(--t2);font-size:12px;cursor:pointer;font-family:var(--font)}
/* Chart cards */
.chart-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
.chart-head{padding:12px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px;background:var(--sf2)}
.chart-title{font-size:13px;font-weight:700;flex:1}
.chart-body{padding:16px;position:relative}
/* Stats row */
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.mini-stat{background:var(--sf2);border-radius:8px;padding:10px 12px}
.mini-stat-val{font-size:18px;font-weight:700;font-family:var(--mono)}
.mini-stat-lbl{font-size:10px;color:var(--t3);margin-top:2px}
/* Comparison table */
.comp-tbl{width:100%;border-collapse:collapse;font-size:12px}
.comp-tbl th{background:var(--sf2);padding:7px 12px;font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--bd);text-align:right}
.comp-tbl th:first-child{text-align:left}
.comp-tbl td{padding:7px 12px;border-bottom:1px solid rgba(255,255,255,.03);text-align:right;font-family:var(--mono);font-size:11px}
.comp-tbl td:first-child{text-align:left;font-family:var(--font);font-weight:500}
.trend-up{color:var(--red)}
.trend-dn{color:var(--green)}
.trend-flat{color:var(--t3)}
/* Empty / loading */
.empty{text-align:center;padding:60px 20px;color:var(--t3)}
.empty-ico{font-size:48px;margin-bottom:12px}
.empty-title{font-size:14px;font-weight:600;color:var(--t2);margin-bottom:6px}
.empty-sub{font-size:12px;line-height:1.6}
.spinner{width:28px;height:28px;border:3px solid var(--bd);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
/* Accordion sidebar */
.acc-group{margin-bottom:4px}
/* Floor-level header */
.acc-hdr{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;border-radius:8px;transition:background .15s;user-select:none}
.acc-hdr:hover{background:rgba(255,255,255,.05)}
.fl-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.fl-label{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.6px;flex:1}
.fl-badge{font-size:9px;font-weight:700;padding:1px 6px;border-radius:8px;background:rgba(59,130,246,.2);color:#93c5fd;margin-right:4px}
.acc-chevron{font-size:8px;color:var(--t3);transition:transform .2s;flex-shrink:0}
.acc-chevron.open{transform:rotate(90deg)}
/* Floor body */
.acc-body{display:none;padding-bottom:4px}
.acc-body.open{display:block}
/* Section-level accordion inside floor */
.sec-group{margin:2px 0}
.sec-hdr{display:flex;align-items:center;gap:6px;padding:5px 10px 5px 12px;cursor:pointer;border-radius:6px;transition:background .15s;user-select:none}
.sec-hdr:hover{background:rgba(255,255,255,.04)}
.sec-label{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;flex:1}
.sec-chevron{font-size:7px;color:var(--t3);transition:transform .2s;flex-shrink:0}
.sec-chevron.open{transform:rotate(90deg)}
.sec-body{display:none;padding-left:4px}
.sec-body.open{display:block}
</style>
</head>
<body>
<div class="hdr">
  <img src="/forcap-logo.png" alt="FORCAP" style="height:64px;width:auto;margin:0 auto 12px;display:block"/>
  <span class="hdr-title">ER Log Analytics</span>
  <span class="hdr-vessel" id="vessel-lbl"></span>
  <div class="hdr-right">
    <span style="font-size:11px;color:var(--t3)" id="catalog-meta"></span>
    <a class="hbtn" href="/inventory.html">📦 Inventory</a>
    <a class="hbtn" href="/logbook.html">← Logbook</a>
  </div>
</div>

<div class="layout">
  <!-- Parameter Browser Sidebar -->
  <div class="sb">
    <div class="sb-top">
      <input class="sb-search" id="param-search" placeholder="🔍 Search parameters…" oninput="filterParams()"/>
      <div class="sb-info" id="sb-info">Loading parameters…</div>
    </div>
    <div class="sb-list" id="sb-list">
      <div style="padding:20px;text-align:center"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- Main Chart Area -->
  <div class="main" id="main">
    <div class="ctrl-bar">
      <span class="ctrl-label">Period</span>
      <select class="ctrl-sel" id="days-sel">
        <option value="30">Last 30 days</option>
        <option value="90" selected>Last 90 days</option>
        <option value="180">Last 6 months</option>
        <option value="365">Last 12 months</option>
        <option value="730">All time</option>
      </select>
      <span class="ctrl-label">Mode</span>
      <select class="ctrl-sel" id="mode-sel">
        <option value="overlay">Overlay (same chart)</option>
        <option value="separate">Separate charts</option>
        <option value="compare">Compare stats</option>
      </select>
      <div class="chip-wrap" id="selected-chips"></div>
      <button class="btn-plot" onclick="plotSelected()">Plot</button>
      <button class="btn-clear" onclick="clearSelected()">Clear</button>
    </div>
    <div id="charts-area">
      <div class="empty">
        <div class="empty-ico">📈</div>
        <div class="empty-title">Select parameters to plot</div>
        <div class="empty-sub">Browse the parameter list on the left.<br>Select one or more, then click <b>Plot</b>.<br><br>You can overlay multiple parameters on one chart,<br>or compare them side by side.</div>
      </div>
    </div>
  </div>
</div>

<script>
var vesselId = null;
var catalog = [];
var selectedFids = [];
var chartInstances = [];
const COLORS = ['#3b82f6','#a855f7','#22c55e','#f59e0b','#ef4444','#06b6d4','#ec4899','#84cc16','#f97316','#8b5cf6','#14b8a6','#f43f5e'];

window.addEventListener('DOMContentLoaded', async function(){
  if(typeof EOM==='undefined'){ showMsg('error','Open from Railway URL'); return; }
  if(!EOM.requireAuth()) return;
  try{
    const vessels = await EOM.get('/vessels');
    if(!vessels.length){ showMsg('error','No vessels'); return; }
    var _cv=EOM.pickVessel(vessels); vesselId=_cv.id;
    document.getElementById('vessel-lbl').textContent = '· ' + _cv.name;
    await loadCatalog();
  }catch(e){ showMsg('error',e.message); }
});

async function loadCatalog(){
  try{
    catalog = await EOM.get('/watches/field-catalog?vessel_id='+vesselId);
    document.getElementById('catalog-meta').textContent = catalog.length + ' parameters with data';
    document.getElementById('sb-info').textContent = catalog.length + ' parameters · click to select';
    renderSidebar(catalog);
  }catch(e){ document.getElementById('sb-info').textContent = 'Error: '+e.message; }
}

function filterParams(){
  var q = document.getElementById('param-search').value.toLowerCase();
  var filtered = q ? catalog.filter(function(c){
    return c.parameter.toLowerCase().includes(q) || c.equipment.toLowerCase().includes(q) || c.section.toLowerCase().includes(q);
  }) : catalog;
  renderSidebar(filtered);
}

// Floor-organised sidebar
// ── Analytics sidebar — two-level accordion ─────────────────────────────────
// SECTION_FLOORS covers all vessel classes:
//   LPG (AT/AT10), LNG 2-Stroke (AKTORAS), LNG Steam (RIVERS/RIVERS PLUS), LNG DFDE (SHI/HHI)
// When a new vessel type logs data with different section names, add them here.
var SECTION_FLOORS = {
  "Main Engine":           { floor:"ER Floor",    color:"#1570EF", order:0 },
  "Auxiliaries":           { floor:"ER Floor",    color:"#1570EF", order:1 },
  "D/G No.1":              { floor:"3rd Deck",    color:"#7C3AED", order:0 },
  "D/G No.2":              { floor:"3rd Deck",    color:"#7C3AED", order:1 },
  "D/G No.3":              { floor:"3rd Deck",    color:"#7C3AED", order:2 },
  "Purifiers":             { floor:"3rd Deck",    color:"#7C3AED", order:3 },
  "Sewage Treatment Plant":{ floor:"3rd Deck",    color:"#7C3AED", order:4 },
  "A/C Plant":             { floor:"2nd Deck",    color:"#0891B2", order:0 },
  "Fridge":                { floor:"2nd Deck",    color:"#0891B2", order:1 },
  "Air Compressors":       { floor:"2nd Deck",    color:"#0891B2", order:2 },
  "Steering Gear":         { floor:"2nd Deck",    color:"#0891B2", order:3 },
  "Composite Boiler":      { floor:"Upper Deck",  color:"#F79009", order:0 },
  "G/E SCR System":        { floor:"Upper Deck",  color:"#F79009", order:1 },
  "E/R Fans":              { floor:"Upper Deck",  color:"#F79009", order:2 },
  "Tanks":                 { floor:"Tanks",       color:"#B45309", order:0 },
  "ER Rounds":             { floor:"ER Rounds",   color:"#059669", order:0 },
  "Running Hours":         { floor:"Monthly Logs", color:"#8B5CF6", order:0 },
  "Weekly Tests":          { floor:"Weekly Tests", color:"#0EA5E9", order:0 },
  "Monthly Logs":          { floor:"Monthly Logs", color:"#8B5CF6", order:1 }
};
var FLOOR_ORDER = [
  "ER Floor","3rd Deck","2nd Deck","Upper Deck",
  "Tanks","ER Rounds","Weekly Tests","Monthly Logs"
];
var FLOOR_COLORS = {
  "ER Floor":"#1570EF","3rd Deck":"#7C3AED","2nd Deck":"#0891B2","Upper Deck":"#F79009",
  "Tanks":"#B45309","ER Rounds":"#059669",
  "Weekly Tests":"#0EA5E9","Monthly Logs":"#8B5CF6"
};

// Track open state for both floors and sections
var openGroups   = {};   // floor level
var openSections = {};   // section level  key = "floor||section"

function renderSidebar(items){
  // ── Per-parameter floor+section overrides ────────────────────────────────
  // These parameters have section="ER Rounds" in the DB (logged on ER Rounds sheet)
  // but physically belong to specific equipment. Override both floor AND section.
  var PARAM_OVERRIDE = {
    // ER Floor
    "ME HYD  FLUSHING COUNTER":          { floor:"ER Floor",  section:"Main Engine"    },
    "ME HYD FLUSHING COUNTER":           { floor:"ER Floor",  section:"Main Engine"    },
    // 3rd Deck — D/G No.1
    "NO.1 DG LO SUMP LEVEL":             { floor:"3rd Deck",  section:"D/G No.1"       },
    "Running Hours DG 1":                { floor:"3rd Deck",  section:"D/G No.1"       },
    "Total hours run DG 1":              { floor:"3rd Deck",  section:"D/G No.1"       },
    // 3rd Deck — D/G No.2
    "NO.2 DG LO SUMP LEVEL":             { floor:"3rd Deck",  section:"D/G No.2"       },
    "Running Hours DG 2":                { floor:"3rd Deck",  section:"D/G No.2"       },
    "Total hours run DG 2":              { floor:"3rd Deck",  section:"D/G No.2"       },
    // 3rd Deck — D/G No.3
    "NO.3 DG LO SUMP LEVEL":             { floor:"3rd Deck",  section:"D/G No.3"       },
    "Running Hours DG 3":                { floor:"3rd Deck",  section:"D/G No.3"       },
    "Total hours run DG 3":              { floor:"3rd Deck",  section:"D/G No.3"       },
    // 3rd Deck — Purifiers
    "NO.1 HFO PURIFIER R/H":             { floor:"3rd Deck",  section:"Purifiers"      },
    "NO.2 HFO PURIFIER R/H":             { floor:"3rd Deck",  section:"Purifiers"      },
    "NO.1 LO PURIFIER R/H":              { floor:"3rd Deck",  section:"Purifiers"      },
    "NO.2 LO PURIFIER R/H":              { floor:"3rd Deck",  section:"Purifiers"      },
    "FO FLUSHING COUNTER":               { floor:"3rd Deck",  section:"Purifiers"      },
    "HFO FLUSHING COUNTER":              { floor:"3rd Deck",  section:"Purifiers"      },
    "FWG COUNTER":                       { floor:"3rd Deck",  section:"Purifiers"      },
    "Fresh Water Gen Total produced":    { floor:"3rd Deck",  section:"Purifiers"      },
    // 2nd Deck — Air Compressors
    "NO.1 MAIN AIR COMP R/HR":           { floor:"2nd Deck",  section:"Air Compressors"},
    "NO.2 MAIN AIR COMP R/HR":           { floor:"2nd Deck",  section:"Air Compressors"},
    "CONTROL AIR COMP R/HR":             { floor:"2nd Deck",  section:"Air Compressors"},
    "GS AIR COMP R/HRS":                 { floor:"2nd Deck",  section:"Air Compressors"},
    "NO.1 MAIN AIR COMP TOTAL RUN HOURS":{ floor:"2nd Deck",  section:"Air Compressors"},
    "NO.2 MAIN AIR COMP TOTAL RUN HOURS":{ floor:"2nd Deck",  section:"Air Compressors"},
    // 2nd Deck — A/C Plant
    "AIR CONDITIONING RUNNING HOURS":    { floor:"2nd Deck",  section:"A/C Plant"      },
    // 2nd Deck — Fridge
    "Fridge Compressor Run Hours":       { floor:"2nd Deck",  section:"Fridge"         },
    // Tanks
    "STBD FW TANK":                      { floor:"Tanks",     section:"Tanks"          },
    "PORT FW TANK":                      { floor:"Tanks",     section:"Tanks"          },
    "FW EXPANSION TANK":                 { floor:"Tanks",     section:"Tanks"          }
  };

  var floors = {};
  items.forEach(function(c){
    // Check param-level override first, then fall back to section-based mapping
    var override = PARAM_OVERRIDE[c.parameter];
    var fl, sec, sectionOrder;
    if(override){
      fl  = override.floor;
      sec = override.section;
      sectionOrder = SECTION_FLOORS[sec] ? SECTION_FLOORS[sec].order : 0;
    } else {
      sec = c.section || "Other";
      var fi = SECTION_FLOORS[sec] || { floor:"Other", color:"#475569", order:99 };
      fl  = fi.floor;
      sectionOrder = fi.order;
    }
    if(!floors[fl]) floors[fl] = { color:FLOOR_COLORS[fl]||"#475569", sections:{}, order:FLOOR_ORDER.indexOf(fl)<0?99:FLOOR_ORDER.indexOf(fl) };
    if(!floors[fl].sections[sec]) floors[fl].sections[sec] = { params:[], order:sectionOrder };
    floors[fl].sections[sec].params.push(c);
  });

  var fkeys = Object.keys(floors).sort(function(a,b){ return floors[a].order - floors[b].order; });

  // First time: open first floor + all its sections
  if(fkeys.length && !Object.keys(openGroups).length){
    openGroups[fkeys[0]] = true;
    Object.keys(floors[fkeys[0]].sections).forEach(function(s){ openSections[fkeys[0]+"||"+s]=true; });
  }

  var h = "";
  fkeys.forEach(function(fl){
    var data=floors[fl], isOpen=!!openGroups[fl], color=data.color;
    var sel=0;
    Object.values(data.sections).forEach(function(sd){ sd.params.forEach(function(c){ if(selectedFids.indexOf(c.fid)>-1) sel++; }); });
    var badge = sel>0 ? '<span class="fl-badge">'+sel+'</span>' : '';

    h += '<div class="acc-group">';
    h += '<div class="acc-hdr" data-grp="'+fl+'" onclick="toggleGroup(this.dataset.grp)">';
    h += '<div class="fl-dot" style="background:'+color+'"></div>';
    h += '<span class="fl-label">'+esc(fl)+'</span>'+badge;
    h += '<span class="acc-chevron'+(isOpen?' open':'')+'">&#9658;</span>';
    h += '</div>';
    h += '<div class="acc-body'+(isOpen?' open':'')+'">';

    var secKeys = Object.keys(data.sections).sort(function(a,b){ return data.sections[a].order - data.sections[b].order; });
    secKeys.forEach(function(sec){
      var sd=data.sections[sec], secKey=fl+"||"+sec, secOpen=!!openSections[secKey];
      var secSel=sd.params.filter(function(c){ return selectedFids.indexOf(c.fid)>-1; }).length;
      var secBadge = secSel>0 ? '<span class="fl-badge" style="font-size:8px;padding:0 5px">'+secSel+'</span>' : '';

      h += '<div class="sec-group">';
      h += '<div class="sec-hdr" data-floor="'+fl+'" data-sec="'+sec+'" onclick="toggleSection(this.dataset.floor,this.dataset.sec)">';
      h += '<span class="sec-chevron'+(secOpen?' open':'')+'">&#9658;</span>';
      h += '<span class="sec-label">'+esc(sec)+'</span>'+secBadge;
      h += '</div>';
      h += '<div class="sec-body'+(secOpen?' open':'')+'">';
      sd.params.forEach(function(c){
        var isSel = selectedFids.indexOf(c.fid)>-1;
        h += '<button class="param-btn'+(isSel?' selected':'')+'\" data-fid="'+c.fid+'" onclick="toggleParam(this.dataset.fid)">';
        h += '<span class="param-name">'+esc(c.parameter)+'</span>';
        h += '<span class="param-right"><span class="param-unit">'+esc(c.unit||'')+'</span><span class="param-count">'+c.reading_count+'x</span></span>';
        h += '</button>';
      });
      h += '</div></div>';
    });
    h += '</div></div>';
  });

  document.getElementById("sb-list").innerHTML = h ||
    '<div style="padding:20px;text-align:center;font-size:12px;color:var(--t3)">No parameters found</div>';
}

function toggleGroup(fl){
  openGroups[fl]=!openGroups[fl];
  var isOpen=openGroups[fl];
  document.querySelectorAll('.acc-hdr[data-grp]').forEach(function(hdr){
    if(hdr.dataset.grp!==fl) return;
    var body=hdr.nextElementSibling, chevron=hdr.querySelector('.acc-chevron');
    if(body&&body.classList.contains('acc-body')) body.classList.toggle('open',isOpen);
    if(chevron) chevron.classList.toggle('open',isOpen);
  });
}

function toggleSection(fl,sec){
  var key=fl+"||"+sec;
  openSections[key]=!openSections[key];
  var isOpen=openSections[key];
  document.querySelectorAll('.sec-hdr[data-floor][data-sec]').forEach(function(hdr){
    if(hdr.dataset.floor!==fl||hdr.dataset.sec!==sec) return;
    var body=hdr.nextElementSibling, chevron=hdr.querySelector('.sec-chevron');
    if(body&&body.classList.contains('sec-body')) body.classList.toggle('open',isOpen);
    if(chevron) chevron.classList.toggle('open',isOpen);
  });
}










function toggleParam(fid){
  var idx = selectedFids.indexOf(fid);
  if(idx > -1){
    selectedFids.splice(idx, 1);
  } else {
    if(selectedFids.length >= 12){ alert('Max 12 parameters at once'); return; }
    selectedFids.push(fid);
  }
  renderChips();
  filterParams();
}

function renderChips(){
  var wrap = document.getElementById('selected-chips');
  wrap.innerHTML = selectedFids.map(function(fid){
    var meta = catalog.find(function(c){return c.fid===fid;});
    var label = meta ? meta.parameter : fid;
    return '<span class="chip">'+esc(label.split(' ').slice(0,3).join(' '))+'<span class="chip-x" onclick="toggleParam(\''+fid+'\')">×</span></span>';
  }).join('');
}

function clearSelected(){
  selectedFids = [];
  renderChips();
  filterParams();
  document.getElementById('charts-area').innerHTML = '<div class="empty"><div class="empty-ico">📈</div><div class="empty-title">Select parameters to plot</div></div>';
  destroyCharts();
}

async function plotSelected(){
  if(!selectedFids.length){ alert('Select at least one parameter'); return; }
  const days = document.getElementById('days-sel').value;
  const mode = document.getElementById('mode-sel').value;
  const area = document.getElementById('charts-area');
  area.innerHTML = '<div style="padding:40px;text-align:center"><div class="spinner"></div><div style="font-size:12px;color:var(--t3);margin-top:8px">Loading '+selectedFids.length+' parameters…</div></div>';
  destroyCharts();

  try{
    const data = await EOM.get('/watches/analytics?vessel_id='+vesselId+'&fids='+selectedFids.join(',')+'&days='+days);
    if(!data.series.length){ area.innerHTML = '<div class="empty"><div class="empty-ico">📭</div><div class="empty-title">No data found</div><div class="empty-sub">No readings for the selected parameters in this period.</div></div>'; return; }

    if(mode==='overlay') renderOverlay(data.series, area);
    else if(mode==='separate') renderSeparate(data.series, area);
    else renderCompare(data.series, area);
  }catch(e){ area.innerHTML = '<div class="empty"><div class="empty-ico">❌</div><div class="empty-title">'+esc(e.message)+'</div></div>'; }
}

function renderOverlay(series, area){
  // All series on one chart
  var allDates = [...new Set(series.flatMap(function(s){return s.points.map(function(p){return p.date;});}))].sort();

  var h = '<div class="chart-card"><div class="chart-head"><span class="chart-title">';
  h += series.map(function(s){return s.parameter;}).join(' · ');
  h += '</span><span style="font-size:11px;color:var(--t3)">'+allDates.length+' data points</span></div>';
  h += '<div class="chart-body" style="height:320px"><canvas id="chart_overlay"></canvas></div></div>';

  // Stats table
  h += buildStatsTable(series);
  area.innerHTML = h;

  var datasets = series.map(function(s, i){
    var dateMap = {};
    s.points.forEach(function(p){ dateMap[p.date] = p.value; });
    return {
      label: s.parameter + (s.unit?' ('+s.unit+')':''),
      data: allDates.map(function(d){ return dateMap[d] !== undefined ? dateMap[d] : null; }),
      borderColor: COLORS[i%COLORS.length],
      backgroundColor: COLORS[i%COLORS.length]+'22',
      borderWidth: 2, pointRadius: 2, tension: 0.3, fill: false, spanGaps: true
    };
  });

  var ctx = document.getElementById('chart_overlay');
  chartInstances.push(new Chart(ctx, {
    type:'line',
    data:{ labels: allDates.map(shortDate), datasets },
    options: defaultChartOpts()
  }));
}

function renderSeparate(series, area){
  var h = buildStatsTable(series);
  h += '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:16px">';
  series.forEach(function(s, i){
    var cid = 'chart_sep_'+i;
    var vals = s.points.map(function(p){return p.value;});
    var avg = vals.length ? (vals.reduce(function(a,b){return a+b;},0)/vals.length).toFixed(2) : '—';
    h += '<div class="chart-card">'
       + '<div class="chart-head"><div><div class="chart-title">'+esc(s.parameter)+'</div>'
       + '<div style="font-size:10px;color:var(--t3)">'+esc(s.equipment||s.section)+' · avg: '+avg+' '+(s.unit||'')+'</div></div></div>'
       + '<div class="chart-body" style="height:200px"><canvas id="'+cid+'"></canvas></div></div>';
  });
  h += '</div>';
  area.innerHTML = h;

  series.forEach(function(s, i){
    var ctx = document.getElementById('chart_sep_'+i);
    if(!ctx) return;
    chartInstances.push(new Chart(ctx, {
      type:'line',
      data:{
        labels: s.points.map(function(p){return shortDate(p.date);}),
        datasets:[{
          label: s.parameter,
          data: s.points.map(function(p){return p.value;}),
          borderColor: COLORS[i%COLORS.length],
          backgroundColor: COLORS[i%COLORS.length]+'22',
          borderWidth: 2, pointRadius: 2, tension: 0.3, fill: true
        }]
      },
      options: defaultChartOpts(s.unit)
    }));
  });
}

function renderCompare(series, area){
  // Bar chart comparing averages, then stats table
  var h = '<div class="chart-card"><div class="chart-head"><span class="chart-title">Parameter Comparison — Average Values</span></div>';
  h += '<div class="chart-body" style="height:300px"><canvas id="chart_compare"></canvas></div></div>';
  h += buildStatsTable(series);
  area.innerHTML = h;

  var ctx = document.getElementById('chart_compare');
  var avgs = series.map(function(s){
    var vals = s.points.map(function(p){return p.value;});
    return vals.length ? +(vals.reduce(function(a,b){return a+b;},0)/vals.length).toFixed(2) : 0;
  });

  chartInstances.push(new Chart(ctx, {
    type:'bar',
    data:{
      labels: series.map(function(s){return s.parameter.split(' ').slice(0,3).join(' ');}),
      datasets:[{
        label:'Average',
        data: avgs,
        backgroundColor: COLORS.slice(0, series.length).map(function(c){return c+'cc';}),
        borderRadius: 6
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){ return c.parsed.y + ' ' + (series[c.dataIndex].unit||''); }}}},
      scales:{
        x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#475569',font:{size:11}}},
        y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#475569',font:{size:10}},beginAtZero:false}
      }
    }
  }));
}

function buildStatsTable(series){
  var h = '<div class="chart-card"><div class="chart-head"><span class="chart-title">Statistical Summary</span></div>';
  h += '<div style="overflow-x:auto"><table class="comp-tbl"><thead><tr>';
  h += '<th style="text-align:left;min-width:200px">Parameter</th><th>Equipment</th><th>Readings</th><th>Min</th><th>Avg</th><th>Max</th><th>Latest</th><th>Trend</th></tr></thead><tbody>';

  series.forEach(function(s){
    var vals = s.points.map(function(p){return p.value;});
    if(!vals.length) return;
    var min = Math.min.apply(null,vals);
    var max = Math.max.apply(null,vals);
    var avg = (vals.reduce(function(a,b){return a+b;},0)/vals.length).toFixed(2);
    var latest = vals[vals.length-1];
    // Simple trend: compare last 3 vs first 3
    var trend = '—'; var tClass = 'trend-flat';
    if(vals.length >= 6){
      var firstAvg = (vals.slice(0,3).reduce(function(a,b){return a+b;},0)/3);
      var lastAvg  = (vals.slice(-3).reduce(function(a,b){return a+b;},0)/3);
      var pct = ((lastAvg-firstAvg)/firstAvg*100).toFixed(1);
      if(Math.abs(parseFloat(pct)) < 1){ trend='→ stable'; tClass='trend-flat'; }
      else if(parseFloat(pct)>0){ trend='↑ +'+pct+'%'; tClass='trend-up'; }
      else { trend='↓ '+pct+'%'; tClass='trend-dn'; }
    }
    var u = s.unit||'';
    h += '<tr>'
       + '<td><span style="font-weight:600">'+esc(s.parameter)+'</span> <span style="color:var(--t3);font-size:10px">'+u+'</span></td>'
       + '<td style="color:var(--t3)">'+esc(s.equipment||s.section)+'</td>'
       + '<td>'+vals.length+'</td>'
       + '<td>'+min+'</td>'
       + '<td style="font-weight:600">'+avg+'</td>'
       + '<td>'+max+'</td>'
       + '<td style="color:var(--blue)">'+latest+'</td>'
       + '<td class="'+tClass+'">'+trend+'</td>'
       + '</tr>';
  });

  h += '</tbody></table></div></div>';
  return h;
}

function defaultChartOpts(unit){
  return {
    responsive:true, maintainAspectRatio:false, interaction:{mode:'index',intersect:false},
    plugins:{
      legend:{labels:{color:'#94a3b8',font:{size:11},boxWidth:12}},
      tooltip:{callbacks:{label:function(c){return ' '+c.dataset.label+': '+c.parsed.y+(unit?' '+unit:'');}}}
    },
    scales:{
      x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#475569',font:{size:10},maxTicksLimit:12}},
      y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#475569',font:{size:10}}}
    }
  };
}

function destroyCharts(){
  chartInstances.forEach(function(c){try{c.destroy();}catch(e){}});
  chartInstances=[];
}

function shortDate(d){
  if(!d) return '';
  var p = d.split('-');
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return p[2]+' '+months[parseInt(p[1])-1];
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showMsg(type,msg){ document.getElementById('charts-area').innerHTML='<div class="empty"><div class="empty-ico">❌</div><div class="empty-title">'+esc(msg)+'</div></div>'; }

// Patch EOM with get if missing
if(typeof EOM!=='undefined' && !EOM.get){
  EOM.get=async function(path){
    const token=localStorage.getItem('eom_token');
    const r=await fetch('/api'+path,{headers:{'Authorization':'Bearer '+token}});
    const d=await r.json(); if(!r.ok) throw new Error(d.error||'Failed'); return d;
  };
}
</script>
