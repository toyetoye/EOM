<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>FORCAP · Engine Room Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="/eom-api.js"></script>
<style>


[data-theme="light"]{--canvas:#E8ECF2;--app:#FFFFFF;--sidebar:#131C2E;--sidebar-hover:rgba(255,255,255,0.06);--sidebar-active:rgba(255,255,255,0.12);--sidebar-t1:#F1F5F9;--sidebar-t2:#94A3B8;--sidebar-t3:#475569;--sidebar-line:rgba(255,255,255,0.08);--surface:#FFFFFF;--surface2:#EEF1F6;--line:#D0D5DD;--line2:#C0C8D6;--t1:#101828;--t2:#475467;--t3:#98A2B3;--t4:#D0D5DD;--blue:#1264D8;--blue2:#1044B8;--blue-soft:#EFF4FF;--blue-mid:rgba(18,100,216,.15);--inp-bg:#FFFFFF;--inp-bd:#C8D0DC;--hover:#F0F4F9;--selected:#E0EBFF;--shadow:0 2px 6px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);--field-line:rgba(0,0,0,0.09);color-scheme:light}
[data-theme="dark"]{--canvas:#070C17;--app:#0F1621;--sidebar:#0B1120;--sidebar-hover:rgba(255,255,255,0.05);--sidebar-active:rgba(255,255,255,0.1);--sidebar-t1:#E2E8F0;--sidebar-t2:#94A3B8;--sidebar-t3:#475569;--sidebar-line:rgba(255,255,255,0.07);--surface:#0F1621;--surface2:#151E2D;--line:rgba(255,255,255,.08);--line2:rgba(255,255,255,.14);--t1:#F1F5F9;--t2:#94A3B8;--t3:#475569;--t4:#2D3F57;--blue:#3B82F6;--blue2:#2563EB;--blue-soft:rgba(59,130,246,.1);--blue-mid:rgba(59,130,246,.2);--inp-bg:#151E2D;--inp-bd:rgba(255,255,255,.12);--hover:rgba(255,255,255,.04);--selected:rgba(59,130,246,.12);--shadow:0 2px 8px rgba(0,0,0,.4);--field-line:rgba(255,255,255,0.06);color-scheme:dark}
:root{--ok:#12B76A;--warn:#F79009;--alm:#F04438;--font:'Inter',-apple-system,sans-serif;--mono:'JetBrains Mono',monospace;--r:8px;--rsm:6px}
[data-theme="light"]{--ok-bg:#DCFCE7;--ok-bd:#86EFAC;--ok-tx:#15803D;--wn-bg:#FEF3C7;--wn-bd:#FCD34D;--wn-tx:#92400E;--al-bg:#FEF3F2;--al-bd:#FECDCA;--al-tx:#B42318}
[data-theme="dark"]{--ok-bg:rgba(18,183,106,.15);--ok-bd:rgba(18,183,106,.4);--ok-tx:#4ADE80;--wn-bg:rgba(247,144,9,.15);--wn-bd:rgba(247,144,9,.4);--wn-tx:#FBBF24;--al-bg:rgba(240,68,56,.1);--al-bd:rgba(240,68,56,.25);--al-tx:#F87171}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--canvas);color:var(--t1);font-size:14px;display:flex;flex-direction:column;transition:background .2s,color .2s}

/* TOPBAR */
.topbar{height:56px;background:var(--app);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 14px;gap:12px;flex-shrink:0;box-shadow:var(--shadow);z-index:20;transition:background .2s;position:relative}
.brand{display:flex;align-items:center;gap:8px;padding-right:14px;border-right:1px solid var(--line)}
.logo{width:36px;height:36px;background:var(--blue2);border-radius:var(--rsm);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:800;letter-spacing:-.5px;box-shadow:0 2px 8px rgba(18,68,184,.3)}
.brand-txt{font-size:16px;font-weight:700;letter-spacing:-.4px}
.vessel-chip{display:flex;align-items:center;gap:6px;padding:4px 10px;background:var(--surface2);border:1px solid var(--line);border-radius:20px;font-size:12px;color:var(--t2);font-weight:500;font-family:var(--font)}
.run-dot{width:7px;height:7px;border-radius:50%;background:var(--ok)}
.g-status{display:flex;align-items:center;gap:5px;padding:3px 10px;border-radius:12px;border:1px solid;font-size:11px;font-weight:600;transition:all .2s}
.g-status.ok{background:var(--ok-bg);border-color:var(--ok-bd);color:var(--ok-tx)}
.g-status.g-status.neutral{background:var(--surface2);border-color:var(--line2);color:var(--t3)}
.g-status.warn{background:var(--wn-bg);border-color:var(--wn-bd);color:var(--wn-tx)}
.g-status.alm{background:var(--al-bg);border-color:var(--al-bd);color:var(--al-tx)}
.gsd{width:6px;height:6px;border-radius:50%;background:currentColor}
.topbar-mid{flex:1;display:flex;align-items:center;justify-content:center}
.topbar-right{display:flex;align-items:center;gap:10px;padding-left:12px;border-left:1px solid var(--line);font-size:11.5px;color:var(--t2)}
.topbar-right label{display:flex;align-items:center;gap:5px;font-weight:500}
.topbar-right input,.topbar-right select{border:1px solid var(--inp-bd);background:var(--inp-bg);color:var(--t1);border-radius:var(--rsm);padding:4px 8px;font-size:12px;font-family:var(--font);outline:none;font-weight:500}
.topbar-right input:focus,.topbar-right select:focus{border-color:var(--blue)}
.theme-toggle{display:flex;align-items:center;gap:2px;background:var(--surface2);border:1px solid var(--line);border-radius:20px;padding:3px}
.tt{width:28px;height:22px;border-radius:14px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:background .15s;color:var(--t3)}
.tt.on{background:var(--app);box-shadow:var(--shadow);color:var(--t1)}

/* LAYOUT */
.app{display:grid;grid-template-columns:242px 1fr 284px;grid-template-rows:1fr;flex:1;overflow:hidden;min-height:0}

/* LEFT */
.left{background:var(--sidebar);border-right:none;display:flex;flex-direction:column;overflow:hidden;transition:background .2s;box-shadow:4px 0 20px rgba(0,0,0,0.2)}
/* Logo block — matches UiUX blue accent header */
.left-logo{padding:16px 16px 14px;border-bottom:1px solid var(--sidebar-line);display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.02)}
.left-logo-icon{width:36px;height:36px;background:var(--blue);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0;letter-spacing:-.5px;box-shadow:0 3px 10px rgba(18,100,216,.4)}
.left-logo-txt{font-size:16px;font-weight:800;color:#fff;letter-spacing:-.3px;font-family:var(--font)}
.left-logo-sub{font-size:10px;color:var(--sidebar-t3);margin-top:1px;font-family:var(--font)}
/* Nav section label */
.left-head{padding:12px 14px 6px;border-bottom:none;display:flex;align-items:center;gap:9px}
.left-head-txt{font-size:10px;font-weight:700;letter-spacing:.8px;color:var(--sidebar-t3);text-transform:uppercase;font-family:var(--font)}
.ls{flex:1;overflow-y:auto;padding:6px 10px 10px}
.ls::-webkit-scrollbar{width:3px}
.ls::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
.loc-h{display:flex;align-items:center;gap:7px;padding:7px 6px 4px;font-size:9.5px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--t3);margin-top:5px;border-top:1px solid var(--line)}
.loc-h:first-child{border-top:none;margin-top:0;padding-top:4px}
.loc-pip{width:7px;height:7px;border-radius:2px;flex-shrink:0}
.eq{display:flex;align-items:center;gap:10px;width:100%;padding:9px 12px;border:none;background:transparent;border-radius:10px;cursor:pointer;text-align:left;font-family:var(--font);transition:all .15s;position:relative;margin-bottom:2px}
.eq:hover{background:var(--sidebar-hover)}
.eq.active{background:var(--blue);box-shadow:0 3px 12px rgba(18,100,216,.35)}
.eq.active .eq-name{color:#fff;font-weight:700}
.eq.active .eq-sub{display:none}
.eq.active .eq-badge{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.28);color:#fff}
.eq.active .eq-ico{opacity:1}
.eq-ico{font-size:15px;flex-shrink:0;opacity:.7}
.eq-ico{font-size:14px;flex-shrink:0}
.eq-body{flex:1;min-width:0}
.eq-name{font-size:13px;font-weight:500;color:var(--sidebar-t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.eq-sub{font-size:10px;color:var(--sidebar-t2);margin-top:1px;opacity:.7}
.eq-badge{font-size:8.5px;font-weight:700;padding:1.5px 6px;border-radius:8px;flex-shrink:0;border:1px solid transparent}
.eq-badge.ok{background:var(--ok-bg);border-color:var(--ok-bd);color:var(--ok-tx)}
.eq-badge.warn{background:var(--wn-bg);border-color:var(--wn-bd);color:var(--wn-tx)}
.eq-badge.alm{background:var(--al-bg);border-color:var(--al-bd);color:var(--al-tx)}
.eq-badge.dim{background:rgba(255,255,255,0.06);color:var(--sidebar-t2);border-color:rgba(255,255,255,0.1)}
.left-foot{padding:12px 10px;border-top:1px solid var(--sidebar-line);background:rgba(0,0,0,.15);flex-shrink:0;transition:background .2s}
.prog-row{display:flex;justify-content:space-between;font-size:10.5px;color:var(--sidebar-t2);margin-bottom:5px}
.prog-track{height:3px;background:rgba(255,255,255,0.1);border-radius:2px;margin-bottom:10px;overflow:hidden}
.prog-bar{height:100%;background:var(--blue);border-radius:2px;transition:width .4s}
.btn-submit{width:100%;padding:9px;border-radius:var(--r);border:none;background:var(--blue);color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);transition:background .15s}
.btn-submit:hover{background:var(--blue2)}

/* MIDDLE */
.mid{display:flex;flex-direction:column;overflow:hidden;background:var(--canvas);transition:background .2s}
.tabs{display:flex;align-items:center;background:var(--app);border-bottom:1px solid var(--line2);padding:10px 18px;flex-shrink:0;gap:0;overflow-x:auto;transition:background .2s}
.tabs::-webkit-scrollbar{height:0}
/* Pill container wrapping all tabs */
.tab-pill-wrap{display:flex;align-items:center;flex-wrap:nowrap;background:var(--surface2);border:1px solid var(--line2);border-radius:10px;padding:4px;gap:3px;flex-shrink:0;overflow-x:auto}
.tab{display:flex;align-items:center;gap:6px;padding:7px 16px;height:auto;border:none;background:transparent;font-size:13px;font-weight:500;color:var(--t3);cursor:pointer;border-radius:8px;font-family:var(--font);transition:all .15s;white-space:nowrap;flex-shrink:0}
.tab:hover{color:var(--t2);background:rgba(0,0,0,.04)}
[data-theme="dark"] .tab:hover{background:rgba(255,255,255,.06)}
.tab.active{background:var(--app);color:var(--t1);font-weight:700;box-shadow:0 1px 6px rgba(0,0,0,.12),0 0 0 1px var(--line2)}
.tab-badge{font-size:9px;padding:1px 5px;border-radius:8px;font-weight:700}
.tab-badge.warn{background:var(--wn-bg);color:var(--wn-tx);border:1px solid var(--wn-bd)}
.tab-badge.alm{background:var(--al-bg);color:var(--al-tx);border:1px solid var(--al-bd)}
.mb{flex:1;overflow-y:auto;padding:12px 18px 40px}
.mb::-webkit-scrollbar{width:5px}
.mb::-webkit-scrollbar-thumb{background:var(--line2);border-radius:3px}
.eq-hdr{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.eq-hdr-icon{width:36px;height:36px;border-radius:var(--r);background:var(--blue-soft);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.eq-hdr-name{font-size:16px;font-weight:700;letter-spacing:-.3px;font-family:var(--font)}
.eq-hdr-sub{font-size:11px;color:var(--t3);margin-top:1px;font-family:var(--font)}

/* SECTION CARD */
.sc{background:var(--surface);border:1.5px solid var(--line2);border-radius:var(--r);margin-bottom:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.07),0 1px 3px rgba(0,0,0,.05);transition:background .2s,border-color .2s}
.sch{display:flex;align-items:center;gap:8px;padding:6px 14px;border-bottom:1.5px solid var(--line2);background:var(--surface2);min-height:0}
.sch-ico{font-size:12px}.sch-lbl{font-size:12.5px;font-weight:700;color:var(--t1);flex:1;font-family:var(--font)}
.sc-st{font-size:9.5px;font-weight:600;padding:2px 8px;border-radius:10px;border:1px solid;white-space:nowrap}
.sc-st.ok{background:var(--ok-bg);border-color:var(--ok-bd);color:var(--ok-tx)}
.sc-st.warn{background:var(--wn-bg);border-color:var(--wn-bd);color:var(--wn-tx)}
.sc-st.alm{background:var(--al-bg);border-color:var(--al-bd);color:var(--al-tx)}
.sc-st.empty{background:transparent;border-color:var(--line);color:var(--t3);font-size:10px}

/* UNIT TOGGLES */
.unit-toggles{display:flex;flex-wrap:wrap;align-items:center;gap:16px;padding:11px 14px;border-bottom:1.5px solid var(--line2);background:var(--surface2)}
.utog-lbl{font-size:10.5px;font-weight:700;letter-spacing:.5px;color:var(--t3);text-transform:uppercase;font-family:var(--font);margin-right:4px;flex-shrink:0}
.utog{display:flex;align-items:center;gap:10px;cursor:default;font-size:12.5px;font-weight:500;font-family:var(--font);color:var(--t2)}
.utog.run .utog-name{color:var(--t1)}
.utog.stop .utog-name{color:var(--t3)}

/* FIELD ROWS */
.fl{padding:2px 14px 6px}
.fr{display:grid;grid-template-columns:1fr 94px 46px 52px;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--line2)}
.fr:last-child{border-bottom:none}
.fr.stopped,.fr2.stopped{opacity:.3;pointer-events:none}
.flbl{font-size:13px;color:var(--t2);font-family:var(--font)}
.finp{padding:4px 7px;border:1.5px solid var(--inp-bd);border-radius:var(--rsm);background:var(--inp-bg);color:var(--t1);font-size:13px;font-family:var(--mono);text-align:right;outline:none;width:100%;transition:all .12s;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.finp::placeholder{color:var(--t4)}
.finp:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-mid)}
.finp.ok{border-color:var(--ok);color:var(--ok-tx);background:var(--ok-bg)}
.finp.warn{border-color:var(--warn);color:var(--wn-tx);background:var(--wn-bg)}
.finp.alm{border-color:var(--alm);color:var(--al-tx);background:var(--al-bg)}
.funit{font-size:11px;color:var(--t2);font-family:var(--font);font-weight:500}

/* DUAL ROW (suction/discharge) */
.fr2{display:grid;grid-template-columns:1fr 88px 42px 88px 42px;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--line)}
.fr2:last-child{border-bottom:none}

/* CYLINDER TABLE */
.cyl-sc{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow);transition:background .2s}
.cyl-h{display:flex;align-items:center;gap:8px;padding:6px 14px;background:var(--surface2);border-bottom:1.5px solid var(--line2)}
.cyl-hw{overflow-x:auto}
.ctbl{width:100%;border-collapse:collapse;font-size:11.5px}
.ctbl th{background:var(--surface2);padding:6px 8px;font-size:10px;font-weight:700;color:var(--t3);border-bottom:1px solid var(--line);text-align:center;white-space:nowrap;font-family:var(--font)}
.ctbl th.plbl{text-align:left;padding-left:14px;min-width:130px}
.ctbl tr{border-bottom:1px solid var(--line)}
.ctbl tr:last-child{border-bottom:none}
.ctbl tr:hover td{background:var(--hover)}
.ctbl td{padding:4px 5px;text-align:center;vertical-align:middle;font-size:12px}
.ctbl td.pname{text-align:left;padding-left:14px;font-size:13px;color:var(--t2);font-family:var(--font)}
.ctbl td.uname{font-size:9.5px;color:var(--t3);font-family:var(--mono)}
.ci{width:54px;padding:4px 4px;border:1px solid var(--inp-bd);border-radius:5px;background:var(--inp-bg);color:var(--t1);font-size:11px;font-family:var(--mono);text-align:center;outline:none;transition:all .12s}
.ci:focus{border-color:var(--blue);box-shadow:0 0 0 2px var(--blue-mid)}
.ci.ok{border-color:var(--ok);color:var(--ok-tx);background:var(--ok-bg)}
.ci.warn{border-color:var(--warn);color:var(--wn-tx);background:var(--wn-bg)}
.ci.alm{border-color:var(--alm);color:var(--al-tx);background:var(--al-bg)}
.avg-c{font-family:var(--mono);font-size:11px;color:var(--t3)}
.avg-c.warn{color:var(--wn-tx);font-weight:600}.avg-c.alm{color:var(--al-tx);font-weight:600}
.dev-insight{margin:5px 14px 10px;padding:8px 10px;border-radius:var(--rsm);border:1px solid var(--line);background:var(--surface2);font-size:11px;color:var(--t2);display:flex;align-items:center;gap:8px}
.dev-insight.warn{background:var(--wn-bg);border-color:var(--wn-bd);color:var(--wn-tx)}

/* AI HINT */
.ai-hint{display:flex;align-items:flex-start;gap:8px;padding:10px 14px;background:var(--blue-soft);border:1.5px solid var(--blue-mid);border-radius:var(--r);margin-bottom:12px;font-size:12px;color:var(--blue);font-family:var(--font)}
.ai-lbl{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;margin-bottom:2px;opacity:.7;font-family:var(--font)}

/* SAVE ROW */
.save-row{display:flex;justify-content:flex-end;gap:8px;padding:12px 0 2px}
.btn-ghost{padding:8px 20px;border-radius:var(--rsm);border:1.5px solid var(--line2);background:var(--surface);font-size:13px;font-weight:600;cursor:pointer;color:var(--t2);font-family:var(--font);transition:all .1s}
.btn-ghost:hover{background:var(--hover);color:var(--t1)}
.btn-primary{padding:8px 24px;border-radius:var(--rsm);border:none;background:var(--blue);color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);transition:background .15s;box-shadow:0 2px 8px rgba(18,100,216,.3)}
.btn-primary:hover{background:var(--blue2)}
.btn-primary.saved{background:var(--ok-bg);color:var(--ok-tx);border:1px solid var(--ok-bd)}

/* EMPTY STATE */
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:60px;text-align:center;color:var(--t3)}
.es-ico{font-size:48px;opacity:.2}.es-ttl{font-size:14px;font-weight:600;color:var(--t2)}.es-sub{font-size:12px;line-height:1.5;max-width:280px}

/* RIGHT */
.right{background:var(--app);border-left:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden;transition:background .2s}
.rh{padding:10px 14px 8px;border-bottom:1px solid var(--line);background:var(--surface2);font-size:9.5px;font-weight:700;letter-spacing:1px;color:var(--t3);text-transform:uppercase;flex-shrink:0}
.rs{flex:1;overflow-y:auto;padding:10px}
.rs::-webkit-scrollbar{width:3px}
.rs::-webkit-scrollbar-thumb{background:var(--line2)}
.alm-blk{padding:8px 10px;background:var(--al-bg);border:1px solid var(--al-bd);border-radius:var(--rsm);margin-bottom:8px}
.alm-ttl{font-size:11px;font-weight:700;color:var(--al-tx);margin-bottom:4px}
.alm-row{font-size:10.5px;color:var(--al-tx);padding:1px 0}
.wn-blk{padding:8px 10px;background:var(--wn-bg);border:1px solid var(--wn-bd);border-radius:var(--rsm);margin-bottom:8px}
.wn-ttl{font-size:11px;font-weight:700;color:var(--wn-tx);margin-bottom:3px}
.wn-row{font-size:10.5px;color:var(--wn-tx);padding:1px 0}
.ok-blk{padding:8px 10px;background:var(--ok-bg);border:1px solid var(--ok-bd);border-radius:var(--rsm);margin-bottom:8px;font-size:11px;font-weight:600;color:var(--ok-tx)}
.floor-card{border:1px solid var(--line);border-radius:var(--rsm);margin-bottom:7px;overflow:hidden}
.fc-h{display:flex;align-items:center;gap:7px;padding:6px 10px;background:var(--surface2);border-bottom:1px solid var(--line);font-size:11px;font-weight:700;color:var(--t1);font-family:var(--font)}
.fp{width:7px;height:7px;border-radius:2px;flex-shrink:0}
.fp.ok{background:var(--ok)}.fp.warn{background:var(--warn)}.fp.alm{background:var(--alm)}.fp.dim{background:var(--t4)}
.fc-items{padding:3px 6px 4px}
.mr{display:flex;align-items:center;padding:4px 5px;border-radius:4px;cursor:pointer;transition:background .1s;gap:5px}
.mr:hover{background:var(--hover)}
.mn{font-size:12px;color:var(--t2);font-weight:500;flex:1;font-family:var(--font)}
.mv{font-size:11px;font-family:var(--mono);color:var(--t3)}
.mv.warn{color:var(--wn-tx);font-weight:600}.mv.alm{color:var(--al-tx);font-weight:600}
.md{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.md.ok{background:var(--ok)}.md.warn{background:var(--warn)}.md.alm{background:var(--alm);animation:pa .8s ease infinite}.md.dim{background:var(--t4)}
@keyframes pa{0%,100%{box-shadow:0 0 0 0 rgba(240,68,56,.4)}50%{box-shadow:0 0 0 4px rgba(240,68,56,0)}}

/* EQUIPMENT STATS STRIP (Area 1) */
.eq-hdr{display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:nowrap}
.eq-hdr-left{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
.eq-stats-strip{display:flex;gap:8px;flex-shrink:0;align-items:center}
.eq-stat{display:flex;flex-direction:column;align-items:center;padding:5px 12px;background:var(--surface);border:1px solid var(--line);border-radius:var(--rsm);min-width:72px;text-align:center}
.eq-stat-val{font-size:14px;font-weight:700;color:var(--t1);font-family:var(--mono);line-height:1.1}
.eq-stat-lbl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;font-weight:600;font-family:var(--font)}
.eq-stat.ok-stat{border-color:var(--ok-bd);background:var(--ok-bg)}
.eq-stat.ok-stat .eq-stat-val{color:var(--ok-tx)}

/* PREVIOUS WATCH GHOST (Area 2) */
.pw-val{font-size:10px;color:var(--t3);font-family:var(--mono);text-align:right;white-space:nowrap;padding-left:4px;min-width:60px}
.pw-val.up{color:var(--warn)}
.pw-val.dn{color:var(--blue)}
.pw-val.alm{color:var(--alm)}
.pw-hdr{font-size:9.5px;font-weight:700;letter-spacing:.5px;color:var(--t3);text-transform:uppercase;text-align:right;opacity:.7;font-family:var(--font)}

/* WATCH HISTORY TABLE (Area 3) */
.watch-hist{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);margin-top:6px;overflow:hidden;box-shadow:var(--shadow)}
.wh-head{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;background:var(--surface2);border-bottom:1.5px solid var(--line2)}
.wh-title{font-size:13px;font-weight:700;color:var(--t1);font-family:var(--font)}
.wh-meta{font-size:11px;color:var(--t3);font-family:var(--font)}
.wh-scroll{overflow-x:auto}
.whtbl{width:100%;border-collapse:collapse;font-size:11.5px}
.whtbl th{background:var(--surface2);padding:5px 10px;font-size:10px;font-weight:700;color:var(--t3);border-bottom:1px solid var(--line);text-align:center;white-space:nowrap;font-family:var(--font)}
.whtbl th.pname{text-align:left;padding-left:14px;min-width:160px}
.whtbl tr{border-bottom:1px solid var(--line)}
.whtbl tr:last-child{border-bottom:none}
.whtbl tr:hover td{background:var(--hover)}
.whtbl td{padding:4px 10px;text-align:center;font-family:var(--mono);font-size:12px;color:var(--t2)}
.whtbl td.pname{text-align:left;padding-left:14px;font-family:var(--font);color:var(--t2);font-size:12.5px}
.whtbl td.curr{font-weight:700;color:var(--t1)}
.whtbl td.curr.ok{color:var(--ok-tx)}.whtbl td.curr.warn{color:var(--wn-tx)}.whtbl td.curr.alm{color:var(--al-tx)}
.trend-up::after{content:' ↑';color:var(--warn);font-size:9px}
.trend-dn::after{content:' ↓';color:var(--blue);font-size:9px}
.trend-ok::after{content:' →';color:var(--t3);font-size:9px}
.no-hist{padding:20px;text-align:center;color:var(--t3);font-size:11px}

/* EQUIPMENT REMARKS */
.eq-remarks{background:var(--surface);border:1.5px solid var(--line2);border-radius:var(--r);margin-top:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.eq-rem-head{display:flex;align-items:center;gap:8px;padding:7px 14px;background:var(--surface2);border-bottom:1.5px solid var(--line2)}
.eq-rem-body{padding:10px 14px 12px}

/* Stronger left-bar accent on active item */
.eq.active::before{width:3px}

/* Loc pip bigger */
.loc-pip{width:8px;height:8px}

/* UNIT SELECTOR TABS — for multi-unit equipment */
.unit-sel{display:flex;align-items:center;gap:6px;padding:10px 14px;border-bottom:1px solid var(--line);background:var(--surface2);flex-wrap:wrap}
.unit-sel-lbl{font-size:10px;font-weight:700;letter-spacing:.8px;color:var(--t2);text-transform:uppercase;margin-right:6px;white-space:nowrap}
.usel{display:flex;align-items:center;gap:7px;padding:7px 14px;border:1.5px solid var(--line2);border-radius:var(--rsm);background:var(--surface);cursor:pointer;font-size:12.5px;font-weight:600;font-family:var(--font);transition:all .15s;color:var(--t2)}
.usel:hover{border-color:var(--blue);color:var(--t1);background:var(--hover)}
.usel.active{background:var(--blue-soft);border-color:var(--blue);color:var(--blue)}
.usel .ud{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.usel.run-unit .ud{background:var(--ok)}
.usel.stop-unit .ud{background:var(--t4)}
.usel.stop-unit{opacity:.65}
/* Stop/run mini toggle inside unit tab */
.usel-tog{margin-left:6px;font-size:9.5px;padding:1px 7px;border-radius:10px;border:1px solid;cursor:pointer;font-weight:700;font-family:var(--font);transition:all .15s;flex-shrink:0}
.usel-tog.run{background:var(--ok-bg);border-color:var(--ok-bd);color:var(--ok-tx)}
.usel-tog.stop{background:var(--surface2);border-color:var(--line);color:var(--t3)}
/* Fields from stopped unit greyed */
.unit-fields.stopped-unit{opacity:.3;pointer-events:none}
.unit-fields{animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(2px)}to{opacity:1;transform:translateY(0)}}

/* CLOCK */
.topbar-clock{display:flex;align-items:center;gap:6px;padding:5px 12px;background:var(--surface2);border:1px solid var(--line);border-radius:var(--r);font-family:var(--mono);font-size:14px;font-weight:600;color:var(--t1);letter-spacing:1px;min-width:95px;justify-content:center}
.clock-colon{animation:blink-cl 1s step-start infinite;opacity:1}
@keyframes blink-cl{50%{opacity:.2}}


/* Remarks textarea */
.fta{width:100%;padding:14px 16px;border-radius:8px;border:1.5px solid var(--inp-bd);background:var(--inp-bg);color:var(--t1);font-size:13.5px;font-family:var(--font);resize:vertical;outline:none;min-height:200px;height:200px;line-height:1.7;box-shadow:inset 0 2px 4px rgba(0,0,0,.04);display:block;transition:border-color .15s;resize:vertical}
.fta:focus{border-color:var(--blue);box-shadow:inset 0 2px 4px rgba(0,0,0,.04),0 0 0 3px var(--blue-mid)}
/* ── iOS Toggle Switch ── */
.sw{position:relative;display:inline-flex;align-items:center;cursor:pointer;flex-shrink:0}
.sw input{opacity:0;width:0;height:0;position:absolute}
.sw-track{
  display:block;width:40px;height:22px;border-radius:11px;
  background:var(--t4);
  transition:background .2s;
  position:relative;
  box-shadow:inset 0 1px 3px rgba(0,0,0,.15);
}
.sw input:checked+.sw-track{background:var(--blue);}
.sw input:checked+.sw-track{box-shadow:inset 0 1px 3px rgba(18,100,216,.3),0 0 0 3px rgba(18,100,216,.1);}
.sw-thumb{
  position:absolute;
  top:2px;left:2px;
  width:18px;height:18px;border-radius:50%;
  background:#fff;
  box-shadow:0 1px 4px rgba(0,0,0,.25);
  transition:transform .2s cubic-bezier(.34,1.2,.64,1);
}
.sw input:checked~.sw-track .sw-thumb,
.sw input:checked+.sw-track .sw-thumb{transform:translateX(18px);}
/* unit-status label next to toggle */
.sw-label{font-size:11px;font-weight:600;font-family:var(--font);color:var(--t3);margin-left:4px;min-width:45px}
.sw input:checked~.sw-label{color:var(--ok-tx)}

/* In usel (unit pill) - smaller toggle */
.usel .sw-track{width:32px;height:18px;border-radius:9px}
.usel .sw-thumb{width:14px;height:14px;}
.usel .sw input:checked~.sw-track .sw-thumb,
.usel .sw input:checked+.sw-track .sw-thumb{transform:translateX(14px);}

/* ── DASHBOARD ── */
.dash-btn{display:flex;align-items:center;gap:10px;width:100%;padding:9px 12px;border:none;border-radius:10px;cursor:pointer;text-align:left;font-family:var(--font);transition:all .15s;margin-bottom:6px;font-size:13px;font-weight:600;color:var(--sidebar-t1);background:transparent}
.dash-btn:hover{background:var(--sidebar-hover)}
.dash-btn.active{background:var(--blue);color:#fff;box-shadow:0 3px 12px rgba(18,100,216,.35)}
.dash-btn .db-ico{font-size:16px;flex-shrink:0;opacity:.75}
.dash-btn.active .db-ico{opacity:1}
.dash-divider{height:1px;background:var(--sidebar-line);margin:4px 12px 8px}

/* Dashboard view */
.dashboard-view{flex:1;overflow-y:auto;padding:20px;background:var(--canvas)}

.dashboard-view::-webkit-scrollbar{width:5px}
.dashboard-view::-webkit-scrollbar-thumb{background:var(--line2);border-radius:3px}
.db-header{margin-bottom:20px}
.db-title{font-size:22px;font-weight:700;letter-spacing:-.4px;color:var(--t1);font-family:var(--font)}
.db-sub{font-size:12.5px;color:var(--t3);margin-top:3px;font-family:var(--font)}

/* Summary stat cards */
.db-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.db-stat{background:var(--surface);border:1.5px solid var(--line2);border-radius:var(--r);padding:16px 18px;box-shadow:0 2px 6px rgba(0,0,0,.06)}
.db-stat-icon{font-size:22px;margin-bottom:8px}
.db-stat-val{font-size:26px;font-weight:700;color:var(--t1);font-family:var(--mono);letter-spacing:-.5px}
.db-stat-label{font-size:11.5px;color:var(--t3);margin-top:4px;font-family:var(--font);font-weight:500}
.db-stat.ok-card{border-color:var(--ok-bd);background:var(--ok-bg)}
.db-stat.ok-card .db-stat-val{color:var(--ok-tx)}
.db-stat.warn-card{border-color:var(--wn-bd);background:var(--wn-bg)}
.db-stat.warn-card .db-stat-val{color:var(--wn-tx)}
.db-stat.alm-card{border-color:var(--al-bd);background:var(--al-bg)}
.db-stat.alm-card .db-stat-val{color:var(--al-tx)}

/* Deck status grid */
.db-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px}
.db-deck-card{background:var(--surface);border:1.5px solid var(--line2);border-radius:var(--r);overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.06)}
.db-deck-head{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1.5px solid var(--line2);background:var(--surface2)}
.db-deck-pip{width:9px;height:9px;border-radius:3px;flex-shrink:0}
.db-deck-title{font-size:12.5px;font-weight:700;color:var(--t1);flex:1;font-family:var(--font)}
.db-deck-count{font-size:10.5px;color:var(--t3);font-family:var(--mono)}
.db-eq-row{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .12s}
.db-eq-row:last-child{border-bottom:none}
.db-eq-row:hover{background:var(--hover)}
.db-eq-name{font-size:12.5px;color:var(--t2);flex:1;font-family:var(--font);font-weight:500}
.db-eq-filled{font-size:11px;color:var(--t3);font-family:var(--mono);margin-right:8px}
.db-eq-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.db-eq-dot.ok{background:var(--ok)}.db-eq-dot.warn{background:var(--warn)}.db-eq-dot.alm{background:var(--alm)}.db-eq-dot.dim{background:var(--t4)}
@keyframes pulse-alm2{0%,100%{box-shadow:0 0 0 0 rgba(240,68,56,.5)}50%{box-shadow:0 0 0 5px rgba(240,68,56,0)}}
.db-eq-dot.alm{animation:pulse-alm2 .9s ease infinite}

/* Watch summary */
.db-watch-row{background:var(--surface);border:1.5px solid var(--line2);border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;gap:16px;box-shadow:0 2px 6px rgba(0,0,0,.06);margin-bottom:12px}
.db-watch-icon{font-size:28px;flex-shrink:0}
.db-watch-body{flex:1}
.db-watch-title{font-size:14px;font-weight:700;color:var(--t1);font-family:var(--font)}
.db-watch-detail{font-size:12px;color:var(--t2);margin-top:3px;font-family:var(--font)}
.db-watch-action{padding:7px 18px;border-radius:var(--rsm);border:none;background:var(--blue);color:#fff;font-size:12.5px;font-weight:600;cursor:pointer;font-family:var(--font);box-shadow:0 2px 8px rgba(18,100,216,.25);flex-shrink:0}
.db-watch-action:hover{background:var(--blue2)}
.db-progress-bar{height:6px;background:var(--line);border-radius:3px;margin-top:8px;overflow:hidden}
.db-progress-fill{height:100%;border-radius:3px;background:var(--blue);transition:width .4s ease}
.db-progress-fill.ok{background:var(--ok)}
.db-progress-fill.warn{background:var(--warn)}


/* EOM additions */
.topbar-watch-sel{display:flex;align-items:center;gap:6px;font-size:12px;font-family:var(--font);color:var(--t2)}
.topbar-watch-sel input,.topbar-watch-sel select{border:1px solid var(--inp-bd);background:var(--inp-bg);color:var(--t1);border-radius:var(--rsm);padding:4px 8px;font-size:12px;font-family:var(--font);outline:none}
.topbar-watch-sel input:focus,.topbar-watch-sel select:focus{border-color:var(--blue)}



/* ══════════════════════════════════════════════════════════════════════════
   UNIFIED DESIGN SYSTEM — all shared components
   ══════════════════════════════════════════════════════════════════════════ */

/* ── ACCORDION SIDEBAR ─────────────────────────────────────────────────── */
.floor-section{margin-bottom:2px}
.floor-hdr{display:flex;align-items:center;gap:7px;width:100%;padding:7px 12px;
  border:none;background:transparent;border-radius:8px;cursor:pointer;
  font-family:var(--font);transition:all .15s;text-align:left}
.floor-hdr:hover{background:var(--sidebar-hover)}
.floor-pip{width:7px;height:7px;border-radius:2px;flex-shrink:0}
.floor-label{font-size:10.5px;font-weight:700;letter-spacing:.5px;
  color:var(--sidebar-t2);text-transform:uppercase;flex:1}
.floor-chevron{font-size:9px;color:var(--sidebar-t3);transition:transform .2s;flex-shrink:0}
.floor-equip{padding:2px 6px 4px}

/* ── EQUIPMENT BUTTONS ──────────────────────────────────────────────────── */
.eq{display:flex;align-items:center;gap:8px;width:100%;
  padding:6px 10px;border:none;background:transparent;border-radius:8px;
  cursor:pointer;text-align:left;font-family:var(--font);transition:all .15s;margin-bottom:1px}
.eq:hover{background:var(--sidebar-hover)}
.eq.active{background:var(--blue);box-shadow:0 2px 10px rgba(18,100,216,.3)}
.eq.active .eq-name{color:#fff;font-weight:700}
.eq.active .eq-badge{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.3);color:#fff}
.eq-ico{font-size:14px;flex-shrink:0}
.eq-name{font-size:12px;font-weight:500;color:var(--sidebar-t1);
  flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.eq-sub{display:none}

/* ── SLIM CARD HEADERS (uniform across ALL cards) ───────────────────────── */
.sc{background:var(--surface);border:1.5px solid var(--line2);border-radius:var(--r);
  margin-bottom:8px;overflow:hidden;
  box-shadow:0 1px 3px rgba(0,0,0,.06)}
.sch{display:flex;align-items:center;gap:7px;
  padding:5px 12px;border-bottom:1px solid var(--line2);
  background:var(--surface2);min-height:0;height:30px}
.sch-ico{font-size:11px;flex-shrink:0}
.sch-lbl{font-size:11px;font-weight:700;color:var(--t1);flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sc-st{font-size:9px;font-weight:700;padding:1px 6px;border-radius:8px;
  border:1px solid;flex-shrink:0}

/* ── UNIT GROUP SELECTOR (iOS-style RUN/STOP toggle) ────────────────────── */
.unit-sel{display:flex;align-items:center;gap:6px;
  padding:6px 12px;background:var(--surface2);border-bottom:1px solid var(--line2);
  flex-wrap:wrap}
.unit-sel-lbl{font-size:10px;font-weight:700;color:var(--t3);
  text-transform:uppercase;letter-spacing:.6px;margin-right:4px;flex-shrink:0}
.usel{display:flex;align-items:center;gap:7px;
  padding:5px 12px;border:1.5px solid var(--line2);border-radius:20px;
  background:var(--surface);cursor:pointer;font-size:12px;font-weight:600;
  font-family:var(--font);transition:all .15s;color:var(--t2);
  user-select:none}
.usel:hover{border-color:var(--blue-soft);color:var(--t1)}
.usel.active{background:var(--blue-soft);border-color:var(--blue);color:var(--blue)}
.usel .ud{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:background .2s}
.usel.run-unit .ud{background:var(--ok)}
.usel.stop-unit .ud{background:var(--t3)}
.usel.stop-unit{opacity:.6}

/* iOS-style RUN/STOP pill inside usel */
.usel-tog{
  display:inline-flex;align-items:center;padding:2px 8px;
  border-radius:12px;font-size:9px;font-weight:800;font-family:var(--font);
  cursor:pointer;border:none;transition:all .2s;letter-spacing:.5px;
  pointer-events:auto}
.usel-tog.run{
  background:#22c55e;color:#fff;
  box-shadow:0 1px 4px rgba(34,197,94,.4)}
.usel-tog.stop{
  background:var(--surface2);color:var(--t3);
  border:1px solid var(--line);box-shadow:none}

/* Stopped state dims the readings block */
.fl.stopped,.fr.stopped,.fr2.stopped{opacity:.3;pointer-events:none}

/* ── DASHBOARD NAV BUTTONS ──────────────────────────────────────────────── */
.dash-btn{display:flex;align-items:center;gap:8px;width:100%;
  padding:7px 12px;border:none;background:transparent;border-radius:8px;
  cursor:pointer;font-family:var(--font);font-size:12px;font-weight:500;
  color:var(--sidebar-t2);transition:all .15s;text-align:left;margin-bottom:2px}
.dash-btn:hover{background:var(--sidebar-hover);color:var(--sidebar-t1)}
.dash-btn.active{background:rgba(59,130,246,.12);color:var(--blue)}
.dash-divider{height:1px;background:var(--sidebar-line);margin:6px 10px}
.db-ico{font-size:14px;flex-shrink:0}

/* ── THEME TOGGLE (top-right) ───────────────────────────────────────────── */
.theme-toggle{display:flex;align-items:center;gap:1px;background:var(--surface2);
  border:1px solid var(--line);border-radius:20px;padding:2px}
.tt{width:26px;height:20px;border-radius:12px;border:none;background:transparent;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:12px;transition:all .2s;opacity:.5}
.tt:hover{opacity:.85}
.tt.on{background:var(--blue);opacity:1;box-shadow:0 1px 4px rgba(59,130,246,.4)}

/* ── OBSERVATIONS CHECKBOXES ────────────────────────────────────────────── */
.obs-row{display:flex;align-items:center;gap:10px;
  padding:7px 0;border-bottom:1px solid var(--line2)}
.obs-row:last-child{border-bottom:none}
.obs-label{font-size:12.5px;color:var(--t2);flex:1}
.obs-yn{display:flex;gap:5px;flex-shrink:0}
.obs-btn{padding:3px 12px;border-radius:20px;border:1.5px solid var(--line2);
  background:transparent;font-size:10px;font-weight:700;cursor:pointer;
  font-family:var(--font);transition:all .15s;color:var(--t3);min-width:44px}
.obs-btn.yes-sel{background:var(--al-bg);border-color:var(--al-bd);color:var(--al-tx)}
.obs-btn.no-sel{background:var(--ok-bg);border-color:var(--ok-bd);color:var(--ok-tx)}
.obs-comment{width:100%;margin-top:5px;padding:6px 10px;
  border:1.5px solid var(--al-bd);border-radius:6px;
  background:var(--al-bg);color:var(--t1);
  font-family:var(--font);font-size:12px;resize:none;outline:none}

/* ── DASHBOARD CHARTS ───────────────────────────────────────────────────── */
.db-grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.db-chart-card{background:var(--surface);border:1.5px solid var(--line2);
  border-radius:var(--r);overflow:hidden}
.db-chart-head{display:flex;align-items:center;justify-content:space-between;
  padding:8px 14px;border-bottom:1px solid var(--line2);background:var(--surface2);
  cursor:pointer}
.db-chart-title{font-size:11px;font-weight:700;color:var(--t1)}
.db-chart-sub{font-size:10px;color:var(--t3)}
</style>
</head>
<body>
<!-- TOPBAR — single FORCAP logo, no duplicate -->
<div class="topbar">
  <div class="brand">
    <div class="logo">FC</div>
    <div class="brand-txt">FORCAP</div>
  </div>
  <div class="vessel-chip"><div class="run-dot"></div><span id="vessel-chip-txt">Loading…</span></div>
  <div class="topbar-mid">
    <div class="g-status neutral" id="gst"><div class="gsd"></div><span id="gst-txt">No readings entered yet</span></div>
  </div>
  <div class="topbar-clock" id="tb-clock">--:--:--</div>
  <div class="topbar-right">

function scheduleApiSave(){ clearTimeout(_saveTimer); _saveTimer = setTimeout(doApiSave, 1500); }

async function doApiSave(){
  if(!WATCH_STATE.watchId || WATCH_STATE.locked) return;
  setSaveState('saving');
  try {
    const readings = [];
    FLOORS.forEach(fl => fl.equip.forEach(eq => eq.tabs.forEach(tab => {
      const section = eq.name, eqLoc = eq.id+'.'+tab.id;
      (tab.fields||[]).forEach(f => {
        if((V[f.id]??'') !== '') readings.push({
          location_path: eqLoc+'.'+f.id, section, equipment: tab.label,
          parameter: f.lbl, unit_label: f.unit,
          value: parseFloat(V[f.id]),
          is_alarm: gs(V[f.id],f)==='alm', is_warning: gs(V[f.id],f)==='warn'
        });
      });
      (tab.duoFields||[]).forEach(f => {
        if((V[f.id]??'')!=='') readings.push({location_path:eqLoc+'.'+f.id,section,equipment:tab.label,parameter:f.lbl+' Suct',unit_label:f.unit,value:parseFloat(V[f.id]),is_alarm:false,is_warning:false});
        if((V[f.id2]??'')!=='') readings.push({location_path:eqLoc+'.'+f.id2,section,equipment:tab.label,parameter:f.lbl+' Disc',unit_label:f.unit2||f.unit,value:parseFloat(V[f.id2]),is_alarm:false,is_warning:false});
      });
      (tab.unitGroups||[]).forEach(ug => ug.fields.forEach(f => {
        if((V[f.id]??'')!=='') readings.push({location_path:eqLoc+'.'+ug.unitId+'.'+f.id,section,equipment:ug.label,parameter:f.lbl,unit_label:f.unit,value:parseFloat(V[f.id]),is_alarm:gs(V[f.id],f)==='alm',is_warning:gs(V[f.id],f)==='warn'});
      }));
      if(tab.cylinders) tab.cylinders.params.forEach(p => {
        for(let c=1;c<=tab.cylinders.count;c++){
          const k=eq.id+'_'+tab.id+'_'+p.id+'_'+c;
          if((CYL[k]??'')!=='') readings.push({location_path:k,section,equipment:'Cylinders',parameter:p.lbl+' C'+c,unit_label:p.unit,value:parseFloat(CYL[k]),is_alarm:gs(CYL[k],p)==='alm',is_warning:gs(CYL[k],p)==='warn'});
        }
      });
    })));
    if(readings.length) await EOM.post('/watches/'+WATCH_STATE.watchId+'/readings',{readings});
    const remarks=Object.entries(EQ_REMARKS_V).filter(([k,v])=>v?.trim()).map(([k,v])=>({section:k,remark:v}));
    await EOM.post('/watches/'+WATCH_STATE.watchId+'/remarks',{remarks});
    setSaveState('saved');
  } catch(e){ setSaveState('error'); console.error('Save error:',e); }
}

function setSaveState(state){
  const el=document.getElementById('save-state');if(!el)return;
  el.textContent=state==='saving'?'● Saving…':state==='error'?'✗ Save failed':'● Saved';
  el.style.color=state==='saving'?'var(--wn-tx)':state==='error'?'var(--alm)':'var(--ok-tx)';
}

async function loadWatch(){
  const date=document.getElementById('log_date').value;
  WATCH_STATE.watchDate=date; WATCH_STATE.watchNumber=1;
  const wn = 1;
  try {
    const[cur,prev]=await Promise.all([
      EOM.get('/watches/current?vessel_id='+WATCH_STATE.vesselId+'&date='+date+'&watch_number=1'),
      EOM.get('/watches/previous?vessel_id='+WATCH_STATE.vesselId+'&date='+date+'&watch_number=1')
    ]);
    WATCH_STATE.watchId=cur.watch.id;
    WATCH_STATE.locked=['submitted','locked'].includes(cur.watch.status);
    // Clear then hydrate V
    Object.keys(V).forEach(k=>delete V[k]);
    cur.readings.forEach(r=>{
      if(r.value!=null){
        const fid=r.location_path.split('.').pop();
        V[fid]=String(r.value);
      }
    });
    Object.keys(EQ_REMARKS_V).forEach(k=>delete EQ_REMARKS_V[k]);
    cur.remarks.forEach(r=>{ if(r.section) EQ_REMARKS_V[r.section]=r.remark; });
    // Hydrate PREV_V
    Object.keys(PREV_V).forEach(k=>delete PREV_V[k]);
    if(prev.watch) prev.readings.forEach(r=>{
      if(r.value!=null){ const fid=r.location_path.split('.').pop(); PREV_V[fid]=[null,null,r.value]; }
    });
    if(cur.watch.duty_engineer){
      const di=document.getElementById('duty_eng_inp');if(di)di.value=cur.watch.duty_engineer;
    }
    if(WATCH_STATE.locked){
      const bs=document.querySelector('.btn-submit');
      if(bs){bs.textContent='🔒 Submitted';bs.disabled=true;bs.style.background='var(--t3)';}
    }
    buildLeft();buildRight();showDashboard();setSaveState('saved');
  }catch(e){console.error('loadWatch:',e);setSaveState('error');}
}

function renderUnitGroupSection(eq,tab){
  const container=document.getElementById(`ugc_${tab.id}`);
  if(!container)return;
  const activeUnitId=ACTIVE_UNIT[tab.id]||(tab.unitGroups[0]?.unitId);
  ACTIVE_UNIT[tab.id]=activeUnitId;
  const ug=tab.unitGroups.find(u=>u.unitId===activeUnitId)||tab.unitGroups[0];
  if(!ug)return;
  const stopped=UNITS[ug.unitId]==='stop';
  const ts_=ug.fields.reduce((w,f)=>{
    const v=V[f.id]??'';if(!v)return w;
    const s=gs(v,f);
    return s==='alm'?'alm':(s==='warn'&&w!=='alm'?'warn':(w==='e'?'ok':w));
  },'e');
  const stLbl=ts_==='alm'?'Alarm':ts_==='warn'?'Warning':ts_==='ok'?'All normal':'Not entered';
  const stCls=ts_==='e'?'empty':ts_;

  let h=`<div class="sc" style="border-top:none;border-radius:0 0 var(--r) var(--r)">
    <div class="sch">
      <span class="sch-ico">${stopped?'⏹️':'▶️'}</span>
      <span class="sch-lbl">${ug.label}</span>
      <span style="font-size:10px;font-weight:700;color:${stopped?'var(--t3)':'var(--ok-tx)'};margin-right:4px">${stopped?'STOPPED':'RUNNING'}</span>
      <span class="sc-st ${stCls}">${stLbl}</span>
    </div>`;

  if(stopped){
    h+=`<div style="padding:12px 14px;color:var(--t3);font-size:12.5px;font-family:var(--font)">
      ${ug.label} is stopped — toggle to RUNNING to enter readings.
    </div>`;
  } else {
    h+=`<div class="fl">`;
    ug.fields.forEach(f=>{
      const v=V[f.id]??'',s=gs(v,f);
      const lp=lastPrev(f.id);
      const pwTxt=lp!==null?lp.toFixed(1):'—';
      const pwCls=lp!==null&&v!==''&&Math.abs(parseFloat(v)-lp)>0.5?(parseFloat(v)>lp?'up':'dn'):'';
      h+=`<div class="fr"><span class="flbl">${f.lbl}</span>
        <input class="finp ${s==='e'?'':s}" id="fi_${f.id}" type="number" step="any" value="${v}" placeholder="—"
          data-fid="${f.id}" data-f='${sj(f)}' oninput="onF(this)">
        <span class="funit">${f.unit}</span>
        <span class="pw-val ${pwCls}">${pwTxt}</span>
      </div>`;
    });
    h+=`</div>`;
  }
  h+=`</div>`;
  container.innerHTML=h;
}

function prevVal(fid){ return PREV_V[fid] || null; }
function lastPrev(fid){ const p=prevVal(fid); return p?p[p.length-1]:null; }
function trendClass(curr, fid){
  const p = lastPrev(fid);
  if(p===null || curr===''|| isNaN(parseFloat(curr))) return '';
  const diff = parseFloat(curr) - p;
  if(Math.abs(diff) < 0.5) return 'trend-ok';
  return diff > 0 ? 'trend-up' : 'trend-dn';
}

const EQ_MAP={},FL_MAP={};
FLOORS.forEach(f=>{FL_MAP[f.id]=f;f.equip.forEach(e=>{EQ_MAP[e.id]={...e,floorId:f.id}});});

const V={},CYL={},UNITS={};
const ACTIVE_UNIT={};  // ACTIVE_UNIT[tabId] = unitId of currently shown unit tab

let aEq=null,aTab=null;
FLOORS.forEach(f=>f.equip.forEach(eq=>eq.tabs.forEach(t=>{
  (t.units||[]).forEach(u=>{UNITS[u.id]=UNITS[u.id]||'run';});
  (t.unitGroups||[]).forEach(ug=>{UNITS[ug.unitId]=UNITS[ug.unitId]||'run';});
})));

function gs(val,f){if(!f)return'e';const n=parseFloat(val);if(isNaN(n)||val==='')return'e';if((f.ha!=null&&n>=f.ha)||(f.la!=null&&n<=f.la))return'alm';if((f.hw!=null&&n>=f.hw)||(f.lw!=null&&n<=f.lw))return'warn';return'ok';}
function tabSt(eq,tab){
  if(tab.unitGroups) return ugTabSt(tab);
  let w='e';const ck=(f,v)=>{if(!v)return;const s=gs(v,f);if(s==='alm')w='alm';else if(s==='warn'&&w!=='alm')w='warn';else if(w==='e')w='ok';};(tab.fields||[]).forEach(f=>ck(f,V[f.id]??''));(tab.duoFields||[]).forEach(f=>{ck(f,V[f.id]??'');ck(f,V[f.id2]??'');});if(tab.cylinders)tab.cylinders.params.forEach(p=>{for(let c=1;c<=tab.cylinders.count;c++)ck(p,CYL[`${eq.id}_${tab.id}_${p.id}_${c}`]??'');});return w;}
function eqSt(eq){let w='e';eq.tabs.forEach(t=>{const s=tabSt(eq,t);if(s==='alm')w='alm';else if(s==='warn'&&w!=='alm')w='warn';else if(w==='e')w='ok';});return w;}
function flSt(fl){let w='e';fl.equip.forEach(e=>{const s=eqSt(e);if(s==='alm')w='alm';else if(s==='warn'&&w!=='alm')w='warn';else if(w==='e')w='ok';});return w;}
function getProgress(){let t=0,f=0;FLOORS.forEach(fl=>fl.equip.forEach(eq=>eq.tabs.forEach(tab=>{(tab.fields||[]).forEach(fi=>{t++;if((V[fi.id]??'')!=='')f++;});(tab.duoFields||[]).forEach(fi=>{t+=2;if((V[fi.id]??'')!=='')f++;if((V[fi.id2]??'')!=='')f++;});(tab.unitGroups||[]).forEach(ug=>ug.fields.forEach(fi=>{t++;if((V[fi.id]??'')!=='')f++;}));if(tab.cylinders)tab.cylinders.params.forEach(p=>{for(let c=1;c<=tab.cylinders.count;c++){t++;if((CYL[`${eq.id}_${tab.id}_${p.id}_${c}`]??'')!=='')f++;}});})));return{t,f};}

// Accordion state: which floor is expanded
const EXPANDED_FLOOR = {current: null};

function buildLeft(){
  var sb = document.getElementById("ls");
  if(!sb) return;
  var FREQ_COLOR = {daily:"#3b82f6",weekly:"#f59e0b",monthly:"#10b981",rh:"#7c3aed"};
  var FREQ_LABEL = {daily:"D",weekly:"W",monthly:"M",rh:"M"};
  var out = "";

  FLOORS.forEach(function(fl){
    var isExp = EXPANDED_FLOOR.current === fl.id;
    var fclr  = fl.color || "#3b82f6";
    var freq  = fl.freq || "daily";
    var fc    = FREQ_COLOR[freq] || "#64748b";
    var fl_id = fl.id;

    out += '<div class="floor-section' + (isExp?" expanded":"") + '" id="fs_' + fl_id + '">';
    out += '<button class="floor-hdr" data-flid="' + fl_id + '" onclick="toggleFloor(this.dataset.flid)">';
    out += '<div class="floor-pip" style="background:' + fclr + '"></div>';
    out += '<span class="floor-label">' + fl.label + '</span>';
    out += '<span style="font-size:8px;font-weight:700;padding:1px 5px;border-radius:8px;margin-left:4px;background:' + fc + '22;color:' + fc + ';border:1px solid ' + fc + '44">' + (FREQ_LABEL[freq]||"") + '</span>';
    out += '<span class="floor-chevron">' + (isExp?"▾":"▸") + '</span>';
    out += '</button>';
    out += '<div class="floor-equip" style="display:' + (isExp?"block":"none") + '">';

    fl.equip.forEach(function(eq){
      var ws  = eqSt(eq);
      var isA = eq.id === aEq;
      var bc  = ws==="e"?"dim":ws;
      var bt  = ws==="alm"?"ALM":ws==="warn"?"WRN":ws==="ok"?"✓":"—";
      out += '<button class="eq' + (isA?" active":"") + '" data-flid="' + fl_id + '" data-eqid="' + eq.id + '" onclick="selEq(this.dataset.flid,this.dataset.eqid)">';
      out += '<span class="eq-ico">' + eq.icon + '</span>';
      out += '<span class="eq-name">' + eq.name + '</span>';
      out += '<span class="eq-badge ' + bc + '">' + bt + '</span>';
      out += '</button>';
    });

    out += '</div></div>';
  });

  sb.innerHTML = out;
  var prog = getProgress();
  var pb = document.getElementById("prog-bar");
  var pl = document.getElementById("prog-lbl");
  if(pb) pb.style.width = (prog.t ? Math.round(prog.f/prog.t*100) : 0) + "%";
  if(pl) pl.textContent = prog.f + "/" + prog.t + " fields";
  updateGSt();
}



function toggleFloor(flId){
  if(EXPANDED_FLOOR.current === flId){
    EXPANDED_FLOOR.current = null;
  } else {
    EXPANDED_FLOOR.current = flId;
  }
  buildLeft();
}

function updateGSt(){
  let w='e';FLOORS.forEach(fl=>{const s=flSt(fl);if(s==='alm')w='alm';else if(s==='warn'&&w!=='alm')w='warn';else if(w==='e')w='ok';});
  const el=document.getElementById('gst'),tx=document.getElementById('gst-txt');
  el.className=`g-status ${w==='e'?'neutral':w}`;
  tx.textContent=w==='alm'?'Active alarms':w==='warn'?'Warnings present':w==='ok'?'All parameters normal':'No readings entered yet';
}

function selEq(flId,eqId){
  EXPANDED_FLOOR.current = flId;
  const dv  = document.getElementById('dashboard-view');
  const mid = document.getElementById('mid');
  const nb  = document.getElementById('dash-nav-btn');
  if(dv)  dv.style.display='none';
  if(mid){ mid.style.display='flex'; mid.style.flex='1'; mid.style.minHeight='0'; }
  if(nb)  nb.classList.remove('active');
  const eq = EQ_MAP[eqId];
  if(!eq){ console.error('Equipment not found:', eqId); return; }
  aEq=eqId; aTab=eq.tabs[0].id;
  buildLeft();
  buildTabs(eq);
  try{
    buildForm(eq,eq.tabs[0]);
  }catch(err){
    var body=document.getElementById('mid-body');
    if(body) body.innerHTML='<div style="padding:20px;color:var(--alm);font-family:monospace;font-size:12px"><b>Form Error:</b><br>'+err.message+'<br><pre>'+err.stack+'</pre></div>';
    console.error('buildForm error:',err);
  }
  buildRight();
}

function buildTabs(eq){
  var bar = document.getElementById("tabs-bar");
  if(!bar) return;
  bar.style.display = "flex";
  var inner = "";
  eq.tabs.forEach(function(t){
    var ws  = tabSt(eq,t);
    var isA = t.id === aTab;
    var badge = (ws==="warn"||ws==="alm") ? '<span class="tab-badge ' + ws + '">' + (ws==="alm"?"ALM":"WRN") + "</span>" : "";
    inner += '<button class="tab' + (isA?" active":"") + '" data-tid="' + t.id + '" onclick="selTab(this.dataset.tid)">'
           + t.icon + " " + t.label + " " + badge + "</button>";
  });
  bar.innerHTML = '<div class="tab-pill-wrap">' + inner + "</div>";
}

    if(_obsEl && _showObs) _obsEl.innerHTML = buildObsBlock(eq.id);

function buildWatchHistory(eq, tab){
  // Pick up to 6 key fields that have prev data or are filled
  const keyFields = (tab.fields||[]).filter(f=>prevVal(f.id)||V[f.id]).slice(0,6);
  if(!keyFields.length && !(tab.duoFields||[]).length) return '';

  const watches = WATCH_LABELS;
  let h = `<div class="watch-hist"><div class="wh-head">
    <span class="wh-title">📊 Watch Comparison</span>
    <span class="wh-meta">Previous 3 watches vs current</span>
  </div><div class="wh-scroll"><table class="whtbl">
  <thead><tr>
    <th class="pname">Parameter</th>
    ${watches.map(w=>`<th>${w}</th>`).join('')}
    <th style="font-weight:800;color:var(--blue)">THIS WATCH</th>
    <th>Unit</th>
  </tr></thead><tbody>`;

  keyFields.forEach(f=>{
    const pv = prevVal(f.id) || [null,null,null];
    const curr = V[f.id]??'';
    const cs = gs(curr, f);
    // trend vs last prev
    const lp = pv[pv.length-1];
    let trClass = '';
    if(curr!==''&&lp!==null){
      const diff=parseFloat(curr)-lp;
      if(Math.abs(diff)>0.5) trClass=diff>0?'trend-up':'trend-dn';
      else trClass='trend-ok';
    }
    h += `<tr>
      <td class="pname">${f.lbl}</td>
      ${pv.map(v=>`<td>${v!==null?v.toFixed(1):'—'}</td>`).join('')}
      <td class="curr ${cs==='e'?'':cs} ${trClass}">${curr||'—'}</td>
      <td style="font-size:10px;color:var(--t3);font-family:var(--mono)">${f.unit}</td>
    </tr>`;
  });

  // Also duoFields if any
  (tab.duoFields||[]).slice(0,3).forEach(f=>{
    const curr = V[f.id]??'';
    const cs = gs(curr, f);
    h += `<tr>
      <td class="pname">${f.lbl} (Suct)</td>
      <td>—</td><td>—</td><td>—</td>
      <td class="curr ${cs==='e'?'':cs}">${curr||'—'}</td>
      <td style="font-size:10px;color:var(--t3);font-family:var(--mono)">${f.unit}</td>
    </tr>`;
  });

  if(!keyFields.length && !(tab.duoFields||[]).length){
    h += `<tr><td colspan="6" class="no-hist">No previous watch data available for this section</td></tr>`;
  }

  h += `</tbody></table></div></div>`;
  return h;
}

function togUnit(uid){
  UNITS[uid]=UNITS[uid]==='run'?'stop':'run';
  // Update all toggle buttons with this uid (could be in any tab)
  const btn=document.getElementById(`utog_${uid}`);
  if(btn){btn.className=`utog ${UNITS[uid]}`;const lbl=btn.getAttribute('data-lbl');btn.innerHTML=`<div class="u-dot"></div><span>${lbl}</span> — <span class="utog-state">${UNITS[uid]==='run'?'RUNNING':'STOPPED'}</span>`;}
  const eq=EQ_MAP[aEq];const tab=eq?.tabs.find(t=>t.id===aTab);
  // Grey out duoField rows for stopped pumps
  (tab?.duoFields||[]).forEach(f=>{
    if(f.unitKey===uid){
      const row=document.getElementById(`fr2_${f.id}`);
      if(row)row.classList.toggle('stopped',UNITS[uid]==='stop');
    }
  });
  // Also grey out regular field rows that belong to this unit
  (tab?.fields||[]).forEach(f=>{
    if(f.unitKey===uid){
      const row=document.getElementById(`fr_${f.id}`);
      if(row)row.classList.toggle('stopped',UNITS[uid]==='stop');
    }
  });
  buildLeft(); updateGSt();
}

function onF(inp){const f=pj(inp.dataset.f);V[inp.dataset.fid]=inp.value;const s=gs(inp.value,f);inp.className='finp'+(s==='e'?'':' '+s);
  const eq=aEq?EQ_MAP[aEq]:null;const tab=eq?.tabs.find(t=>t.id===aTab);
  if(tab?.unitGroups?.length){const cont=document.getElementById(`ugc_${tab.id}`);if(cont)renderUnitGroupSection(eq,tab);}
  refresh();scheduleApiSave();}
function onC(inp){const p=pj(inp.dataset.p);CYL[inp.dataset.key]=inp.value;const s=gs(inp.value,p);inp.className='ci'+(s==='e'?'':' '+s);updAvg(inp.dataset.eq,inp.dataset.tab,inp.dataset.pid,7,p);refresh();scheduleApiSave();}
function updAvg(ei,ti,pi,count,p){const vals=[];for(let c=1;c<=count;c++){const v=parseFloat(CYL[`${ei}_${ti}_${pi}_${c}`]);if(!isNaN(v))vals.push(v);}const el=document.getElementById(`avg_${ei}_${ti}_${pi}`);if(!el)return;if(!vals.length){el.textContent='—';el.className='avg-c';return;}const avg=vals.reduce((a,b)=>a+b)/vals.length;const s=gs(avg.toFixed(1),p);el.textContent=avg.toFixed(1);el.className='avg-c'+(s==='e'||s==='ok'?'':' '+s);}

function refresh(){buildLeft();const eq=aEq?EQ_MAP[aEq]:null;if(eq)buildTabs(eq);buildRight();
  const dv=document.getElementById('dashboard-view');
  if(dv&&dv.style.display!=='none')buildDashboard();
}
function clearSec(){if(!aEq||!aTab)return;const eq=EQ_MAP[aEq],tab=eq.tabs.find(t=>t.id===aTab);(tab.fields||[]).forEach(f=>delete V[f.id]);(tab.duoFields||[]).forEach(f=>{delete V[f.id];delete V[f.id2];});if(tab.cylinders)tab.cylinders.params.forEach(p=>{for(let c=1;c<=tab.cylinders.count;c++)delete CYL[`${eq.id}_${tab.id}_${p.id}_${c}`];});buildForm(eq,tab);refresh();}
function saveSec(){const btn=document.getElementById('btn-save');if(!btn)return;doApiSave().then(()=>{btn.className='btn-primary saved';btn.textContent='✓ Saved';setTimeout(()=>{btn.className='btn-primary';btn.textContent='Save '+(EQ_MAP[aEq]?.name||'');},2500);});refresh();}

function buildRight(){
  const el=document.getElementById('rs');
  const alms=[],warns=[];
  FLOORS.forEach(fl=>fl.equip.forEach(eq=>eq.tabs.forEach(tab=>{
    const chk=(f,v,lbl)=>{if(!v)return;const s=gs(v,f);if(s==='alm')alms.push(lbl);if(s==='warn')warns.push(lbl);};
    (tab.fields||[]).forEach(f=>chk(f,V[f.id]??'',`${eq.name} · ${f.lbl}: ${V[f.id]} ${f.unit}`));
    (tab.duoFields||[]).forEach(f=>{chk(f,V[f.id]??'',`${eq.name} · ${f.lbl} Suct: ${V[f.id]} ${f.unit}`);chk(f,V[f.id2]??'',`${eq.name} · ${f.lbl} Disc: ${V[f.id2]} ${f.unit2||f.unit}`);});
    if(tab.cylinders)tab.cylinders.params.forEach(p=>{for(let c=1;c<=tab.cylinders.count;c++){const v=CYL[`${eq.id}_${tab.id}_${p.id}_${c}`]??'';if(!v)continue;chk(p,v,`${eq.name} C${c} ${p.lbl}: ${v} ${p.unit}`);}});
  })));
  let html='';
  if(alms.length)html+=`<div class="alm-blk"><div class="alm-ttl">🚨 Alarms (${alms.length})</div>${alms.map(a=>`<div class="alm-row">· ${a}</div>`).join('')}</div>`;
  if(warns.length)html+=`<div class="wn-blk"><div class="wn-ttl">⚠ Warnings (${warns.length})</div>${warns.map(w=>`<div class="wn-row">· ${w}</div>`).join('')}</div>`;
  const{f}=getProgress();if(!alms.length&&!warns.length&&f>0)html+=`<div class="ok-blk">✓ All entered values normal</div>`;
  html+=FLOORS.map(fl=>{
    const fs=flSt(fl);const dc=fs==='e'?'dim':fs;
    const items=fl.equip.map(eq=>{
      const ws=eqSt(eq);const wc=ws==='e'?'dim':ws;
      let vl='—';
      if(ws==='warn'||ws==='alm'){outer:for(const tab of eq.tabs){for(const f of(tab.fields||[])){const v=V[f.id]??'';if(!v)continue;const s=gs(v,f);if(s===ws){vl=`${f.lbl.split(' ').slice(-2).join(' ')}: ${v}`;break outer;}}}}
      else if(ws==='ok'){let c=0;eq.tabs.forEach(t=>(t.fields||[]).forEach(f=>{if((V[f.id]??'')!=='')c++;}));vl=`${c} values`;}
      return`<div class="mr" onclick="selEq('${fl.id}','${eq.id}')"><span class="mn">${eq.name}</span><span class="mv ${wc==='warn'?'warn':wc==='alm'?'alm':''}">${vl}</span><div class="md ${wc}"></div></div>`;
    }).join('');
    return`<div class="floor-card"><div class="fc-h"><div class="fp ${dc}"></div>${fl.label}<span style="font-size:10px;opacity:.6;margin-left:4px">· ${fl.sub}</span></div><div class="fc-items">${items}</div></div>`;
  }).join('');
  el.innerHTML=html;
}

function submitLog(){
  const eng=document.getElementById('duty_eng_inp')?document.getElementById('duty_eng_inp').value.trim():'';
  if(!eng){showToast('Enter Duty Engineer name','warn');return;}
  const{f,t}=getProgress();
  if(f<t*.4&&!confirm('Only '+f+'/'+t+' fields completed. Submit anyway?'))return;
  if(!confirm('Submit Watch '+WATCH_STATE.watchNumber+' — '+WATCH_STATE.watchDate+'?\n\nDuty Engineer: '+eng))return;
  const btn=document.querySelector('.btn-submit');
  if(btn){btn.disabled=true;btn.textContent='Submitting…';}
  doApiSave().then(()=>EOM.post('/watches/'+WATCH_STATE.watchId+'/submit',{duty_engineer:eng}))
  .then(()=>{WATCH_STATE.locked=true;showToast('Watch log submitted ✓','success');if(btn){btn.textContent='✓ Submitted';btn.style.background='var(--ok)';btn.style.color='var(--ok-tx)';btn.disabled=true;}})
  .catch(e=>{showToast(e.message,'error');if(btn){btn.disabled=false;btn.textContent='📋 Submit Daily Log';}});
}

function eqFilledCount(eq){
  let ef=0,et=0;
  eq.tabs.forEach(function(tab){
    (tab.fields||[]).forEach(function(fi){et++;if((V[fi.id]||'')!=='')ef++;});
    (tab.unitGroups||[]).forEach(function(ug){ug.fields.forEach(function(fi){et++;if((V[fi.id]||'')!=='')ef++;});});
    (tab.duoFields||[]).forEach(function(fi){et+=2;if((V[fi.id]||'')!=='')ef++;if((V[fi.id2]||'')!=='')ef++;});
    if(tab.cylinders){tab.cylinders.params.forEach(function(p){
      for(var c=1;c<=tab.cylinders.count;c++){
        et++;
        var k=eq.id+'_'+tab.id+'_'+p.id+'_'+c;
        if((CYL[k]||'')!=='')ef++;
      }
    });}
  });
  return {ef:ef,et:et};
}

function setWatchEngineerFocus(){var el=document.getElementById('duty_eng');if(el)el.focus();}

function buildDashboard(){
  try{
  const el=document.getElementById('dashboard-view');
  if(!el)return;

  const prog=getProgress();
  const pct=prog.t?Math.round(prog.f/prog.t*100):0;
  let alms=0,warns=0;
  FLOORS.forEach(fl=>fl.equip.forEach(eq=>eq.tabs.forEach(tab=>{
    (tab.fields||[]).forEach(f=>{if(!V[f.id])return;const s=gs(V[f.id],f);if(s==='alm')alms++;else if(s==='warn')warns++;});
    (tab.unitGroups||[]).forEach(ug=>ug.fields.forEach(f=>{if(!V[f.id])return;const s=gs(V[f.id],f);if(s==='alm')alms++;else if(s==='warn')warns++;}));
  })));

  // Frequency completion
  const freqC={daily:{t:0,f:0},weekly:{t:0,f:0},monthly:{t:0,f:0},rh:{t:0,f:0}};
  FLOORS.forEach(fl=>{
    // Running Hours floor gets its own 'rh' bucket
    const freq = fl.id==='rh' ? 'rh' : (fl.freq||'daily');
    const fc=freqC[freq]||(freqC[freq]={t:0,f:0});
    fl.equip.forEach(eq=>eq.tabs.forEach(tab=>{
      (tab.fields||[]).forEach(fi=>{fc.t++;if((V[fi.id]||'')!=='')fc.f++;});
      (tab.unitGroups||[]).forEach(ug=>ug.fields.forEach(fi=>{fc.t++;if((V[fi.id]||'')!=='')fc.f++;}));
    }));
  });

  const pctOf=(fc)=>fc.t?Math.round(fc.f/fc.t*100):0;
  const today=document.getElementById('log_date')?.value||(new Date().toISOString().slice(0,10));
  const de=document.getElementById('de_select');
  const deName=de&&de.value?de.options[de.selectedIndex]?.text:'Not selected';

  let h='';
  h+=`<div class="db-header">
    <div class="db-title">Engine Room Daily Log</div>
    <div class="db-sub">${WATCH_STATE.vesselName||'Alfred Temile'} &nbsp;·&nbsp; ${today} &nbsp;·&nbsp; D/E: ${deName}</div>
  </div>`;

  // Watch engineer + overall progress
  h+=`<div class="db-watch-row" style="margin-bottom:16px">
    <div class="db-watch-icon">👷</div>
    <div class="db-watch-body">
      <div class="db-watch-title">Duty Engineer: ${deName}</div>
      <div class="db-watch-detail">${prog.f} of ${prog.t} fields entered across all sections</div>
      <div class="db-progress-bar"><div class="db-progress-fill ${pct===100?'ok':''}" style="width:${pct}%"></div></div>
    </div>
    <button class="db-watch-action" onclick="setDEFocus()">Change D/E</button>
  </div>`;

  // 4 frequency cards
  const FREQ=[
    {key:'daily',  label:'Daily Logs',     icon:'📅', color:'var(--blue)',  sub:'ER Rounds · MGPS · Stern Tube'},
    {key:'weekly', label:'Weekly Tests',   icon:'📊', color:'var(--warn)',  sub:'Lube Oil · Boiler Water'},
    {key:'monthly',label:'Monthly Logs',   icon:'📆', color:'var(--ok-tx)', sub:'Scavenge · Performance · Inventory'},
    {key:'rh',     label:'Running Hours',  icon:'⏱️', color:'#7c3aed',     sub:'141 equipment items'},
  ];
  h+=`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px">`;
  FREQ.forEach(fc=>{
    const c=freqC[fc.key]||{t:0,f:0};
    const p=pctOf(c);
    h+=`<div class="db-chart-card" style="cursor:pointer" onclick="jumpToFreq('${fc.key}')">
      <div class="db-chart-head">
        <span class="db-chart-title">${fc.icon} ${fc.label}</span>
        <span class="db-chart-sub">${c.f}/${c.t}</span>
      </div>
      <div style="padding:14px;text-align:center">
        <div style="font-size:30px;font-weight:700;font-family:var(--mono);color:${fc.color}">${p}%</div>
        <div style="font-size:10px;color:var(--t3);margin-top:3px">${fc.sub}</div>
        <div style="height:4px;background:var(--line);border-radius:2px;margin-top:8px;overflow:hidden">
          <div style="height:100%;background:${fc.color};width:${p}%;border-radius:2px;transition:width .4s"></div>
        </div>
      </div>
    </div>`;
  });
  h+=`</div>`;

  // Summary stats
  const openDefects = DEFECT_STATS ? (parseInt(DEFECT_STATS.open||0)+parseInt(DEFECT_STATS.in_progress||0)) : 0;
  const critDefects = DEFECT_STATS ? parseInt(DEFECT_STATS.critical||0) : 0;
  const overdueDefects = DEFECT_STATS ? parseInt(DEFECT_STATS.overdue||0) : 0;
  // Cyclone alerts
  const cycloneAlerts = CYCLONE_STATUS ? [1,2,3].filter(n=>CYCLONE_STATUS[n]&&(CYCLONE_STATUS[n].alert||CYCLONE_STATUS[n].warning)).length : 0;

  h+=`<div class="db-stats" style="margin-bottom:16px">
    <div class="db-stat ${pct===100?'ok-card':''}">
      <div class="db-stat-icon">✅</div><div class="db-stat-val">${pct}%</div>
      <div class="db-stat-label">Today Complete</div>
    </div>
    <div class="db-stat ${alms>0?'alm-card':''}">
      <div class="db-stat-icon">🚨</div><div class="db-stat-val">${alms}</div>
      <div class="db-stat-label">Active Alarms</div>
    </div>
    <div class="db-stat ${openDefects>0?'alm-card':''}">
      <div class="db-stat-icon">🔧</div>
      <div class="db-stat-val" style="color:${critDefects>0?'var(--al-tx)':openDefects>0?'var(--warn)':'var(--ok-tx)'}">${openDefects}</div>
      <div class="db-stat-label">Open Defects${critDefects>0?' ('+critDefects+' critical)':''}</div>
    </div>
    <div class="db-stat ${overdueDefects>0?'alm-card':''}">
      <div class="db-stat-icon">⏰</div>
      <div class="db-stat-val" style="color:${overdueDefects>0?'var(--al-tx)':'var(--t2)'}">${overdueDefects}</div>
      <div class="db-stat-label">Overdue Close-outs</div>
    </div>
  </div>`;

  // Cyclone filter alerts
  if(CYCLONE_STATUS && cycloneAlerts > 0){
    var cyc_dglist = [1,2,3].filter(function(n){return CYCLONE_STATUS[n]&&(CYCLONE_STATUS[n].alert||CYCLONE_STATUS[n].warning);}).map(function(n){
      var c=CYCLONE_STATUS[n];
      var hrs = c.hours_since_change!==null ? Math.round(c.hours_since_change) : '?';
      return 'D/G No.'+n+': '+hrs+' hrs '+(c.alert?'🚨':'⚠️');
    }).join(' &nbsp;·&nbsp; ');
    h += '<div style="background:rgba(239,68,68,.08);border:1.5px solid rgba(239,68,68,.3);border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px">';
    h += '<span style="font-size:20px">⚠️</span>';
    h += '<div><div style="font-size:13px;font-weight:700;color:#fca5a5">Cyclone Filter Alert</div>';
    h += '<div style="font-size:12px;color:var(--t2);margin-top:2px">'+cyc_dglist+' — filter change overdue</div></div>';
    h += '<a href="/defects.html" style="margin-left:auto;padding:5px 12px;border-radius:8px;background:rgba(239,68,68,.2);color:#fca5a5;text-decoration:none;font-size:11px;font-weight:700">View Defects →</a>';
    h += '</div>';
  }

  // Daily sections deck overview
  h+=`<div class="db-grid">`;
  FLOORS.filter(fl=>fl.freq==='daily').forEach(fl=>{
    const items=fl.equip.map(eq=>{
      const ws=eqSt(eq);const wc=ws==='e'?'dim':ws;
      let ef=0,et=0;
      eq.tabs.forEach(t=>{(t.fields||[]).forEach(f=>{et++;if((V[f.id]||'')!=='')ef++;});(t.unitGroups||[]).forEach(ug=>ug.fields.forEach(f=>{et++;if((V[f.id]||'')!=='')ef++;}));});
      return`<div class="db-eq-row" onclick="showEquipment_nav('${fl.id}','${eq.id}')">
        <span style="font-size:13px">${eq.icon}</span>
        <span class="db-eq-name">${eq.name}</span>
        <span class="db-eq-filled">${ef}/${et}</span>
        <div class="db-eq-dot ${wc}"></div>
      </div>`;
    }).join('');
    h+=`<div class="db-deck-card">
      <div class="db-deck-head">
        <div class="db-deck-pip" style="background:${fl.color}"></div>
        <span class="db-deck-title">${fl.label}</span>
        <span class="db-deck-count">${fl.sub}</span>
      </div>${items}
    </div>`;
  });
  h+=`</div>`;
  el.innerHTML=h;
  }catch(err){
    const el2=document.getElementById('dashboard-view');
    if(el2)el2.innerHTML='<div style="padding:20px;color:red;font-size:13px;font-family:monospace"><b>Dashboard Error:</b><br>'+err.message+'<br><pre>'+err.stack+'</pre></div>';
  }
}

/* ── INIT ── */
buildLeft();
buildRight();
buildDashboard();
updateClock();
setInterval(updateClock, 1000);



// ── OBSERVATIONS CHECKBOXES ──────────────────────────────────────────────────


function buildObsBlock(eqId){
  var obs = OBS_STATE[eqId] || {};
  var checks = [
    {key:'noise', label:'Noise observed?'},
    {key:'leaks', label:'Leaks observed?'},
    {key:'fault', label:'Running with fault?'},
  ];
  var h = '<div style="border-top:1px solid var(--line2);padding:10px 14px 12px">';
  h += '<div style="font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--t3);margin-bottom:10px">Observations</div>';
  checks.forEach(function(c){
    var val = obs[c.key];
    var isYes = val === 'yes';
    var isNo  = val === 'no';
    var comment = obs[c.key+'_comment'] || '';
    var yStyle = 'padding:3px 12px;border-radius:20px;border:1.5px solid ' + (isYes?'var(--alm)':'var(--line2)') + ';background:' + (isYes?'var(--al-bg)':'transparent') + ';color:' + (isYes?'var(--al-tx)':'var(--t3)') + ';font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font)';
    var nStyle = 'padding:3px 12px;border-radius:20px;border:1.5px solid ' + (isNo?'var(--ok-bd)':'var(--line2)') + ';background:' + (isNo?'var(--ok-bg)':'transparent') + ';color:' + (isNo?'var(--ok-tx)':'var(--t3)') + ';font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font)';
    h += '<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--line2)">';
    h += '<span style="font-size:13px;color:var(--t2);flex:1">' + c.label + '</span>';
    h += '<div style="display:flex;gap:5px">';
    h += '<button style="' + yStyle + '" data-eqid="' + eqId + '" data-key="' + c.key + '" data-val="yes" onclick="setObs(this.dataset.eqid,this.dataset.key,this.dataset.val)">YES</button>';
    h += '<button style="' + nStyle + '" data-eqid="' + eqId + '" data-key="' + c.key + '" data-val="no"  onclick="setObs(this.dataset.eqid,this.dataset.key,this.dataset.val)">NO</button>';
    h += '</div></div>';
    if(isYes){
      h += '<textarea style="width:100%;margin-top:6px;padding:7px 10px;border:1.5px solid var(--al-bd);border-radius:6px;background:var(--al-bg);color:var(--t1);font-family:var(--font);font-size:12px;resize:vertical;min-height:52px"';
      h += ' placeholder="Describe observation..." data-eqid="' + eqId + '" data-key="' + c.key + '"';
      h += ' oninput="setObsComment(this.dataset.eqid,this.dataset.key,this.value)">' + comment + '</textarea>';
    }
  });
  h += '</div>';
  return h;
}

function setObs(eqId, key, val){
  if(!OBS_STATE[eqId]) OBS_STATE[eqId] = {};
  OBS_STATE[eqId][key] = val;
  const el = document.getElementById('obs_block_'+eqId);
  if(el) el.innerHTML = buildObsBlock(eqId);
  scheduleApiSave();
  // Flag in sidebar if any YES selected
  buildLeft();
}

function setObsComment(eqId, key, val){
  if(!OBS_STATE[eqId]) OBS_STATE[eqId] = {};
  OBS_STATE[eqId][key+'_comment'] = val;
  scheduleApiSave();
}

// Inject obs block after remarks in buildForm
const _origBuildForm = buildForm;
buildForm = function(eq, tab){
  _origBuildForm(eq, tab);
  // Insert obs block before watch history
  const wh = document.querySelector('.watch-hist');
  if(wh){
    const obsDiv = document.createElement('div');
    obsDiv.id = 'obs_block_'+eq.id;
    obsDiv.innerHTML = buildObsBlock(eq.id);
    wh.parentNode.insertBefore(obsDiv, wh);
  }
};

// Dashboard built directly in buildDashboard()


function injectCycloneWidget(eqId, dgNum){
  // Show widget even if no history yet
  var c = (CYCLONE_STATUS && CYCLONE_STATUS[dgNum]) ? CYCLONE_STATUS[dgNum] : {
    hours_since_change: null, alert: false, warning: false, last_reset: null, current_hours: null
  };
  var hrs = c.hours_since_change !== null ? Math.round(c.hours_since_change) : null;
  var isAlert   = c.alert;
  var isWarning = c.warning;
  var color = isAlert ? 'var(--red)' : isWarning ? 'var(--amber)' : 'var(--green)';
  var bgColor = isAlert ? 'rgba(239,68,68,.08)' : isWarning ? 'rgba(245,158,11,.08)' : 'rgba(34,197,94,.06)';
  var bdColor = isAlert ? 'rgba(239,68,68,.3)' : isWarning ? 'rgba(245,158,11,.3)' : 'rgba(34,197,94,.2)';
  var msg = hrs !== null ? hrs+' hrs since last change' : 'No filter change recorded';
  var statusTxt = isAlert ? '🚨 CHANGE REQUIRED' : isWarning ? '⚠️ CHANGE SOON' : '✅ OK';

  var existing = document.getElementById('cyclone_widget_'+eqId);
  if(existing) return; // already injected

  var widget = document.createElement('div');
  widget.id = 'cyclone_widget_'+eqId;
  widget.style.cssText = 'background:'+bgColor+';border:1.5px solid '+bdColor+';border-radius:10px;padding:12px 16px;margin-bottom:8px;display:flex;align-items:center;gap:14px';
  widget.innerHTML = '<div style="font-size:24px">🔄</div>'
    + '<div style="flex:1">'
    + '<div style="font-size:12px;font-weight:700;color:'+color+'">Cyclone Filter — ' + statusTxt + '</div>'
    + '<div style="font-size:11px;color:var(--t2);margin-top:3px">'+msg
    + (c.last_reset ? ' &nbsp;·&nbsp; Last changed: '+String(c.last_reset).slice(0,10) : '')
    + '</div>'
    + (hrs !== null ? '<div style="margin-top:8px;height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden"><div style="height:100%;border-radius:3px;background:'+color+';width:'+Math.min(100,Math.round(hrs/120*100))+'%"></div></div>' : '')
    + '</div>'
    + '<button onclick="resetCycloneFilter('+dgNum+')" style="padding:6px 14px;border-radius:8px;border:1px solid '+bdColor+';background:transparent;color:'+color+';font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font)">Record Change</button>';

  // Insert before the obs block
  var body = document.getElementById('mid-body');
  var obsBlock = document.getElementById('obs_block_'+eqId);
  if(body && obsBlock){
    body.insertBefore(widget, obsBlock);
  } else if(body){
    body.insertBefore(widget, body.firstChild);
  }
}

async function resetCycloneFilter(dgNum){
  if(!WATCH_STATE.vesselId){ alert('No vessel loaded'); return; }
  var by = document.getElementById('de_select')?.value || '';
  if(!by) by = prompt('Who changed the filter?');
  if(!by) return;
  var hrs = prompt('Current D/G running hours (from hour counter):', '');
  try{
    await EOM.post('/watches/cyclone/reset', {
      vessel_id: WATCH_STATE.vesselId,
      dg_number: dgNum,
      reset_by: by,
      hours_at_reset: hrs ? parseFloat(hrs) : null,
      notes: 'Cyclone filter changed'
    });
    showToast('Filter change recorded for D/G No.'+dgNum, 'ok');
    await loadCycloneStatus();
    // Re-inject widget
    var eqId = ['ae1','ae2','ae3'][dgNum-1];
    var existing = document.getElementById('cyclone_widget_'+eqId);
    if(existing) existing.remove();
    injectCycloneWidget(eqId, dgNum);
    buildLeft();   // refresh sidebar badges
    buildDashboard();
  }catch(e){ showToast('Error: '+e.message, 'error'); }
}

function jumpToFreq(freq){
  const target = freq==='rh'?'rh':FLOORS.find(fl=>fl.freq===freq)?.id;
  if(!target) return;
  EXPANDED_FLOOR.current = target;
  document.getElementById('dashboard-view').style.display='none';
  document.getElementById('mid').style.display='flex';
  document.getElementById('dash-nav-btn').classList.remove('active');
  const fl = FLOORS.find(f=>f.id===target);
  if(fl && fl.equip.length) selEq(fl.id, fl.equip[0].id);
  buildLeft();
}
function setDEFocus(){
  const sel=document.getElementById('de_select');if(sel)sel.focus();
}
