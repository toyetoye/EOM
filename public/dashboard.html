<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<script>(function(){var t=localStorage.getItem("fc-theme");if(t)document.documentElement.setAttribute("data-theme",t);})()</script>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>FORCAP LogBook — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="/eom-api.js"></script>
<style>
:root{
  --bg:#070d1a;--surface:#0f172a;--surface2:#1e293b;--border:rgba(255,255,255,0.08);
  --text:#f1f5f9;--muted:#64748b;--accent:#3b82f6;--accent2:#7c3aed;
  --green:#22c55e;--amber:#f59e0b;--red:#ef4444;--cyan:#06b6d4;
  --font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
.header{height:56px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:12px}
.hlogo{display:none;background:linear-gradient(135deg,#1d4ed8,#7c3aed);border-radius:8px;
  display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
.htitle{font-size:14px;font-weight:600}
.hrole{padding:3px 8px;border-radius:6px;font-size:10px;font-weight:600;
  background:rgba(59,130,246,.15);color:var(--accent)}
.hbtn{margin-left:auto;padding:6px 12px;border-radius:8px;border:1px solid var(--border);
  background:transparent;color:var(--text);font-size:12px;cursor:pointer;font-family:var(--font)}
.hbtn.danger{border-color:rgba(239,68,68,.3);color:var(--red)}

.container{max-width:1200px;margin:0 auto;padding:24px 20px}
h2{font-size:18px;font-weight:700;margin-bottom:16px}

/* FLEET CARDS */
.fleet-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:28px}
.vessel-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;cursor:pointer;transition:.2s}
.vessel-card:hover{border-color:rgba(59,130,246,.3);transform:translateY(-1px)}
.vc-name{font-size:14px;font-weight:700;margin-bottom:4px}
.vc-imo{font-size:11px;color:var(--muted)}
.vc-stats{display:flex;gap:16px;margin-top:14px}
.vc-stat{text-align:center}
.vc-stat-val{font-size:20px;font-weight:700;font-family:var(--mono);display:block}
.vc-stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
.vc-alarm{color:var(--red)} .vc-ok{color:var(--green)} .vc-warn{color:var(--amber)}

/* WATCH TABLE */
.watch-table{width:100%;border-collapse:collapse;font-size:13px}
.watch-table th{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;
  letter-spacing:.8px;padding:8px 12px;text-align:left;border-bottom:1px solid var(--border)}
.watch-table td{padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.03)}
.watch-table tr:hover td{background:rgba(255,255,255,.02)}
.badge{padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600}
.badge.submitted{background:rgba(34,197,94,.15);color:var(--green)}
.badge.locked{background:rgba(239,68,68,.1);color:var(--red)}
.badge.draft{background:rgba(100,116,139,.15);color:var(--muted)}
.unlock-btn{padding:4px 10px;border-radius:6px;border:1px solid rgba(245,158,11,.3);
  background:transparent;color:var(--amber);font-size:11px;cursor:pointer;font-family:var(--font)}
.unlock-btn:hover{background:rgba(245,158,11,.1)}

/* FILTERS */
.filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-select{background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:7px 12px;color:var(--text);font-size:12px;font-family:var(--font);cursor:pointer}
.filter-label{font-size:12px;color:var(--muted)}

/* ADMIN */
.admin-section{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-top:20px}
.admin-title{font-size:13px;font-weight:700;margin-bottom:14px;color:var(--accent)}
.user-table{width:100%;border-collapse:collapse;font-size:12px}
.user-table th{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;
  letter-spacing:.8px;padding:6px 10px;text-align:left;border-bottom:1px solid var(--border)}
.user-table td{padding:6px 10px;border-bottom:1px solid rgba(255,255,255,.03)}
.add-btn{padding:6px 14px;background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.3);
  border-radius:8px;color:var(--accent);font-size:12px;cursor:pointer;font-family:var(--font)}
.add-btn:hover{background:rgba(59,130,246,.25)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;
  align-items:center;justify-content:center}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;
  width:360px;max-width:90vw}
.modal h3{font-size:15px;font-weight:700;margin-bottom:18px}
.field{margin-bottom:14px}
.field label{display:block;font-size:10px;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.field input,.field select{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);
  border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;font-family:var(--font)}
.field input:focus,.field select:focus{outline:none;border-color:var(--accent)}
.modal-btns{display:flex;gap:8px;margin-top:18px}
.modal-save{flex:1;padding:9px;background:linear-gradient(135deg,#1d4ed8,#7c3aed);
  border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font)}
.modal-cancel{padding:9px 16px;border:1px solid var(--border);border-radius:8px;
  background:transparent;color:var(--text);font-size:13px;cursor:pointer;font-family:var(--font)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
</style>
</head>
<body>
<div class="header">
  <img src="/forcap-logo.png" alt="FORCAP" style="height:32px;width:auto"/>
  <span class="htitle">EOM Dashboard</span>
  <span class="hrole" id="roleTag">—</span>
  <button class="hbtn" onclick="window.location.href='/logbook.html'">Open Logbook</button>
  <button class="hbtn danger" onclick="EOM.logout()">Sign out</button>
</div>
<div class="container">
  <h2>Fleet Overview</h2>
  <div class="fleet-grid" id="fleetGrid"><div style="color:var(--muted);font-size:13px">Loading…</div></div>

  <h2>Watch History</h2>
  <div class="filters">
    <span class="filter-label">Vessel:</span>
    <select id="fVessel" class="filter-select" onchange="loadWatches()"><option value="">All</option></select>
    <span class="filter-label">Month:</span>
    <input type="month" id="fMonth" class="filter-select" onchange="loadWatches()"/>
  </div>
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden">
    <table class="watch-table">
      <thead><tr>
        <th>Vessel</th><th>Date</th><th>Watch</th><th>Duty Engineer</th>
        <th>Status</th><th>Submitted</th><th></th>
      </tr></thead>
      <tbody id="watchTbody"><tr><td colspan="7" style="color:var(--muted);padding:20px">Loading…</td></tr></tbody>
    </table>
  </div>

  <div id="adminPanel"></div>
</div>

<div id="modalOverlay" style="display:none" class="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <h3 id="modalTitle">Add User</h3>
    <div class="field"><label>Username</label><input id="mUser" type="text" placeholder="lowercase_name"/></div>
    <div class="field"><label>Password</label><input id="mPass" type="password" placeholder="••••••••"/></div>
    <div class="field"><label>Role</label>
      <select id="mRole">
        <option value="vessel">Vessel</option>
        <option value="superintendent">Superintendent</option>
        <option value="admin">Admin</option>
      </select>
    </div>
    <div class="field"><label>Vessel</label>
      <select id="mVessel"><option value="">— None —</option></select>
    </div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-save" onclick="saveUser()">Save User</button>
    </div>
  </div>
</div>

<script>
let vessels = [], isAdmin = false;

window.addEventListener('DOMContentLoaded', async () => {
  if (!EOM.requireAuth(['admin','superintendent'])) return;
  const user = EOM.user();
  document.getElementById('roleTag').textContent = user.role;
  isAdmin = user.role === 'admin';

  // Set default month filter
  document.getElementById('fMonth').value = EOM.today().slice(0,7);

  try {
    vessels = await EOM.get('/vessels');
    populateVesselFilter();
    await Promise.all([loadFleetOverview(), loadWatches()]);
    if (isAdmin) loadAdminPanel();
  } catch (e) { console.error(e); }
});

async function loadFleetOverview() {
  try {
    const data = await EOM.get('/watches/fleet-overview');
    const grid = document.getElementById('fleetGrid');
    if (!data.length) { grid.innerHTML = '<div style="color:var(--muted);font-size:13px">No vessels found</div>'; return; }
    grid.innerHTML = data.map(v => `
      <div class="vessel-card" onclick="filterVessel(${v.id})">
        <div class="vc-name">${v.name}</div>
        <div class="vc-imo">${v.imo ? 'IMO ' + v.imo : ''}  <span style="font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;background:${v.type==='LNG'?'rgba(59,130,246,.15)':'rgba(124,58,237,.15)'};color:${v.type==='LNG'?'#93c5fd':'#c4b5fd'}">${v.type||''}</span>${v.vessel_class ? ' <span style="font-size:9px;color:var(--muted)">'+v.vessel_class+'</span>' : ''}${v.propulsion_type ? ' <span style="font-size:9px;color:var(--muted)">'+v.propulsion_type+'</span>' : ''}</div>
        <div class="vc-stats">
          <div class="vc-stat">
            <span class="vc-stat-val ${v.watches_today>0?'vc-ok':'vc-warn'}">${v.watches_today}</span>
            <span class="vc-stat-label">Watches Today</span>
          </div>
          <div class="vc-stat">
            <span class="vc-stat-val ${v.alarms_24h>0?'vc-alarm':'vc-ok'}">${v.alarms_24h}</span>
            <span class="vc-stat-label">Alarms 24h</span>
          </div>
          <div class="vc-stat">
            <span class="vc-stat-val" style="font-size:13px;color:var(--muted)">${v.last_submission ? v.last_submission.slice(0,10) : '—'}</span>
            <span class="vc-stat-label">Last Submission</span>
          </div>
        </div>
      </div>
    `).join('');
  } catch(e) { console.error(e); }
}

function populateVesselFilter() {
  const sel = document.getElementById('fVessel');
  const mSel = document.getElementById('mVessel');
  vessels.forEach(v => {
    const optLabel = v.name + (v.vessel_class ? ' ('+v.vessel_class+')' : '');
    sel.innerHTML += `<option value="${v.id}">${optLabel}</option>`;
    mSel.innerHTML += `<option value="${v.id}">${optLabel}</option>`;
  });
}

function filterVessel(id) {
  document.getElementById('fVessel').value = id;
  loadWatches();
}

async function loadWatches() {
  const vid = document.getElementById('fVessel').value;
  const month = document.getElementById('fMonth').value;
  const tb = document.getElementById('watchTbody');
  tb.innerHTML = `<tr><td colspan="7" style="color:var(--muted);padding:16px">Loading…</td></tr>`;
  try {
    const vids = vid ? [parseInt(vid)] : vessels.map(v => v.id);
    const all = [];
    for (const id of vids) {
      const watches = await EOM.get(`/watches?vessel_id=${id}&month=${month}`);
      const vname = vessels.find(v => v.id === id)?.name || '—';
      watches.forEach(w => { w._vessel_name = vname; all.push(w); });
    }
    all.sort((a,b) => b.watch_date.localeCompare(a.watch_date) || b.watch_number - a.watch_number);
    if (!all.length) {
      tb.innerHTML = `<tr><td colspan="7" style="color:var(--muted);padding:16px">No watches found</td></tr>`;
      return;
    }
    const LABELS = ['','00–04','04–08','08–12','12–16','16–20','20–24'];
    tb.innerHTML = all.map(w => `
      <tr>
        <td>${w._vessel_name}</td>
        <td style="font-family:var(--mono);font-size:12px">${w.watch_date}</td>
        <td>Watch ${w.watch_number} <span style="color:var(--muted);font-size:11px">${LABELS[w.watch_number]}</span></td>
        <td>${w.duty_engineer || '—'}</td>
        <td><span class="badge ${w.status}">${w.status}</span></td>
        <td style="font-size:11px;color:var(--muted)">${w.submitted_at ? new Date(w.submitted_at).toLocaleString('en-GB') : '—'}</td>
        <td>${(w.status==='submitted'||w.status==='locked') && (isAdmin || EOM.user()?.role==='superintendent')
          ? `<button class="unlock-btn" onclick="unlockWatch(${w.id})">Unlock</button>` : ''}</td>
      </tr>
    `).join('');
  } catch(e) { tb.innerHTML = `<tr><td colspan="7" style="color:var(--red);padding:16px">${e.message}</td></tr>`; }
}

async function unlockWatch(id) {
  const reason = prompt('Reason for unlocking this watch log:');
  if (!reason) return;
  try {
    await EOM.post(`/watches/${id}/unlock`, { reason });
    showToast('Watch unlocked — it is now editable', 'success');
    loadWatches();
  } catch(e) { showToast(e.message, 'error'); }
}

// ── ADMIN PANEL ───────────────────────────────────────────────────────────────
async function loadAdminPanel() {
  if (!isAdmin) return;
  const panel = document.getElementById('adminPanel');
  panel.innerHTML = `<div class="admin-section">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <span class="admin-title">User Management</span>
      <button class="add-btn" onclick="openModal()">+ Add User</button>
    </div>
    <table class="user-table">
      <thead><tr><th>Username</th><th>Role</th><th>Vessel</th><th>Active</th></tr></thead>
      <tbody id="userTbody"><tr><td colspan="4" style="color:var(--muted);padding:12px">Loading…</td></tr></tbody>
    </table>
  </div>`;
  try {
    const users = await EOM.get('/admin/users');
    document.getElementById('userTbody').innerHTML = users.map(u => `
      <tr>
        <td style="font-family:var(--mono)">${u.username}</td>
        <td><span class="badge ${u.role==='admin'?'locked':u.role==='superintendent'?'submitted':'draft'}">${u.role}</span></td>
        <td style="font-size:11px;color:var(--muted)">${u.vessel_name||'—'}</td>
        <td style="font-size:11px;color:${u.active?'var(--green)':'var(--red)'}">${u.active?'Active':'Inactive'}</td>
      </tr>
    `).join('');
  } catch(e) { console.error(e); }
}

let editUserId = null;
function openModal() {
  editUserId = null;
  document.getElementById('mUser').value='';
  document.getElementById('mPass').value='';
  document.getElementById('mRole').value='vessel';
  document.getElementById('mVessel').value='';
  document.getElementById('modalTitle').textContent = 'Add User';
  document.getElementById('modalOverlay').style.display = 'flex';
}
function closeModal(e) {
  if (!e || e.target.id === 'modalOverlay') document.getElementById('modalOverlay').style.display = 'none';
}
async function saveUser() {
  const body = {
    username: document.getElementById('mUser').value.trim().toLowerCase(),
    password: document.getElementById('mPass').value,
    role: document.getElementById('mRole').value,
    vessel_id: document.getElementById('mVessel').value || null
  };
  if (!body.username || !body.password) { alert('Username and password required'); return; }
  try {
    await EOM.post('/admin/users', body);
    closeModal();
    showToast('User created', 'success');
    loadAdminPanel();
  } catch(e) { showToast(e.message, 'error'); }
}

let toastTimer;
function showToast(msg, type='info') {
  let t = document.getElementById('_toast');
  if (!t) { t=document.createElement('div'); t.id='_toast'; t.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e293b;border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 18px;font-size:13px;z-index:999'; document.body.appendChild(t); }
  t.textContent = msg;
  t.style.borderColor = type==='error'?'rgba(239,68,68,.3)':type==='success'?'rgba(34,197,94,.3)':'rgba(255,255,255,.1)';
  t.style.opacity='1';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.style.opacity='0'; }, 3500);
}
</script>
</body>
</html>
