<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<script>(function(){var t=localStorage.getItem("fc-theme");if(t)document.documentElement.setAttribute("data-theme",t);})()</script>
<title>FORCAP -- Audit Trail</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="/eom-api.js"></script>
<style>
:root{--bg:#070d1a;--sf:#0f172a;--sf2:#1e293b;--bd:rgba(255,255,255,.08);--t1:#f1f5f9;--t2:#94a3b8;--t3:#475569;--blue:#3b82f6;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;--r:12px}
[data-theme="light"]{--bg:#e8ecf2;--sf:#fff;--sf2:#f1f5f9;--bd:rgba(0,0,0,.08);--t1:#101828;--t2:#475467;--t3:#98a2b3;--blue:#1264d8}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--t1);min-height:100vh;display:flex;flex-direction:column}
.hdr{height:52px;background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 20px;gap:10px;flex-shrink:0}
.logo{width:30px;height:30px;background:linear-gradient(135deg,#1d4ed8,#7c3aed);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
.hdr-right{margin-left:auto;display:flex;gap:8px}
.hbtn{padding:5px 12px;border-radius:8px;border:1px solid var(--bd);background:transparent;color:var(--t2);font-size:11px;cursor:pointer;font-family:var(--font);text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:.15s}
.hbtn:hover{background:var(--sf2);color:var(--t1)}
.hbtn-blue{background:var(--blue);border-color:var(--blue);color:#fff}
/* Layout */
.main{flex:1;max-width:1100px;margin:0 auto;padding:24px 20px;width:100%}
/* Search bar */
.search-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:18px 20px;margin-bottom:20px}
.search-grid{display:grid;grid-template-columns:1fr 1fr auto auto auto;gap:12px;align-items:end;flex-wrap:wrap}
.fg{display:flex;flex-direction:column;gap:5px}
.fl{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
.fi,.fs{background:var(--sf2);border:1px solid var(--bd);color:var(--t1);font-family:var(--font);font-size:12px;padding:7px 11px;border-radius:8px;outline:none}
.fi:focus,.fs:focus{border-color:var(--blue)}
/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--sf2);padding:4px;border-radius:10px;width:fit-content}
.tab-btn{padding:7px 18px;border-radius:7px;border:none;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;transition:.15s;background:transparent;color:var(--t2)}
.tab-btn.active{background:var(--sf);color:var(--t1);box-shadow:0 1px 3px rgba(0,0,0,.2)}
/* Results list */
.results{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.result-row{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:.15s}
.result-row:hover{border-color:var(--blue);background:rgba(59,130,246,.04)}
.result-row.selected{border-color:var(--blue);background:rgba(59,130,246,.06)}
.result-ref{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--blue);min-width:180px}
.result-date{font-size:13px;font-weight:600;min-width:110px}
.result-meta{font-size:11px;color:var(--t3);flex:1}
.status-badge{font-size:9px;font-weight:800;padding:2px 8px;border-radius:8px}
.s-locked{background:rgba(34,197,94,.15);color:#86efac;border:1px solid rgba(34,197,94,.3)}
.s-de{background:rgba(59,130,246,.15);color:#93c5fd;border:1px solid rgba(59,130,246,.3)}
.s-open{background:rgba(245,158,11,.15);color:#fcd34d;border:1px solid rgba(245,158,11,.3)}
/* Audit record panel */
.audit-panel{background:var(--sf);border:1.5px solid rgba(59,130,246,.3);border-radius:var(--r);overflow:hidden}
.audit-hdr{background:linear-gradient(135deg,rgba(59,130,246,.12),rgba(124,58,237,.08));padding:16px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.audit-ref{font-family:var(--mono);font-size:18px;font-weight:800;color:var(--blue)}
.audit-meta{font-size:11px;color:var(--t2);margin-top:4px;line-height:1.7}
.audit-meta strong{color:var(--t1)}
/* Signature strip */
.sig-strip{display:grid;grid-template-columns:1fr 1fr;gap:0;border-bottom:1px solid var(--bd)}
.sig-block{padding:12px 20px;border-right:1px solid var(--bd)}
.sig-block:last-child{border-right:none}
.sig-label{font-size:9px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px}
.sig-name{font-size:13px;font-weight:700;color:var(--t1)}
.sig-ts{font-size:10px;color:var(--t3);font-family:var(--mono);margin-top:2px}
.sig-pending{font-size:12px;color:var(--t3);font-style:italic}
/* UMS table */
.ums-table{width:100%;border-collapse:collapse;font-size:12px}
.ums-table th{background:var(--sf2);padding:7px 14px;text-align:left;font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--bd)}
.ums-table td{padding:9px 14px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:top}
.ums-table tr:last-child td{border-bottom:none}
.status-ok{color:#86efac;font-weight:700}
.status-fault{color:#fca5a5;font-weight:700}
.status-nr{color:#fcd34d;font-weight:700}
.status-blank{color:var(--t3);font-style:italic}
.fault-note{margin-top:4px;font-size:11px;color:#fca5a5;background:rgba(239,68,68,.06);border-left:2px solid rgba(239,68,68,.3);padding:3px 8px;border-radius:0 4px 4px 0}
.informed-tag{font-size:9px;font-weight:700;padding:1px 6px;border-radius:6px;background:rgba(34,197,94,.12);color:#86efac;border:1px solid rgba(34,197,94,.3);margin-left:6px}
/* ER log table */
.er-section{margin-bottom:0}
.er-sec-hdr{padding:8px 14px;background:var(--sf2);border-bottom:1px solid var(--bd);font-size:11px;font-weight:700;color:var(--blue)}
.er-table{width:100%;border-collapse:collapse;font-size:11px}
.er-table th{background:rgba(0,0,0,.2);padding:5px 12px;text-align:left;font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--bd)}
.er-table td{padding:6px 12px;border-bottom:1px solid rgba(255,255,255,.03)}
.er-table tr:last-child td{border-bottom:none}
.alarm-row td{background:rgba(239,68,68,.06);color:#fca5a5}
.warn-row td{background:rgba(245,158,11,.06);color:#fcd34d}
/* Empty */
.empty{text-align:center;padding:50px 20px;color:var(--t3)}
/* Print */
@media print{
  .hdr,.search-card,.tabs,.results,button,.hbtn{display:none!important}
  .main{max-width:100%;padding:0}
  body{background:#fff;color:#000}
  .audit-panel{border:1px solid #ccc}
  .print-hdr{display:flex!important}
  .audit-ref{color:#003366}
  .audit-meta{color:#444}
  .sig-name{color:#000}
  .sig-ts,.sig-label,.sig-pending{color:#666}
  .er-sec-hdr{background:#f5f7fa;color:#003366}
  .er-table th{background:#f0f3f7;color:#555}
  .status-ok{color:green}
  .status-fault{color:red}
  .status-nr{color:#b8860b}
}
.print-hdr{display:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
</style>
</head>

window.addEventListener('DOMContentLoaded', async function(){
  if(typeof EOM==='undefined') return;
  if(!EOM.requireAuth()) return;
  // Audit available to superintendent/admin/manager
  var u=EOM.user();
  if(!u||!['admin','superintendent','manager'].includes(u.role)){
    document.getElementById('results-list').innerHTML='<div class="empty"><div style="font-size:36px;margin-bottom:10px">&#128274;</div><div style="font-size:15px;font-weight:700">Access Restricted</div><div style="margin-top:8px;font-size:13px">Audit Trail is available to Superintendents and Managers only.</div><a href="/logbook.html" style="display:inline-block;margin-top:16px;padding:8px 20px;background:var(--blue);color:#fff;border-radius:8px;text-decoration:none;font-size:13px;font-weight:600">Back to Logbook</a></div>';
    return;
  }
  try{
    var v=await EOM.get('/vessels');
    if(!v.length) return;
    vesselId=v[0].id; vesselName=v[0].name;
    document.getElementById('vessel-lbl').textContent='-- '+vesselName;
  }catch(e){}
  // Default: last 30 days
  var now=new Date();
  document.getElementById('to-date').value=now.toISOString().slice(0,10);
  document.getElementById('from-date').value=new Date(now-30*86400000).toISOString().slice(0,10);
  doSearch();
  if(!EOM.post) EOM.post=async function(p,b){var t=localStorage.getItem('eom_token');var r=await fetch('/api'+p,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+t},body:JSON.stringify(b)});var d=await r.json();if(!r.ok)throw new Error(d.error||'Failed');return d;};
});

function switchTab(tab){
  currentTab=tab;
  selectedId=null;
  document.getElementById('tab-ums').classList.toggle('active',tab==='ums');
  document.getElementById('tab-er').classList.toggle('active',tab==='er');
  document.getElementById('audit-record').innerHTML='';
  document.getElementById('btn-print').style.display='none';
  doSearch();
}

async function doSearch(){
  var from=document.getElementById('from-date').value;
  var to=document.getElementById('to-date').value;
  var ref=document.getElementById('search-ref').value.trim();
  var list=document.getElementById('results-list');
  list.innerHTML='<div class="empty"><div class="spinner" style="width:24px;height:24px;border:3px solid var(--bd);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px"></div>Searching...</div>';

  if(currentTab==='ums'){
    try{
      var url='/ums?vessel_id='+vesselId+'&limit=50';
      if(from) url+='&from='+from;
      if(to)   url+='&to='+to;
      var rows=await EOM.get(url);
      if(ref) rows=rows.filter(function(r){
        return (r.ref_number||'').toLowerCase().includes(ref.toLowerCase())||
               (r.duty_engineer||'').toLowerCase().includes(ref.toLowerCase());
      });
      renderUMSList(rows);
    }catch(e){list.innerHTML='<div class="empty">Error: '+esc(e.message)+'</div>';}
  } else {
    try{
      if(!from||!to){list.innerHTML='<div class="empty">Select a date range to search ER logs</div>';return;}
      // Get unique dates with data
      var url='/watches/export?vessel_id='+vesselId+'&from='+from+'&to='+to;
      var data=await EOM.get(url);
      var rows=data.rows||[];
      // Deduplicate by date
      var dates={};
      rows.forEach(function(r){
        if(!dates[r.date]) dates[r.date]={date:r.date,count:0,sections:new Set(),alarms:0};
        dates[r.date].count++;
        dates[r.date].sections.add(r.section);
        if(r.is_alarm) dates[r.date].alarms++;
      });
      var dateList=Object.values(dates).sort(function(a,b){return b.date.localeCompare(a.date);});
      renderERList(dateList, rows);
    }catch(e){list.innerHTML='<div class="empty">Error: '+esc(e.message)+'</div>';}
  }
}

function clearSearch(){
  document.getElementById('search-ref').value='';
  var now=new Date();
  document.getElementById('to-date').value=now.toISOString().slice(0,10);
  document.getElementById('from-date').value=new Date(now-30*86400000).toISOString().slice(0,10);
  document.getElementById('audit-record').innerHTML='';
  document.getElementById('btn-print').style.display='none';
  doSearch();
}

// ── UMS LIST ───────────────────────────────────────────────────────────────
function renderUMSList(rows){
  var el=document.getElementById('results-list');
  if(!rows.length){el.innerHTML='<div class="empty">No UMS checklists found for this period</div>';return;}
  el.innerHTML=rows.map(function(r){
    var sClass=r.is_locked?'s-locked':r.de_signed?'s-de':'s-open';
    var sLabel=r.is_locked?'Locked & Signed':r.de_signed?'D/E Signed':'In Progress';
    var active=selectedId===r.id?'selected':'';
    return '<div class="result-row '+active+'" onclick="loadUMSRecord('+r.id+')">'
      +'<span class="result-ref">'+(r.ref_number||'Pending')+'</span>'
      +'<span class="result-date">'+r.checklist_date.slice(0,10)+'</span>'
      +'<span class="result-meta">D/E: '+(r.duty_engineer||'--')+'</span>'
      +'<span class="status-badge '+sClass+'">'+sLabel+'</span>'
      +'</div>';
  }).join('');
}

async function loadUMSRecord(id){
  selectedId=id;
  // Highlight selected
  document.querySelectorAll('.result-row').forEach(function(r){r.classList.remove('selected');});
  event.currentTarget.classList.add('selected');
  document.getElementById('btn-print').style.display='';
  var panel=document.getElementById('audit-record');
  panel.innerHTML='<div class="empty"><div style="width:24px;height:24px;border:3px solid var(--bd);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px"></div></div>';
  try{
    var rec=await EOM.get('/ums/'+id);
    renderUMSRecord(rec);
    document.getElementById('print-meta').textContent=vesselName+' | UMS Audit Record | Ref: '+(rec.ref_number||'N/A');
  }catch(e){panel.innerHTML='<div class="empty">Error: '+esc(e.message)+'</div>';}
}

function renderUMSRecord(rec){
  var items=rec.items||{};
  var date=rec.checklist_date.slice(0,10);
  var sClass=rec.is_locked?'s-locked':rec.de_signed?'s-de':'s-open';
  var sLabel=rec.is_locked?'Locked & Signed':rec.de_signed?'D/E Signed':'In Progress';
  var faultCount=Object.values(items).filter(function(v){return v&&typeof v==='object'&&v.status==='fault';}).length;
  var answeredCount=Object.values(items).filter(function(v){return v&&(typeof v==='boolean'?v:v.status!=='');}).length;

  var h='<div class="audit-panel">';
  // Header
  h+='<div class="audit-hdr">';
  h+='<div>';
  h+='<div class="audit-ref">'+(rec.ref_number||'Not yet saved')+'</div>';
  h+='<div class="audit-meta">';
  h+='<strong>Vessel:</strong> '+esc(rec.vessel_name||vesselName)+' &nbsp;|&nbsp; ';
  h+='<strong>Date:</strong> '+date+' &nbsp;|&nbsp; ';
  h+='<strong>Type:</strong> UMS Checklist<br>';
  h+='<strong>Created:</strong> '+new Date(rec.created_at).toLocaleString()+' by '+esc(rec.created_by_name||'--')+'<br>';
  h+='<strong>Items answered:</strong> '+answeredCount+'/'+UMS_ITEMS.length;
  if(faultCount>0) h+=' &nbsp;|&nbsp; <strong style="color:#fca5a5">Faults recorded: '+faultCount+'</strong>';
  h+='</div></div>';
  h+='<span class="status-badge '+sClass+'" style="font-size:11px;padding:4px 12px">'+sLabel+'</span>';
  h+='</div>';

  // Signature strip
  h+='<div class="sig-strip">';
  h+='<div class="sig-block"><div class="sig-label">Duty Engineer</div>';
  if(rec.de_signed){
    h+='<div class="sig-name">'+esc(rec.duty_engineer||rec.de_signer_name||'Signed')+'</div>';
    h+='<div class="sig-ts">Signed: '+new Date(rec.de_signed_at).toLocaleString()+'</div>';
  } else {
    h+='<div class="sig-pending">Not yet signed</div>';
  }
  h+='</div>';
  h+='<div class="sig-block"><div class="sig-label">Chief Engineer</div>';
  if(rec.ce_signed){
    h+='<div class="sig-name">'+esc(rec.chief_engineer||rec.ce_signer_name||'Signed')+'</div>';
    h+='<div class="sig-ts">Signed: '+new Date(rec.ce_signed_at).toLocaleString()+'</div>';
  } else {
    h+='<div class="sig-pending">Not yet signed</div>';
  }
  h+='</div></div>';

  // Checklist table
  h+='<div style="overflow-x:auto"><table class="ums-table">';
  h+='<thead><tr><th style="width:40px">#</th><th>Checklist Item</th><th style="width:130px">Status</th><th style="width:200px">Fault Description</th></tr></thead><tbody>';
  UMS_ITEMS.forEach(function(text,i){
    var v=items[i];
    var status='',comment='',informed=false;
    if(!v){status='';} 
    else if(typeof v==='boolean'){status=v?'ok':'';}
    else{status=v.status||'';comment=v.comment||'';informed=!!v.informed;}
    var statusHtml=status==='ok'?'<span class="status-ok">Yes, All Okay</span>':
                   status==='fault'?'<span class="status-fault">No - Fault</span>':
                   status==='nr'?'<span class="status-nr">Not Running</span>':
                   '<span class="status-blank">Not answered</span>';
    var rowStyle=status==='fault'?'background:rgba(239,68,68,.03)':'';
    h+='<tr style="'+rowStyle+'">';
    h+='<td style="color:var(--t3);font-family:var(--mono)">'+(i+1)+'</td>';
    h+='<td>'+esc(text)+'</td>';
    h+='<td>'+statusHtml+'</td>';
    h+='<td>';
    if(comment){
      h+='<div class="fault-note">'+esc(comment);
      if(informed) h+='<span class="informed-tag">Informed</span>';
      h+='</div>';
    } else if(status==='fault'){
      h+='<span style="color:var(--t3);font-size:10px;font-style:italic">No description</span>';
    }
    h+='</td></tr>';
  });
  h+='</tbody></table></div>';

  if(rec.remarks){
    h+='<div style="padding:12px 20px;border-top:1px solid var(--bd);font-size:12px;color:var(--t2)"><strong style="color:var(--t1)">Remarks:</strong> '+esc(rec.remarks)+'</div>';
  }
  h+='</div>';
  document.getElementById('audit-record').innerHTML=h;
  document.getElementById('audit-record').scrollIntoView({behavior:'smooth',block:'start'});
}

// ── ER LOG LIST & RECORD ──────────────────────────────────────────────────
var cachedERRows=[];

function onERRowClick(el){
  loadERRecord(el.dataset.date);
}


function renderERList(dateList, rows){
  cachedERRows=rows;
  var el=document.getElementById('results-list');
  if(!dateList.length){el.innerHTML='<div class="empty">No ER log readings found for this period</div>';return;}
  el.innerHTML=dateList.map(function(d){
    var secList=[...d.sections].slice(0,4).join(', ')+(d.sections.size>4?' +more':'');
    var alarmBadge=d.alarms>0?'<span class="status-badge s-open">'+d.alarms+' alarm'+( d.alarms>1?'s':'')+'</span>':'';
    var active=selectedId===d.date?'selected':'';
    return '<div class="result-row '+active+'" data-date="'+d.date+'" onclick="onERRowClick(this)">' 
      +'<span class="result-ref" style="font-size:13px;color:var(--t1)">'+d.date+'</span>'
      +'<span class="result-meta">'+d.count+' readings &nbsp;|&nbsp; '+secList+'</span>'
      +alarmBadge
      +'</div>';
  }).join('');
}

function loadERRecord(date){
  selectedId=date;
  document.querySelectorAll('.result-row').forEach(function(r){r.classList.remove('selected');});
  event.currentTarget.classList.add('selected');
  document.getElementById('btn-print').style.display='';
  var dateRows=cachedERRows.filter(function(r){return r.date===date;});
  renderERRecord(date, dateRows);
  document.getElementById('print-meta').textContent=vesselName+' | ER Log | '+date;
}

function renderERRecord(date, rows){
  if(!rows.length){document.getElementById('audit-record').innerHTML='<div class="empty">No readings for this date</div>';return;}
  var alarmCount=rows.filter(function(r){return r.is_alarm;}).length;
  var warnCount=rows.filter(function(r){return r.is_warning;}).length;
  var de=rows[0].duty_engineer||'Not recorded';
  var sections={};
  rows.forEach(function(r){
    var s=r.section||'Other';
    if(!sections[s]) sections[s]=[];
    sections[s].push(r);
  });

  var h='<div class="audit-panel">';
  // Header
  h+='<div class="audit-hdr">';
  h+='<div>';
  h+='<div class="audit-ref" style="font-size:16px">ER Log -- '+date+'</div>';
  h+='<div class="audit-meta">';
  h+='<strong>Vessel:</strong> '+esc(vesselName)+' &nbsp;|&nbsp; ';
  h+='<strong>Date:</strong> '+date+' &nbsp;|&nbsp; ';
  h+='<strong>Duty Engineer:</strong> '+esc(de)+'<br>';
  h+='<strong>Total readings:</strong> '+rows.length;
  if(alarmCount>0) h+=' &nbsp;|&nbsp; <strong style="color:#fca5a5">'+alarmCount+' alarm reading'+(alarmCount>1?'s':'')+'</strong>';
  if(warnCount>0)  h+=' &nbsp;|&nbsp; <strong style="color:#fcd34d">'+warnCount+' warning'+(warnCount>1?'s':'')+'</strong>';
  h+='</div></div>';
  h+='<span class="status-badge s-locked">ER Log</span>';
  h+='</div>';

  Object.keys(sections).sort().forEach(function(sec){
    var secRows=sections[sec];
    h+='<div class="er-section"><div class="er-sec-hdr">'+esc(sec)+' ('+secRows.length+' readings)</div>';
    h+='<table class="er-table"><thead><tr><th>Equipment</th><th>Parameter</th><th>Value</th><th>Unit</th><th>Status</th></tr></thead><tbody>';
    secRows.forEach(function(r){
      var rowCls=r.is_alarm?'alarm-row':r.is_warning?'warn-row':'';
      var statusHtml=r.is_alarm?'<span style="color:#fca5a5;font-weight:700">ALARM</span>':r.is_warning?'<span style="color:#fcd34d;font-weight:700">WARNING</span>':'Normal';
      h+='<tr class="'+rowCls+'">'
        +'<td>'+esc(r.equipment)+'</td>'
        +'<td>'+esc(r.parameter)+'</td>'
        +'<td style="font-family:var(--mono);font-weight:600">'+esc(r.value)+'</td>'
        +'<td style="color:var(--t3)">'+esc(r.unit||'')+'</td>'
        +'<td>'+statusHtml+'</td>'
        +'</tr>';
    });
    h+='</tbody></table></div>';
  });
  h+='</div>';
  document.getElementById('audit-record').innerHTML=h;
  document.getElementById('audit-record').scrollIntoView({behavior:'smooth',block:'start'});
}

function printRecord(){
  window.print();
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
