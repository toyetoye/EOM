<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>FORCAP -- AI Reports</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="/eom-api.js"></script>
<style>
:root{--bg:#070d1a;--sf:#0f172a;--sf2:#1e293b;--bd:rgba(255,255,255,.08);--t1:#f1f5f9;--t2:#94a3b8;--t3:#475569;--blue:#3b82f6;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--purple:#a855f7;--font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;--r:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--t1);min-height:100vh;display:flex;flex-direction:column}
.hdr{height:56px;background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 20px;gap:10px;flex-shrink:0}
.logo{width:32px;height:32px;background:linear-gradient(135deg,#1d4ed8,#7c3aed);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
.hdr-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.hbtn{padding:5px 12px;border-radius:8px;border:1px solid var(--bd);background:transparent;color:var(--t2);font-size:11px;cursor:pointer;font-family:var(--font);text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:.15s}
.hbtn:hover{background:var(--sf2);color:var(--t1)}
.hbtn-blue{background:var(--blue);border-color:var(--blue);color:#fff}
.hbtn-blue:hover{opacity:.9}
.layout{flex:1;display:flex;overflow:hidden;min-height:0}
.sb{width:196px;background:var(--sf);border-right:1px solid var(--bd);flex-shrink:0;display:flex;flex-direction:column;padding:10px 0}
.sb-btn{display:flex;align-items:center;gap:8px;width:100%;padding:9px 16px;border:none;background:transparent;color:var(--t2);font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font);transition:.15s;text-align:left}
.sb-btn:hover{background:rgba(255,255,255,.04);color:var(--t1)}
.sb-btn.active{background:rgba(59,130,246,.1);color:var(--blue);font-weight:700}
.sb-div{height:1px;background:var(--bd);margin:6px 12px}
.main{flex:1;overflow-y:auto;padding:24px;min-width:0}
/* Controls */
.ctrl{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:12px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:20px}
.ctrl-lbl{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px}
.ctrl-sel{background:var(--sf2);border:1px solid var(--bd);color:var(--t1);font-family:var(--font);font-size:12px;padding:6px 10px;border-radius:8px;outline:none;cursor:pointer}
.ctrl-sel:focus{border-color:var(--blue)}
/* Cards */
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:16px}
.card-hdr{padding:10px 16px;border-bottom:1px solid var(--bd);background:var(--sf2);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:13px;font-weight:700}
.card-meta{font-size:11px;color:var(--t3)}
/* Stat grid */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px 16px}
.stat-val{font-size:26px;font-weight:700;font-family:var(--mono)}
.stat-lbl{font-size:10px;color:var(--t2);margin-top:3px}
/* Parameter table */
.ptbl{width:100%;border-collapse:collapse;font-size:12px}
.ptbl th{padding:7px 14px;background:var(--sf2);font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--bd);text-align:left;white-space:nowrap}
.ptbl th.r{text-align:right}
.ptbl td{padding:8px 14px;border-bottom:1px solid rgba(255,255,255,.03);vertical-align:middle}
.ptbl tr:last-child td{border-bottom:none}
.ptbl tr.clickable:hover td{background:rgba(59,130,246,.06);cursor:pointer}
.ptbl tr.clickable:hover td:first-child{border-left:3px solid var(--blue)}
.r{text-align:right;font-family:var(--mono);font-size:11px}
.na{color:var(--t3);font-size:10px}
.rise-crit{color:#fca5a5;font-weight:700}
.rise-warn{color:#fcd34d;font-weight:700}
.fall-ok{color:#86efac}
.fall-crit{color:#fca5a5;font-weight:700}
.flat{color:var(--t3)}
.spark{width:80px;height:26px}
/* Anomaly rows */
.arow{display:flex;align-items:center;gap:12px;padding:8px 16px;border-bottom:1px solid rgba(255,255,255,.04)}
.arow:last-child{border-bottom:none}
.arow.s3{border-left:3px solid var(--red);background:rgba(239,68,68,.04)}
.arow.s2{border-left:3px solid var(--amber);background:rgba(245,158,11,.04)}
.arow.s1{border-left:3px solid var(--blue);background:rgba(59,130,246,.04)}
/* Modal overlay */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);width:100%;max-width:960px;max-height:92vh;overflow-y:auto;display:flex;flex-direction:column}
.modal-hdr{padding:14px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:12px;flex-shrink:0;background:var(--sf2);position:sticky;top:0;z-index:1}
.modal-title{font-size:15px;font-weight:700;flex:1}
.modal-close{background:transparent;border:none;color:var(--t3);font-size:20px;cursor:pointer;padding:0 4px;line-height:1}
.modal-body{padding:20px;flex:1;display:flex;flex-direction:column;gap:16px}
/* Chart area */
.chart-wrap{background:var(--sf2);border-radius:10px;padding:16px}
.chart-title{font-size:12px;font-weight:700;margin-bottom:12px;color:var(--t2)}
/* AI analysis panel */
.ai-panel{background:linear-gradient(135deg,rgba(59,130,246,.06),rgba(124,58,237,.06));border:1.5px solid rgba(59,130,246,.2);border-radius:10px;padding:16px}
.ai-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.ai-badge{background:var(--blue);color:#fff;font-size:10px;font-weight:800;padding:2px 8px;border-radius:6px;letter-spacing:.5px}
.ai-loading{display:flex;align-items:center;gap:10px;color:var(--t2);font-size:13px}
.ai-spinner{width:16px;height:16px;border:2px solid var(--bd);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* Risk badge */
.risk-low{background:rgba(34,197,94,.15);color:#86efac;border:1px solid rgba(34,197,94,.3);padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700}
.risk-medium{background:rgba(245,158,11,.15);color:#fcd34d;border:1px solid rgba(245,158,11,.3);padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700}
.risk-high{background:rgba(239,68,68,.15);color:#fca5a5;border:1px solid rgba(239,68,68,.3);padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700}
.risk-critical{background:rgba(239,68,68,.3);color:#fff;border:1px solid rgba(239,68,68,.5);padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700}
/* AI finding blocks */
.finding{background:var(--sf);border-radius:8px;padding:10px 14px;margin-bottom:8px;border-left:3px solid var(--blue);font-size:12px;color:var(--t2);line-height:1.6}
.finding strong{color:var(--t1);display:block;margin-bottom:4px;font-size:13px}
/* Monthly sparklines */
.spark-row{display:flex;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.spark-row:last-child{border-bottom:none}
/* Empty/loading */
.empty{text-align:center;padding:60px 20px;color:var(--t3)}
.spinner{width:28px;height:28px;border:3px solid var(--bd);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo">FC</div>
  <span style="font-size:14px;font-weight:700">FORCAP AI Reports</span>
  <span id="vessel-lbl" style="font-size:12px;color:var(--t2)"></span>
  <div class="hdr-right">
    <button class="hbtn hbtn-blue" onclick="exportPDF()">📄 Export PDF</button>
    <a class="hbtn" href="/logbook.html">← Logbook</a>
  </div>
</div>

<div class="layout">
  <div class="sb">
    <button class="sb-btn active" id="sb-anomalies" onclick="showView('anomalies',this)">🤖 Today's Anomalies</button>
    <div class="sb-div"></div>
    <button class="sb-btn" id="sb-report" onclick="showView('report',this)">📊 Monthly Trend</button>
    <button class="sb-btn" id="sb-yoy" onclick="showView('yoy',this)">📈 Year-on-Year</button>
  </div>
  <div class="main" id="main"><div class="empty"><div class="spinner"></div>Loading...</div></div>
</div>

<!-- Drill-down modal -->
<div class="modal-bg" id="drill-modal" style="display:none" onclick="if(event.target===this)closeDrill()">
  <div class="modal">
    <div class="modal-hdr">
      <div>
        <div class="modal-title" id="drill-title">Parameter Detail</div>
        <div style="font-size:11px;color:var(--t3)" id="drill-sub"></div>
      </div>
      <button class="modal-close" onclick="closeDrill()">✕</button>
    </div>
    <div class="modal-body" id="drill-body">
      <div class="empty"><div class="spinner"></div></div>
    </div>
  </div>
</div>

window.addEventListener('DOMContentLoaded', async function(){

  try{
    var v=await EOM.get('/vessels');
    if(!v.length){showEmpty('No vessels');return;}
    vesselId=v[0].id; vesselName=v[0].name;
    document.getElementById('vessel-lbl').textContent='? '+vesselName;
    await showView('anomalies', document.getElementById('sb-anomalies'));
  }catch(e){showEmpty('Error: '+e.message);}
});

async function showView(view,btn){
  currentView=view;
  document.querySelectorAll('.sb-btn').forEach(function(b){b.classList.remove('active');});
  if(btn) btn.classList.add('active');
  destroyCharts(sparkCharts); sparkCharts=[];
  if(view==='anomalies') await renderAnomalies();
  else if(view==='report') await renderMonthlyReport();
  else await renderYOY();
}

async function renderAnomalies(){
  showLoading('Scoring readings against 3-year baseline...');
  var today=new Date().toISOString().slice(0,10);
  try{ anomalyData=await EOM.get('/watches/anomalies?vessel_id='+vesselId+'&date='+today); }
  catch(e){showEmpty('Error: '+e.message);return;}
  var d=anomalyData;
  if(!d||!d.total_readings){showEmpty('No readings for today -- submit the daily log first.');return;}
  var crit=d.anomalies.filter(function(a){return a.severity===3;}).length;
  var warn=d.anomalies.filter(function(a){return a.severity===2;}).length;
  var note=d.anomalies.filter(function(a){return a.severity===1;}).length;
  var norm=d.total_readings-d.scored_count;

  var h='<div class="stat-grid">';
  h+='<div class="stat-card"><div class="stat-val" style="color:var(--t2)">'+d.total_readings+'</div><div class="stat-lbl">Readings Scored</div></div>';
  h+='<div class="stat-card"><div class="stat-val" style="color:var(--green)">'+norm+'</div><div class="stat-lbl">Within Normal Range</div></div>';
  h+='<div class="stat-card"><div class="stat-val" style="color:'+(warn+crit>0?'var(--amber)':'var(--t2)')+'">'+warn+'</div><div class="stat-lbl">Warnings (>2?)</div></div>';
  h+='<div class="stat-card"><div class="stat-val" style="color:'+(crit>0?'var(--red)':'var(--t2)')+'">'+crit+'</div><div class="stat-lbl">Critical (>3?)</div></div>';
  h+='</div>';

  if(!d.anomalies.length){
    h+='<div class="card"><div style="padding:40px;text-align:center"><div style="font-size:40px;margin-bottom:12px">?</div>';
    h+='<div style="font-size:15px;font-weight:700;color:var(--green)">All readings within normal range</div>';
    h+='<div style="font-size:12px;color:var(--t2);margin-top:8px">'+d.total_readings+' readings scored. No statistical anomalies.</div></div></div>';
  } else {
    var SCOL=['','var(--blue)','var(--amber)','var(--red)'];
    var SLBL=['','? Notable (1.5-2?)','?? Warning (2-3?)','? Critical (>3?)'];
    [3,2,1].forEach(function(sev){
      var anoms=d.anomalies.filter(function(a){return a.severity===sev;});
      if(!anoms.length) return;
      h+='<div class="card">';
      h+='<div class="card-hdr"><span class="card-title" style="color:'+SCOL[sev]+'">'+SLBL[sev]+'</span>';
      h+='<span class="card-meta">'+anoms.length+' parameters -- click any row to drill down</span></div>';
      anoms.forEach(function(a){
        var dir=a.direction==='high'?'? HIGH':'? LOW';
        var pct=a.pct_from_mean!==null?(a.pct_from_mean>0?'+':'')+a.pct_from_mean+'%':'';
        var interp=interpretAnomaly(a);
        h+='<div class="arow s'+sev+'" style="cursor:pointer" data-fid="'+a.fid+'" data-p="'+a.parameter+'" data-s="'+a.section+'" onclick="onDrillClick(this)">';
        h+='<div style="flex:1;min-width:0">';
        h+='<div style="font-size:12px;font-weight:700">'+esc(a.equipment)+' -- '+esc(a.parameter)+'</div>';
        h+='<div style="font-size:10px;color:var(--t3)">'+esc(a.section)+'</div>';
        if(interp) h+='<div style="font-size:11px;color:var(--t2);margin-top:3px;font-style:italic">'+esc(interp)+'</div>';
        h+='</div>';
        h+='<div style="text-align:right;margin-right:12px;flex-shrink:0">';
        h+='<div style="font-size:14px;font-weight:700;font-family:var(--mono);color:'+SCOL[sev]+'">'+a.value+' '+esc(a.unit||'')+'</div>';
        h+='<div style="font-size:10px;color:var(--t3)">mean='+a.mean+(pct?' ? '+pct+' from mean':'')+'</div>';
        h+='<div style="font-size:10px;color:var(--t3)">? score: '+a.z_score+'</div>';
        h+='</div>';
        var range=a.p90-a.p10; var bp=range>0?Math.min(98,Math.max(2,(a.value-a.p10)/range*100)):50;
        h+='<div style="width:80px;flex-shrink:0">';
        h+='<div style="height:6px;background:rgba(255,255,255,.08);border-radius:3px;position:relative;margin-bottom:4px">';
        h+='<div style="position:absolute;height:100%;width:80%;left:10%;background:rgba(255,255,255,.1);border-radius:2px"></div>';
        h+='<div style="position:absolute;width:3px;height:12px;background:'+SCOL[sev]+';border-radius:1px;top:-3px;left:'+bp+'%;margin-left:-1px"></div>';

  document.getElementById('main').innerHTML=h;
}

function interpretAnomaly(a){
  var p=a.parameter.toLowerCase(),s=a.section.toLowerCase(),dir=a.direction;
  if(p.includes('temp')&&p.includes('exh')&&dir==='high') return 'High exhaust temp -- check fuel injection, scavenge air, or fuel quality';
  if(p.includes('pressure')&&(p.includes('lube')||p.includes(' lo'))&&dir==='low') return 'Low LO pressure -- check pump, filter, or sump level';
  if(p.includes('temp')&&p.includes('bearing')&&dir==='high') return 'High bearing temp -- check lubrication or alignment';
  if(p.includes('sea water')&&dir==='high') return 'SW temp higher than typical for this area -- verify sensor';
  if(p.includes('superheat')&&dir==='high') return 'High superheat -- low refrigerant charge or TXV/EEV fault';
  if(p.includes('h.p pressure')&&dir==='high') return 'High HP pressure -- condenser fouling or refrigerant overcharge';
  if(p.includes('l.p pressure')&&dir==='low') return 'Low LP pressure -- refrigerant undercharge or evaporator icing';
  if(p.includes('receiver level')&&dir==='low') return 'Low refrigerant level -- possible leak';
  if(p.includes('stern tube')&&p.includes('temp')&&dir==='high') return 'High stern tube temp -- check LO flow and bearing condition';
  if(p.includes('cfw')&&dir==='high') return 'High cooling FW temp -- check HT cooler, pump, or system load';
  if(p.includes('cyl oil')&&dir==='low') return 'Cylinder oil level dropping -- check consumption rate vs run hours';
  if(p.includes('motor current')&&dir==='high') return 'High motor current -- possible overload or mechanical resistance';
  if(p.includes('fo')&&p.includes('press')&&dir==='low') return 'Low FO pressure -- check booster pump or filter';
  return null;
}

async function loadReportData(y,m){
  try{ reportData=await EOM.get('/watches/monthly-report?vessel_id='+vesselId+'&year='+y+'&month='+m); }
  catch(e){ document.getElementById('report-body').innerHTML='<div class="empty">Error: '+esc(e.message)+'</div>'; return; }
  var d=reportData, params=d.params||[];
  if(!params.length){ document.getElementById('report-body').innerHTML='<div class="empty"><div style="font-size:36px;margin-bottom:12px">?</div><div>No data for '+MONTHS[m-1]+' '+y+'</div></div>'; return; }

  var wData=params.filter(function(p){return p.current;}).length;
  var rising=params.filter(function(p){return p.yoy_pct!==null&&p.yoy_pct>5;}).length;
  var falling=params.filter(function(p){return p.yoy_pct!==null&&p.yoy_pct<-5;}).length;
  var sig=params.filter(function(p){return p.yoy_pct!==null&&Math.abs(p.yoy_pct)>20;}).length;

  var h='<div class="stat-grid">';
  h+='<div class="stat-card"><div class="stat-val" style="color:var(--blue)">'+wData+'</div><div class="stat-lbl">Parameters with data</div></div>';
  h+='<div class="stat-card"><div class="stat-val" style="color:var(--red)">'+rising+'</div><div class="stat-lbl">Rising >5% vs last year</div></div>';
  h+='<div class="stat-card"><div class="stat-val" style="color:var(--green)">'+falling+'</div><div class="stat-lbl">Falling >5% vs last year</div></div>';
  h+='<div class="stat-card"><div class="stat-val" style="color:var(--amber)">'+sig+'</div><div class="stat-lbl">Significant shifts >20%</div></div>';
  h+='</div>';

  var groups={};
  params.forEach(function(p){ if(!groups[p.section])groups[p.section]=[]; groups[p.section].push(p); });
  var currLbl=MONTHS[m-1]+' '+y, prevLbl=MONTHS[m-1]+' '+(y-1);

  Object.keys(groups).sort().forEach(function(sec){
    var sp=groups[sec];
    h+='<div class="card"><div class="card-hdr"><span class="card-title">'+esc(sec)+'</span><span class="card-meta">'+sp.length+' parameters ? click to drill down</span></div>';
    h+='<div style="overflow-x:auto"><table class="ptbl"><thead><tr>';
    h+='<th>Parameter</th><th>Unit</th><th class="r">'+currLbl+'</th><th class="r">'+prevLbl+'</th><th class="r">YoY ?</th><th class="r">YoY %</th><th>Trend</th></tr></thead><tbody>';
    sp.forEach(function(p,pi){
      var curr=p.current?parseFloat(p.current.avg).toFixed(2):'--';
      var prev=p.prev_year?parseFloat(p.prev_year.avg).toFixed(2):'--';
      var cls='flat', chg='--', pct='--';
      if(p.yoy_pct!==null){
        chg=(p.yoy_change>0?'+':'')+p.yoy_change;
        pct=(p.yoy_pct>0?'+':'')+p.yoy_pct+'%';
        if(Math.abs(p.yoy_pct)<5) cls='flat';
        else if(p.yoy_pct>20) cls='rise-crit';
        else if(p.yoy_pct>5)  cls='rise-warn';
        else if(p.yoy_pct<-20) cls='fall-crit';
        else cls='fall-ok';
      }
      var cid='sp_'+sec.replace(/\W/g,'_')+'_'+pi;
      h+='<tr class="clickable" data-fid="'+p.fid+'" data-p="'+esc(p.parameter)+'" data-s="'+esc(sec)+'" onclick="onDrillClick(this)">';
      h+='<td style="font-weight:600">'+esc(p.parameter)+'</td>';
      h+='<td style="color:var(--t3);font-size:10px">'+esc(p.unit||'')+'</td>';
      h+='<td class="r">'+(p.current?curr:'<span class="na">--</span>')+'</td>';
      h+='<td class="r">'+(p.prev_year?prev:'<span class="na">--</span>')+'</td>';
      h+='<td class="r '+cls+'">'+chg+'</td>';
      h+='<td class="r '+cls+'">'+pct+'</td>';
      h+='<td><canvas class="spark" id="'+cid+'" width="80" height="26"></canvas></td>';
      h+='</tr>';
    });
    h+='</tbody></table></div></div>';
  });

  document.getElementById('report-body').innerHTML=h;

  // Draw sparklines
  Object.keys(groups).sort().forEach(function(sec){
    groups[sec].forEach(function(p,pi){
      var cid='sp_'+sec.replace(/\W/g,'_')+'_'+pi;
      var canvas=document.getElementById(cid);
      if(!canvas||!p.sparkline||p.sparkline.length<2) return;
      var vals=p.sparkline.map(function(s){return s.avg;});
      var hasRise=vals.length>1&&vals[vals.length-1]>vals[0];
      var c=new Chart(canvas,{type:'line',data:{labels:p.sparkline.map(function(s){return s.month.slice(5);}),datasets:[{data:vals,borderColor:hasRise?'#ef4444':'#22c55e',borderWidth:1.5,pointRadius:0,fill:false,tension:0.3}]},options:{animation:false,responsive:false,plugins:{legend:{display:false},tooltip:{enabled:false}},scales:{x:{display:false},y:{display:false,beginAtZero:false}}}});
      sparkCharts.push(c);
    });
  });
}

async function renderYOY(){
  showLoading('Loading year-on-year analysis...');
  try{
    var now=new Date();
    var d=await EOM.get('/watches/monthly-report?vessel_id='+vesselId+'&year='+now.getFullYear()+'&month='+(now.getMonth()+1));

        if(!items.length) return;
        var col=dir==='rise'?'var(--red)':'var(--green)';
        var lbl=dir==='rise'?'? Rising Parameters':'? Falling Parameters';
        h+='<div class="card" style="margin-bottom:16px"><div class="card-hdr"><span class="card-title" style="color:'+col+'">'+lbl+'</span><span class="card-meta">vs same month last year</span></div>';
        items.forEach(function(p){
          var curr=p.current?parseFloat(p.current.avg).toFixed(2):'--';
          var prev=p.prev_year?parseFloat(p.prev_year.avg).toFixed(2):'--';
          h+='<div class="arow" style="border-left:3px solid '+col+';cursor:pointer" data-fid="'+p.fid+'" data-p="'+esc(p.parameter)+'" data-s="'+esc(p.section)+'" onclick="onDrillClick(this)">';

function onDrillClick(el){

async function openDrill(fid, paramName, section){
  document.getElementById('drill-title').textContent=paramName;
  document.getElementById('drill-sub').textContent=section;
  document.getElementById('drill-body').innerHTML='<div class="empty"><div class="spinner"></div>Loading parameter history...</div>';
  document.getElementById('drill-modal').style.display='flex';
  destroyCharts(drillCharts); drillCharts=[];

  try{
    // Fetch parameter detail
    var detail=await EOM.get('/watches/parameter-detail?vessel_id='+vesselId+'&fid='+encodeURIComponent(fid)+'&months=24');
    var corr=CORRELATIONS[fid]||[];
    var corrData=[];
    if(corr.length){
      corrData=await EOM.post('/watches/multi-param',{vessel_id:vesselId,fids:corr,months:24});
    }

    document.getElementById('drill-body').innerHTML='<div class="empty" style="color:var(--red)">Error loading: '+esc(e.message)+'</div>';

      }
    }
  });
  drillCharts.push(ch);

  // Call AI analysis
  runAIAnalysis(fid, paramName, section, meta, monthly, corrData);

async function runAIAnalysis(fid, paramName, section, meta, monthly, corrData){
  // Build context for Claude
  var monthlyStr=monthly.map(function(m){return m.month+': avg='+m.avg+' ('+m.n+' readings)';}).join('\n');
  var corrStr=corrData.map(function(c){
    return '\n'+c.parameter+' ('+c.unit+'):\n'+c.monthly.map(function(m){return m.month+': '+m.avg;}).join(', ');
  }).join('\n');

  // Compute recent trend
  var last3=monthly.slice(-3).map(function(m){return parseFloat(m.avg);});
  var first3=monthly.slice(0,3).map(function(m){return parseFloat(m.avg);});
  var avgLast=last3.length?last3.reduce(function(a,b){return a+b;},0)/last3.length:null;
  var avgFirst=first3.length?first3.reduce(function(a,b){return a+b;},0)/first3.length:null;
  var overallTrend=avgLast&&avgFirst?((avgLast-avgFirst)/Math.abs(avgFirst)*100).toFixed(1)+'% over 24 months':'insufficient data';

  var prompt=VESSEL_CONTEXT+'\n\n'
    +'PARAMETER UNDER ANALYSIS:\n'
    +'Name: '+paramName+'\n'
    +'Unit: '+(meta.unit||'none')+'\n'
    +'Section: '+section+'\n'
    +'Equipment: '+meta.equipment+'\n'
    +'Historical baseline: mean='+meta.mean+', stddev='+meta.stddev+', min='+meta.min_val+', max='+meta.max_val+'\n'
    +'Overall trend: '+overallTrend+'\n\n'
    +'MONTHLY HISTORY (most recent last):\n'+monthlyStr
    +(corrStr?'\n\nCORRELATED PARAMETERS ON THIS VESSEL:\n'+corrStr:'')
    +'\n\nTASK: As an experienced marine chief engineer, analyse this data and provide a structured diagnostic assessment.'
    +'\nConsider: (1) Is the trend normal for this vessel type and operating area? (2) Do correlated parameters support or contradict your hypothesis? (3) What specific engineering failure mode does this suggest? (4) What action is needed?'
    +'\n\nRespond ONLY with valid JSON -- no preamble, no markdown:\n'
    +'{"summary":"one sentence finding","findings":["finding with numbers","finding with numbers"],"likely_cause":"specific engineering explanation","evidence":["evidence from data","correlated parameter support"],"check_also":["specific item to inspect","specific measurement to take"],"action":"specific recommended action","risk":"Low|Medium|High|Critical","confidence":"Low|Medium|High"}';

  try{
    var resp=await fetch('/api/ai/diagnose',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+(localStorage.getItem('eom_token')||'')},
      body:JSON.stringify({
        system:'You are an experienced marine chief engineer and technical superintendent specialising in LPG carriers with MAN B&W two-stroke engines. You analyse engine room data to identify equipment degradation, anomalies, and maintenance needs. Always respond with only valid JSON.',
        prompt:prompt
      })
    });
    var data=await resp.json();
    var text=data.content&&data.content[0]?data.content[0].text:'';
    // Strip any markdown fences
    text=text.replace(/```json/g,'').replace(/```/g,'').trim();
    var analysis=JSON.parse(text);
    renderAIResult(analysis);
  }catch(e){
    document.getElementById('ai-content').innerHTML='<div style="color:var(--t3);font-size:12px">AI analysis unavailable: '+esc(e.message)+'</div>';
  }
}

function renderAIResult(a){
  var RISK_CLS={Low:'risk-low',Medium:'risk-medium',High:'risk-high',Critical:'risk-critical'};
  var h='';
  h+='<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">';
  h+='<span class="'+(RISK_CLS[a.risk]||'risk-low')+'">'+esc(a.risk||'Low')+' Risk</span>';
  h+='<span style="font-size:11px;color:var(--t3)">Confidence: '+esc(a.confidence||'Medium')+'</span>';
  h+='</div>';
  h+='<div style="font-size:13px;font-weight:600;color:var(--t1);margin-bottom:12px;line-height:1.5">'+esc(a.summary)+'</div>';

  if(a.findings&&a.findings.length){
    h+='<div class="finding"><strong>Findings</strong>';
    a.findings.forEach(function(f){
      h+='<div style="margin-top:5px;padding-left:10px;border-left:2px solid var(--blue)">'+esc(f)+'</div>';
    });
    h+='</div>';
  }
  h+='<div class="finding"><strong>Likely Cause</strong>';
  h+='<div style="margin-top:5px;color:var(--t1)">'+esc(a.likely_cause)+'</div></div>';

  if(a.evidence&&a.evidence.length){
    h+='<div class="finding"><strong>Supporting Evidence</strong>';
    a.evidence.forEach(function(e){
      h+='<div style="margin-top:5px;padding-left:10px;border-left:2px solid var(--blue)">'+esc(e)+'</div>';
    });
    h+='</div>';
  }
  if(a.check_also&&a.check_also.length){
    h+='<div class="finding" style="border-left-color:var(--amber)"><strong>Also Check</strong>';
    a.check_also.forEach(function(c){
      h+='<div style="margin-top:5px;padding-left:10px;border-left:2px solid var(--amber)">'+esc(c)+'</div>';
    });
    h+='</div>';
  }
  h+='<div class="finding" style="border-left-color:var(--green);background:rgba(34,197,94,.06)">';
  h+='<strong>Recommended Action</strong>';
  h+='<div style="margin-top:5px;font-size:13px;color:var(--t1)">'+esc(a.action)+'</div></div>';

  document.getElementById('ai-content').innerHTML=h;
}

    +'<img class="nsml" src="'+LOGO_URI+'" alt="NSML"/></div>'
    +content
    +'<div class="fl">'+esc(vesselName)+'</div>'
    +'<div class="fr">FORCAP <span style="color:#bbb">by Kenzo</span></div>'
    +'</body></html>';
  var win=window.open('','_blank');
  win.document.write(doc); win.document.close(); win.focus();
  setTimeout(function(){win.print();},600);
}
